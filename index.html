<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; 
            z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6);
            color: #fff; padding: 10px; border-radius: 6px;
            font-size: min(14px, 3.5vw); max-width: 40%;
        }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box; transition: all 0.3s ease;
        }
        #start-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        .shop-btn { padding: 10px; margin: 5px; background: #ffc107; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; }
        .shop-btn:disabled { background: #ccc; cursor: not-allowed; }
        .dev-btn { color: white; background-color: #d9534f; }
        #auto-status { color: #fff; font-size: 1.1em; height: 1.4em; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-container">
        <div id="level-display" style="font-size: 28px; font-weight: bold;" onclick="triggerDebugJump()">Level 1</div>
        <br>
        <button id="music-upgrade-btn" class="shop-btn" onclick="upgradeMusic()">🎧 ヘッドフォン (0コイン)</button>
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()"></button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()" style="display: none;"></button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()" style="display: none;">📍 Google Map (0コイン)</button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 神社に行く (0コイン)</button>
        <button id="dev-glass-btn" class="shop-btn dev-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (0コイン)</button>
        <br>
        <button id="start-btn" onclick="startGame()">START</button>
    </div>

    <div id="ui">
        <div id="auto-status"></div>
        <div id="ammo-display"></div>
        <div id="amulet-display"></div>
        <div id="flashlight-display"></div>
        <div id="mode-text">BLIND MODE</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
        <div style="font-size: 0.85em; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    
    <canvas id="gameCanvas"></canvas>

<script>
const GAME_VERSION = "6.40";
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';
const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogwoof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const dogCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane.wav');

let audioCtx = null, soundReady = false;
let isBlind = true, gameStarted = false;
let currentLevel = 1, totalCoins = 0, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false;
let hasHeadphone = false, currentBGM = null; 
let hasShotgun = false, shotgunAmmo = 0; 
let hasFlashlight = false, flashlightBattery = 0;
let lastDir = { dx: 0, dy: -1 }; 
let flipX = false; 
let debugClickCount = 0;

let ROWS, COLS, map = [], dogs = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let shortestPath = [], coinsCollectedInLevel = 0;
let lastMoveTime = Date.now(), autoMoveTimeout = null, autoLoadState = "NONE";

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 1975.53, 2093.00];

const gameOverMessages = [
    "一度噛んだら離さない。\nイッヌの執念があなたの魂を Level1 まで引きずり戻しました。",
    "ガブッ！\nイッヌがあなたを「巨大な骨付き肉」と勘違いしました。",
    "あなたの骨が砕ける音だけが迷宮に響き渡りました。",
    "イッヌの愛情(物理)を受け、あなたは可愛さのあまり意識を失いました。" 
];

// --- UI系関数 ---
function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const silentPlay = (audio) => { 
        audio.muted = true;
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; audio.muted = false; }).catch(e => {}); 
    };
    [growlSnd, biteSnd, dogCrySnd].forEach(silentPlay);
    soundReady = true;
}

function playSound(audio) { if (audio) { audio.pause(); audio.currentTime = 0; audio.play().catch(e => {}); } }

function triggerDebugJump() {
    if (gameStarted) return;
    debugClickCount++;
    if (debugClickCount >= 15) { currentLevel = 11; debugClickCount = 0; alert("⚠️ Hard Mode unlocked."); updateUI(); }
}

function updateUI() {
    const verDisplay = document.querySelector('#ui div:last-child');
    if (verDisplay) verDisplay.innerText = `ver.${GAME_VERSION}${hasDevGlasses ? " (Debug Mode)" : ""}`;
    const levelDisplay = document.getElementById('level-display');
    const startContainer = document.getElementById('start-container');
    const isHardMode = currentLevel >= 11;

    levelDisplay.innerText = isHardMode ? `Level ${currentLevel} (HARD)` : `Level ${currentLevel}`;
    levelDisplay.style.color = isHardMode ? "#ff4444" : "#333";
    startContainer.style.border = isHardMode ? "6px solid #ff4444" : "none";
    startContainer.style.boxShadow = isHardMode ? "0 0 25px #ff0000" : "none";

    document.getElementById('shotgun-btn').style.display = isHardMode ? 'block' : 'none';
    document.getElementById('auto-device-btn').style.display = isHardMode ? 'block' : 'none';
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('ammo-display').innerText = "💥".repeat(shotgunAmmo);
    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";
    document.getElementById('flashlight-display').innerText = (hasFlashlight && flashlightBattery > 0) ? `🔦${Math.ceil(flashlightBattery)}s` : "";
    document.getElementById('mode-text').innerText = isBlind ? "BLIND MODE" : "DEBUG MODE";

    const sBtn = document.getElementById('shotgun-btn');
    if (!hasShotgun) { sBtn.innerText = "💥 ショットガン (3コイン)"; sBtn.disabled = totalCoins < 3; }
    else { sBtn.innerText = `💥 弾 [${shotgunAmmo}/2] (1コイン)`; sBtn.disabled = (shotgunAmmo >= 2 || totalCoins < 1); }

    const fBtn = document.getElementById('flashlight-btn');
    if (!hasFlashlight) { fBtn.innerText = "🔦 懐中電灯 (3コイン)"; fBtn.disabled = totalCoins < 3; }
    else { fBtn.innerText = `🔦 電池 [${Math.ceil(flashlightBattery)}s] (1コイン)`; fBtn.disabled = (flashlightBattery >= 300 || totalCoins < 1); }

    document.getElementById('amulet-btn').disabled = (hasAmulet || totalCoins < 0);
    document.getElementById('auto-device-btn').disabled = (hasAutoDevice || totalCoins < 0);
    document.getElementById('dev-glass-btn').disabled = hasDevGlasses;    
    document.getElementById('controls').style.display = hasDevGlasses ? 'block' : 'none';
}

function buyFlashlight() {
    if (!hasFlashlight) { if (totalCoins >= 3) { totalCoins -= 3; hasFlashlight = true; flashlightBattery = 60; } }
    else { if (totalCoins >= 1) { totalCoins -= 1; flashlightBattery = Math.min(300, flashlightBattery + 30); } }
    updateUI();
}
function buyShotgun() {
    if (!hasShotgun) { if (totalCoins >= 3) { totalCoins -= 3; hasShotgun = true; shotgunAmmo = 2; } }
    else { if (totalCoins >= 1 && shotgunAmmo < 2) { totalCoins -= 1; shotgunAmmo++; } }
    updateUI();
}
function upgradeMusic() { if (!hasHeadphone) hasHeadphone = true; else if (currentBGM === null) currentBGM = 1; else if (currentBGM === 1) currentBGM = 2; updateUI(); }
function buyAmulet() { if (!hasAmulet) { hasAmulet = true; coinMultiplier = 3; updateUI(); } }
function buyAutoDevice() { if (!hasAutoDevice) { hasAutoDevice = true; updateUI(); } }
function buyDevGlasses() { if (!hasDevGlasses) { hasDevGlasses = true; updateUI(); } }
function toggleBlind() { isBlind = !isBlind; updateUI(); draw(); }

// --- ゲームロジック ---
function generateSimpleMaze() {
    COLS = Math.min(17, 5 + Math.floor((currentLevel - 1) * 1.34));
    ROWS = Math.min(21, Math.floor(COLS * 1.2));
    if (COLS % 2 === 0) COLS++; if (ROWS % 2 === 0) ROWS++;
    
    map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
    player = { x: 1, y: 1 }; map[1][1] = 0;
    
    // 簡易的な穴掘り法
    function dig(x, y) {
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random()-0.5);
        for(let [dx, dy] of dirs) {
            let nx = x+dx, ny = y+dy;
            if(nx>0 && nx<COLS-1 && ny>0 && ny<ROWS-1 && map[ny][nx]===1) {
                map[y+dy/2][x+dx/2] = 0; map[ny][nx] = 0; dig(nx, ny);
            }
        }
    }
    dig(1, 1);
    
    // ゴールとコイン
    let walkable = [];
    for(let y=1; y<ROWS-1; y++) for(let x=1; x<COLS-1; x++) if(map[y][x]===0) walkable.push({x,y});
    goalPos = walkable[walkable.length-1]; map[goalPos.y][goalPos.x] = 2;
    for(let i=0; i<walkable.length/5; i++) {
        let p = walkable[Math.floor(Math.random()*walkable.length)];
        if(map[p.y][p.x]===0) map[p.y][p.x] = 3;
    }
    
    // イッヌ
    dogs = [];
    let dogNum = Math.min(10, currentLevel - 1);
    for(let i=0; i<dogNum; i++) {
        let p = walkable[Math.floor(Math.random()*walkable.length)];
        if(Math.abs(p.x-player.x)+Math.abs(p.y-player.y) > 3) dogs.push(p);
    }
}

function movePlayer(dx, dy) {
    if(!gameStarted) return;
    lastDir = { dx, dy }; flipX = dx === 1 ? true : (dx === -1 ? false : flipX);
    let nx = player.x + dx, ny = player.y + dy;
    if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1) {
        player.x = nx; player.y = ny;
        let dIdx = dogs.findIndex(d => d.x === nx && d.y === ny);
        if(dIdx !== -1) {
            if(shotgunAmmo > 0) { shotgunAmmo--; dogs.splice(dIdx,1); playSound(dogCrySnd); }
            else { playSound(biteSnd); resetGame(); alert(gameOverMessages[0]); return; }
        }
        if(map[ny][nx]===2) { currentLevel++; gameStarted=false; document.getElementById('start-container').style.display='flex'; }
        if(map[ny][nx]===3) { map[ny][nx]=0; totalCoins += coinMultiplier; playCoinSound(coinsCollectedInLevel++); }
    }
    updateUI(); draw();
}

function playCoinSound(s) { if(audioCtx) playOscillator(WHITE_KEYS[s % WHITE_KEYS.length], 'sine', 0.1); }
function playOscillator(f, t, d) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
}

// --- 描画関数 (修正の核心) ---
function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS);
    const oX = (canvas.width - size * COLS) / 2, oY = (canvas.height - size * ROWS) / 2;

    // 1. 下地（迷路）を描画
    ctx.fillStyle = "#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let px = oX+x*size, py = oY+y*size;
            if(map[y][x]===1) { ctx.fillStyle="#333"; ctx.fillRect(px,py,size,size); }
            else if(map[y][x]===2) { ctx.fillStyle="#f00"; ctx.fillRect(px,py,size,size); }
            else if(map[y][x]===3) { ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2,py+size/2,size/4,0,Math.PI*2); ctx.fill(); }
        }
    }
    dogs.forEach(d => ctx.drawImage(dogImg, oX+d.x*size, oY+d.y*size, size, size));
    
    // 2. プレイヤー描画
    const pX = oX+player.x*size, pY = oY+player.y*size;
    ctx.save();
    if(flipX) { ctx.translate(pX+size,pY); ctx.scale(-1,1); ctx.drawImage(playerImg,0,0,size,size); }
    else { ctx.drawImage(playerImg,pX,pY,size,size); }
    ctx.restore();

    // 3. 暗闇レイヤー
    if(isBlind && !hasDevGlasses) {
        // オフスクリーンCanvasを使わず、一旦別のsave状態で黒い膜を張る
        ctx.save();
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if(hasFlashlight && flashlightBattery > 0) {
            // ここで消しゴムモード。直前に塗った「黒い膜」だけを消す
            ctx.globalCompositeOperation = 'destination-out';
            const cX = pX+size/2, cY = pY+size/2;
            const angle = Math.atan2(lastDir.dy, lastDir.dx);

            // 足元
            const footGrad = ctx.createRadialGradient(cX,cY,0,cX,cY,size*1.5);
            footGrad.addColorStop(0, 'rgba(0,0,0,1)'); footGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = footGrad;
            ctx.beginPath(); ctx.arc(cX,cY,size*1.5,0,Math.PI*2); ctx.fill();

            // ライト
            const lightGrad = ctx.createRadialGradient(cX,cY,size*0.5,cX,cY,size*5);
            lightGrad.addColorStop(0, 'rgba(0,0,0,1)'); lightGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = lightGrad;
            ctx.beginPath(); ctx.moveTo(cX,cY);
            ctx.arc(cX,cY,size*5,angle-0.5,angle+0.5);
            ctx.closePath(); ctx.fill();
        }
        ctx.restore(); // 消しゴムモード終了
    }
}

// --- システム ---
function startGame() { unlockAudio(); generateSimpleMaze(); gameStarted=true; document.getElementById('start-container').style.display='none'; updateUI(); draw(); }
function resetGame() { currentLevel=1; totalCoins=0; hasFlashlight=false; flashlightBattery=0; shotgunAmmo=0; gameStarted=false; updateUI(); }

setInterval(() => { if(gameStarted && hasFlashlight && flashlightBattery > 0) { flashlightBattery -= 0.1; updateUI(); draw(); } }, 100);

window.addEventListener('keydown', e => {
    if(e.key==="ArrowUp") movePlayer(0,-1); if(e.key==="ArrowDown") movePlayer(0,1);
    if(e.key==="ArrowLeft") movePlayer(-1,0); if(e.key==="ArrowRight") movePlayer(1,0);
});

let tsX, tsY;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if(Math.abs(dx)>20 || Math.abs(dy)>20) { if(Math.abs(dx)>Math.abs(dy)) movePlayer(dx>0?1:-1,0); else movePlayer(0,dy>0?1:-1); }
});

updateUI();
</script>
</body>
</html>
