<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち - Fixed Version</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 15px; left: 15px; pointer-events: none; z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6); color: #fff; padding: 10px; border-radius: 6px; font-size: min(14px, 3.5vw); max-width: 80%; }
        .item-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; height: 1.5em; }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 300; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        
        /* 開始画面のレイアウト修正 */
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,1.0); /* 最初から不透明に */
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 500; text-align: center; padding: 20px; box-sizing: border-box; 
            transition: opacity 0.5s;
        }
        #start-container.hidden { opacity: 0; pointer-events: none; }
        
        .start-action-row { display: flex; align-items: center; gap: 20px; margin: 10px 0; justify-content: center; }
        #start-btn { padding: 15px 40px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; min-width: 240px; background: #28a745; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(24px); }
        
        .shop-btn { padding: 10px; margin: 3px; background: #ffd54f; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; display: block; }
        .shop-btn:disabled { background: #ccc !important; cursor: not-allowed; color: #777 !important; }
        
        #ranking-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 15px; border-radius: 10px; z-index: 1000; text-align: center; width: 95%; max-width: 700px; display: none; border: 2px solid #ffd700; overflow-y: auto; max-height: 90vh; }
        
        .kb-selected { outline: 4px solid #000 !important; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="start-container">
        <div id="level-display" style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">Level 1</div>
        <div id="shop-items" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <button id="hp-buy-btn" class="shop-btn" onclick="buyHeadphone()">🎹 キーボード (5コイン)</button>
            <button id="bgm-cycle-btn" class="shop-btn" style="display:none;" onclick="cycleBGM()"></button>        
            <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()">🔦 懐中電灯 (15コイン)</button>
            <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運アップお守り (25コイン)</button>
            <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()" style="display: none;"></button>
            <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()" style="display: none;">📍 Google Map (200コイン)</button>
            <button id="dev-glass-btn" class="shop-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (1000コイン)</button>
        </div>
        <br>
        <div class="start-action-row">
            <button id="start-btn" onclick="startGame()">START</button>
            <div id="toggle-container">
                <label class="switch" id="mode-toggle-label">
                    <input type="checkbox" id="mode-toggle" checked onchange="toggleStartMode(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="item-row">
            <div id="amulet-display"></div>
            <div id="headphone-display"></div>
            <div id="ammo-display"></div>
            <div id="auto-status"></div>
            <div id="flashlight-display"></div>
        </div>
        <div id="level-text-ui">Level 1/20</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
        <div id="ver-text" style="font-size: 0.8em; color: #888;"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- BGM/SE Resources (URL check important) -->
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    <audio id="bgm-suzumusi" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Suzumusi.mp3" loop></audio>
    <audio id="bgm-brown" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Brown_Noise.mp3" loop></audio>

<script>
const GAME_VERSION = "24.5.9-fixed";
const GAS_URL = "https://script.google.com/macros/s/AKfycby2EiyJEB9tKFKRZh_F53Up1beC-zIxrIMirvxj8i-bmZCfAz-rnlrSEWMxUE5K_opvOQ/exec";

// Assets with loading check
const assets = {
    wall: new Image(),
    player: new Image(),
    dog: new Image(),
    hunter: new Image()
};
assets.wall.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/blue_wall.png';
assets.player.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Me.png';
assets.dog.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Watchdog.png';
assets.hunter.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter.png';

const sounds = {
    growl: new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Watchdog_woof.wav'),
    bite: new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav'),
    dogCry: new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane_watchdog.mp3'),
    shotgun: new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Shotgun.mp3'),
    hunterWoof: new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter_woof.mp3'),
    hunterBite: new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunterbite.mp3')
};

// Game State
let audioCtx = null, gameStarted = false;
let currentLevel = 1, totalCoins = 0, coinMultiplier = 1;
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false, hasHeadphone = false;
let currentBGM = null, shotgunAmmo = 0, hasShotgun = false, hasFlashlight = false, flashlightBattery = 0;
let isManualMode = false, autoStartTimeout = null, countdownInterval = null;
let ROWS, COLS, map = [], dogs = [], hunters = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let scentMap = [], playerHistory = [], lastMoveTime = Date.now();
let lastDir = { dx: 0, dy: -1 }, flipX = false;
let stats = { totalSteps: 0, totalLightTime: 0, totalShots: 0, totalMapUses: 0, bgmTime: {}, neotiCount: 0 };

// --- Initialization ---
window.onload = () => {
    updateUI();
    // 初回描画（真っ黒回避）
    const canvas = document.getElementById('gameCanvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
};

function unlockAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // ユーザー操作内で音声を一度再生してロック解除
    Object.values(sounds).forEach(s => {
        s.muted = true;
        s.play().then(() => { s.pause(); s.currentTime = 0; s.muted = false; }).catch(e => console.log("Audio unlock wait"));
    });
}

function playSound(a) { if(a) { a.currentTime = 0; a.play().catch(()=>{}); } }

// --- Game Logic ---
function generateSimpleMaze() {
    const sizeMap = { 1:[7,9], 5:[9,11], 10:[13,15], 15:[15,19], 20:[17,21] };
    let s = sizeMap[currentLevel] || (currentLevel > 15 ? [15,19] : [11,13]);
    COLS = s[0]; ROWS = s[1];
    map = Array.from({length:ROWS}, () => Array(COLS).fill(1));
    
    let rx = 1, ry = 1; map[ry][rx] = 0; player = {x:rx, y:ry};
    for(let i=0; i<1500; i++) {
        let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
        let [dx, dy] = dirs[Math.floor(Math.random()*4)];
        let nx=rx+dx, ny=ry+dy;
        if(nx>0 && nx<COLS-1 && ny>0 && ny<ROWS-1) { map[ny][nx]=0; rx=nx; ry=ny; }
    }
    
    // ゴール地点の設定（一番遠い場所を探す簡易実装）
    goalPos = {x: rx, y: ry};
    map[ry][rx] = 2;

    // コイン(3)の配置
    for(let i=0; i<currentLevel+3; i++) {
        let cx = Math.floor(Math.random()*COLS), cy = Math.floor(Math.random()*ROWS);
        if(map[cy][cx]===0 && (cx!==player.x || cy!==player.y)) map[cy][cx]=3;
    }

    dogs = []; 
    let dogCount = Math.min(10, Math.floor(currentLevel/2) + 1);
    for(let i=0; i<dogCount; i++) {
        let dx = Math.floor(Math.random()*COLS), dy = Math.floor(Math.random()*ROWS);
        if(map[dy][dx]===0 && Math.abs(dx-player.x)+Math.abs(dy-player.y)>3) dogs.push({x:dx, y:dy});
    }

    hunters = [];
    if(currentLevel>=16) hunters.push({x:goalPos.x, y:goalPos.y, alerted:false});
    
    playerHistory = [{x:player.x, y:player.y}];
}

function startGame() {
    unlockAudio();
    document.getElementById('start-container').classList.add('hidden');
    gameStarted = true;
    
    if(hasHeadphone && currentBGM){
        const bId = ['bgm-koori','bgm-hikari','bgm-suzumusi','bgm-brown'][currentBGM-1];
        const audio = document.getElementById(bId);
        if(audio) audio.play().catch(()=>{});
    }
    
    generateSimpleMaze();
    draw();
}

function movePlayer(dx, dy) {
    if(!gameStarted) return;
    const nx=player.x+dx, ny=player.y+dy;
    if(nx<0 || nx>=COLS || ny<0 || ny>=ROWS || map[ny][nx]===1) return;

    player.x=nx; player.y=ny;
    flipX = (dx === 1) ? true : (dx === -1 ? false : flipX);
    
    // 当たり判定
    let di = dogs.findIndex(d=>d.x===nx && d.y===ny);
    if(di!==-1) {
        if(shotgunAmmo>0){
            shotgunAmmo--; playSound(sounds.shotgun); dogs.splice(di,1); updateUI();
        } else {
            triggerGameOver(sounds.bite); return;
        }
    }

    if(map[ny][nx]===2) {
        if(currentLevel>=20) { alert("全クリア！"); location.reload(); }
        else {
            currentLevel++; gameStarted=false;
            stopAllBGM();
            document.getElementById('start-container').classList.remove('hidden');
            updateUI();
        }
    } else if(map[ny][nx]===3) {
        map[ny][nx]=0; totalCoins += (currentLevel>=11?10:1)*coinMultiplier;
        updateUI();
    }
    draw();
}

function triggerGameOver(s) {
    gameStarted = false;
    playSound(s);
    setTimeout(() => { alert("GAME OVER"); location.reload(); }, 300);
}

function stopAllBGM() {
    ['bgm-koori','bgm-hikari','bgm-suzumusi','bgm-brown'].forEach(id => {
        const a = document.getElementById(id);
        if(a) { a.pause(); a.currentTime = 0; }
    });
}

function draw() {
    const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const size=Math.min(canvas.width/COLS, canvas.height/ROWS);
    const oX=(canvas.width-size*COLS)/2, oY=(canvas.height-size*ROWS)/2;

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let px=oX+x*size, py=oY+y*size;
            if(map[y][x]===1) ctx.drawImage(assets.wall, px, py, size+0.5, size+0.5);
            else if(map[y][x]===2) { ctx.fillStyle="#fff"; ctx.fillRect(px,py,size,size); }
            else if(map[y][x]===3) { ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill(); }
        }
    }

    dogs.forEach(d => ctx.drawImage(assets.dog, oX+d.x*size, oY+d.y*size, size, size));
    
    ctx.save();
    if(flipX) {
        ctx.translate(oX+player.x*size+size, oY+player.y*size);
        ctx.scale(-1, 1);
        ctx.drawImage(assets.player, 0, 0, size, size);
    } else {
        ctx.drawImage(assets.player, oX+player.x*size, oY+player.y*size, size, size);
    }
    ctx.restore();

    // 視界制限
    if(!hasDevGlasses) {
        ctx.save();
        ctx.globalCompositeOperation = 'destination-in';
        let grad = ctx.createRadialGradient(
            oX+player.x*size+size/2, oY+player.y*size+size/2, size/2,
            oX+player.x*size+size/2, oY+player.y*size+size/2, hasFlashlight ? size*3 : size*1.2
        );
        grad.addColorStop(0, 'rgba(0,0,0,1)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.restore();
    }
}

// --- Shop Functions ---
function buyHeadphone() { if(totalCoins>=5){totalCoins-=5; hasHeadphone=true; updateUI();} }
function cycleBGM() { currentBGM = (currentBGM === null)? 1 : (currentBGM < 4 ? currentBGM+1 : null); updateUI(); }
function buyFlashlight() { if(totalCoins>=15){totalCoins-=15; hasFlashlight=true; updateUI();} }
function buyAmulet() { if(totalCoins>=25){totalCoins-=25; hasAmulet=true; coinMultiplier=3; updateUI();} }
function buyShotgun() { if(totalCoins>=50){totalCoins-=50; hasShotgun=true; shotgunAmmo=2; updateUI();} }
function buyAutoDevice() { if(totalCoins>=200){totalCoins-=200; hasAutoDevice=true; updateUI();} }
function buyDevGlasses() { if(totalCoins>=1000){totalCoins-=1000; hasDevGlasses=true; updateUI();} }

function updateUI() {
    document.getElementById('level-display').innerText = `Level ${currentLevel}`;
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('level-text-ui').innerText = `Level ${currentLevel}/20`;
    document.getElementById('ver-text').innerText = `ver.${GAME_VERSION}`;
    
    document.getElementById('hp-buy-btn').style.display = hasHeadphone ? "none" : "block";
    document.getElementById('bgm-cycle-btn').style.display = hasHeadphone ? "block" : "none";
    document.getElementById('bgm-cycle-btn').innerText = `BGM: ${currentBGM || 'OFF'}`;
    
    document.getElementById('shotgun-btn').style.display = currentLevel >= 11 ? "block" : "none";
    document.getElementById('shotgun-btn').innerText = hasShotgun ? `弾丸補充 (30c)` : `散弾銃購入 (50c)`;
    
    document.getElementById('ammo-display').innerText = "💥".repeat(shotgunAmmo);
    document.getElementById('flashlight-display').innerText = hasFlashlight ? "🔦" : "";
}

function toggleStartMode(val) { isManualMode = !val; }

// --- Controls ---
window.addEventListener('keydown', e => {
    if(!gameStarted) return;
    if(e.key==='ArrowUp'||e.key==='w') movePlayer(0,-1);
    if(e.key==='ArrowDown'||e.key==='s') movePlayer(0,1);
    if(e.key==='ArrowLeft'||e.key==='a') movePlayer(-1,0);
    if(e.key==='ArrowRight'||e.key==='d') movePlayer(1,0);
});

window.addEventListener('resize', () => { if(gameStarted) draw(); });

</script>
</body>
</html>
