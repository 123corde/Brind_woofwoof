<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち - Extreme Hunter Edition</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; 
            z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6);
            color: #fff; padding: 10px; border-radius: 6px;
            font-size: min(14px, 3.5vw); max-width: 80%;
        }
        .item-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; height: 1.5em; }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 300; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.35); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            transition: background-color 2.0s ease-in-out; 
        }
        #start-container > * { opacity: 0; transition: opacity 2.0s ease-in-out; pointer-events: none; }
        #start-container.opaque { background: rgba(255,255,255,1.0) !important; }
        #start-container.opaque > * { opacity: 1; pointer-events: auto; }
        .start-action-row { display: flex; align-items: center; gap: 20px; margin: 10px 0; justify-content: center; }
        #start-btn { padding: 15px 40px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; min-width: 240px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--toggle-color, #28a745); }
        input:checked + .slider:before { transform: translateX(24px); }
        .shop-btn { padding: 10px; margin: 3px; background: #ffd54f; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; flex-shrink: 0; }
        .shop-btn:disabled { background: #ccc !important; cursor: not-allowed; color: #777 !important; }
        #auto-status { color: #fff; font-size: 1.1em; font-weight: bold; }
        #level-display { cursor: default; user-select: none; -webkit-user-select: none; line-height: 1.2; font-weight: bold; font-size: 28px; }
        @keyframes extreme-shake {
            0% { transform: translate(0,0); }
            20% { transform: translate(1px, -1px); }
            40% { transform: translate(-1px, 1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }
        .extreme-shake { animation: extreme-shake 0.1s infinite; display: inline-block; }
    </style>
</head>
<body>

    <div id="start-container" class="opaque">
        <div id="level-display" onclick="triggerDebugJump()">Level 1</div>
        <br><br>
        <button id="hp-buy-btn" class="shop-btn" onclick="buyHeadphone()">🎹 キーボード (5コイン)</button>
        <button id="bgm-cycle-btn" class="shop-btn" style="display:none;" onclick="cycleBGM()"></button>        
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()"></button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運アップお守り (25コイン)</button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()" style="display: none;"></button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()" style="display: none;">📍 Google Map (200コイン)</button>
        <button id="dev-glass-btn" class="shop-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (1000コイン)</button>
        <br>
        <div class="start-action-row">
            <button id="start-btn" onclick="startGame()">START</button>
            <div id="toggle-container" style="display: flex; flex-direction: column; align-items: center;">
                <label class="switch">
                    <input type="checkbox" id="mode-toggle" checked onchange="toggleStartMode(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="item-row">
            <div id="amulet-display"></div>
            <div id="headphone-display"></div>
            <div id="ammo-display"></div>
            <div id="auto-status"></div>
            <div id="flashlight-display"></div>
        </div>
        <div id="level-text-ui" style="font-size: 1.1em; color: #fff; margin-bottom: 2px;">Level 1/20</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
        <div id="ver-text" style="font-size: 0.85em; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    <audio id="bgm-suzumusi" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Suzumusi.mp3" loop></audio>
    <audio id="bgm-brown" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Brown_Noise.mp3" loop></audio>
    
    <canvas id="gameCanvas"></canvas>

<script>
const GAME_VERSION = "22.3.1"; 

const HUNTER_AVOID_DIST = 3; 

const wallImg = new Image(); wallImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/blue_wall.png';
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/25fcfc444f24c7c3523c3defdb2c3182e2421220/Watchdog.png';
const hunterImg = new Image(); hunterImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/25fcfc444f24c7c3523c3defdb2c3182e2421220/Hunter.png';

const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const hunterWoofSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter_woof.mp3');
const hunterDefeatSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane_hunter.mp3');
const watchdogWoofSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Watchdog_woof.wav');
const watchdogDefeatSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane_watchdog.mp3');
const shotgunSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Shotgun.mp3');

let audioCtx = null, soundReady = false, activeAudioCount = 0;
const MAX_CONCURRENT_AUDIO = 10;
let isBlind = true, gameStarted = false;
let autoStartTimeout = null, countdownInterval = null, isManualMode = false; 
let currentLevel = 1, totalCoins = 101000, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false, hasHeadphone = false;
let currentBGM = null, hasShotgun = false, shotgunAmmo = 0, shotgunRevealActive = false; 
let hasFlashlight = false, flashlightBattery = 0;
const FLASHLIGHT_MAX = 200, FLASHLIGHT_BONUS = 180;
let lastDir = { dx: 0, dy: -1 }, flipX = false, debugClickCount = 0;
let ROWS, COLS, map = [], dogs = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let shortestPath = [], coinsCollectedInLevel = 0, lastMoveTime = Date.now(), autoMoveTimeout = null;
let autoLoadState = "NONE", loadingDots = 0, isAutoDeviceUsedInThisLevel = false, playerMoveCount = 0;

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 1975.53, 2093.00];

const gameOverMessages = [
    "一度噛んだら離さない。\nイッヌの執念があなたの魂を Level1 まで引きずり戻しました。",
    "ガブッ！\nイッヌがあなたを「巨大な骨付き肉」と勘違いしました。",
    "あなたの骨が砕ける音だけが迷宮に響き渡りました。",
    "イッヌの愛情(物理)を受け、あなたは可愛さのあまり意識を失いました。"
];

function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const silentPlay = (audio) => { 
        audio.muted = true;
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; audio.muted = false; }).catch(e => {}); 
    };
    [biteSnd, hunterWoofSnd, hunterDefeatSnd, watchdogWoofSnd, watchdogDefeatSnd, shotgunSnd].forEach(silentPlay);
    soundReady = true;
}

function playOverlap(audio) {
    if (!audio || !soundReady || activeAudioCount > MAX_CONCURRENT_AUDIO) return;
    try {
        const tempSnd = audio.cloneNode();
        tempSnd.volume = audio.volume;
        activeAudioCount++;
        const p = tempSnd.play();
        if (p !== undefined) {
            p.then(() => {
                const cleanup = () => {
                    tempSnd.removeEventListener('ended', cleanup);
                    tempSnd.removeEventListener('error', cleanup);
                    tempSnd.pause(); tempSnd.src = ""; tempSnd.load();
                    activeAudioCount = Math.max(0, activeAudioCount - 1);
                    tempSnd.remove();
                };
                tempSnd.addEventListener('ended', cleanup);
                tempSnd.addEventListener('error', cleanup);
            }).catch(() => { 
                activeAudioCount = Math.max(0, activeAudioCount - 1); 
                tempSnd.remove();
            });
        }
    } catch (e) {}
}

function playSound(audio) {
    if (!audio) return;
    audio.pause(); audio.currentTime = 0;
    audio.play().catch(e => {});
}

function stopAllBGM() {
    ['bgm-koori', 'bgm-hikari', 'bgm-suzumusi', 'bgm-brown'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.pause();
    });
}

function toggleStartMode(isAuto) {
    isManualMode = !isAuto;
    const startBtn = document.getElementById('start-btn');
    if (isManualMode) {
        if (autoStartTimeout) clearTimeout(autoStartTimeout);
        if (countdownInterval) clearInterval(countdownInterval);
        startBtn.innerText = "START";
    } else if (currentLevel >= 2) startAutoStartCountdown();
}

function startAutoStartCountdown() {
    if (gameStarted) return;
    const startBtn = document.getElementById('start-btn');
    if (autoStartTimeout) clearTimeout(autoStartTimeout);
    if (countdownInterval) clearInterval(countdownInterval);
    if (isManualMode || currentLevel < 2) { startBtn.innerText = "START"; return; }
    let remaining = 10;
    startBtn.innerText = `START (${remaining}s)`;
    countdownInterval = setInterval(() => {
        remaining--;
        if (remaining <= 0) { clearInterval(countdownInterval); startBtn.innerText = "START"; }
        else { startBtn.innerText = `START (${remaining}s)`; }
    }, 1000);
    autoStartTimeout = setTimeout(() => { if (!gameStarted && !isManualMode) startGame(); }, 10000);
}

function resetAutoStartTimer() {
    if (gameStarted || currentLevel < 2 || isManualMode) return;
    startAutoStartCountdown();
}

function updateUI() {
    if (document.getElementById('ver-text')) document.getElementById('ver-text').innerText = `ver.${GAME_VERSION}`;
    const levelDisplay = document.getElementById('level-display');
    const startContainer = document.getElementById('start-container');
    const startBtn = document.getElementById('start-btn');
    const toggleContainer = document.getElementById('toggle-container');
    const slider = document.querySelector('.slider');
    toggleContainer.style.visibility = (currentLevel === 1) ? 'hidden' : 'visible';
    const isHard = currentLevel >= 11 && currentLevel <= 15;
    const isExtreme = currentLevel >= 16;
    startBtn.classList.remove('extreme-shake');
    slider.style.setProperty('--toggle-color', "#28a745");

    if (isExtreme) {
        startBtn.style.backgroundColor = "#dc3545";
        startBtn.classList.add('extreme-shake');
        slider.style.setProperty('--toggle-color', "#dc3545");
        startContainer.style.border = `10px double #dc3545`;
        levelDisplay.innerHTML = `<span class="extreme-shake" style="color:#dc3545;">Level ${currentLevel}</span><br><span class="extreme-shake" style="font-size: 18px; color:#dc3545;">EXTREME MODE</span>`;
    } else if (isHard) {
        startBtn.style.backgroundColor = "#007bff";
        slider.style.setProperty('--toggle-color', "#007bff");
        startContainer.style.border = `6px solid #007bff`;
        levelDisplay.innerHTML = `<span style="color:#007bff;">Level ${currentLevel}</span><br><span style="font-size: 18px; color:#007bff;">HARD MODE</span>`;
    } else {
        startBtn.style.backgroundColor = "#28a745";
        slider.style.setProperty('--toggle-color', "#28a745");
        startContainer.style.border = "none";
        levelDisplay.innerHTML = `<span style="color:#28a745;">Level ${currentLevel}</span><br><span style="font-size: 18px; color:#28a745;">NORMAL MODE</span>`;
    }

    if (currentLevel >= 11) {
        document.getElementById('shotgun-btn').style.display = 'block';
        document.getElementById('auto-device-btn').style.display = 'block';
    } else {
        document.getElementById('shotgun-btn').style.display = 'none';
        document.getElementById('auto-device-btn').style.display = 'none';
    }
    if (isManualMode || currentLevel === 1) startBtn.innerText = "START";
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";

    const hpBuyBtn = document.getElementById('hp-buy-btn');
    const cycleBtn = document.getElementById('bgm-cycle-btn');
    if (hasHeadphone) {
        let status = currentBGM === 1 ? "❄️" : currentBGM === 2 ? "🏝️" : currentBGM === 3 ? "🌌" : currentBGM === 4 ? "🎵" : "🔕";
        document.getElementById('headphone-display').innerText = `🎹${status}`;
        hpBuyBtn.style.display = 'none'; cycleBtn.style.display = 'block';
        cycleBtn.innerText = `🎹変更 (0コイン)`;
    } else {
        hpBuyBtn.style.display = 'block'; cycleBtn.style.display = 'none';
    }

    const sBtn = document.getElementById('shotgun-btn');
    if (!hasShotgun) { sBtn.innerText = "💥 ショットガン (50コイン)"; sBtn.disabled = totalCoins < 50; } 
    else { sBtn.innerText = `💥 弾 [${shotgunAmmo}/2] (30コイン)`; sBtn.disabled = (shotgunAmmo >= 2 || totalCoins < 30); }
    document.getElementById('ammo-display').innerText = (hasShotgun && shotgunAmmo > 0) ? "💥".repeat(shotgunAmmo) : "";

    const fBtn = document.getElementById('flashlight-btn');
    if (!hasFlashlight) { fBtn.innerText = "🔦 懐中電灯 (15コイン)"; fBtn.disabled = totalCoins < 15; } 
    else { fBtn.innerText = `🔦 10s追加 [${Math.ceil(flashlightBattery)}s] (5コイン)`; fBtn.disabled = (flashlightBattery >= FLASHLIGHT_MAX || totalCoins < 5); }
    
    document.getElementById('auto-status').innerText = hasAutoDevice ? (autoLoadState === "MOVING" ? "📍案内中" : "📍") : "";
    document.getElementById('level-text-ui').innerText = `Level ${currentLevel}/20`;
}

function buyHeadphone() { if (totalCoins >= 5) { totalCoins -= 5; hasHeadphone = true; updateUI(); resetAutoStartTimer(); } }
function cycleBGM() { currentBGM = (currentBGM === null) ? 1 : (currentBGM < 4 ? currentBGM + 1 : null); updateUI(); resetAutoStartTimer(); }
function buyShotgun() { if (!hasShotgun && totalCoins >= 50) { totalCoins -= 50; hasShotgun = true; shotgunAmmo = 2; } else if (totalCoins >= 30 && shotgunAmmo < 2) { totalCoins -= 30; shotgunAmmo++; } updateUI(); resetAutoStartTimer(); }
function buyFlashlight() { if (!hasFlashlight && totalCoins >= 15) { totalCoins -= 15; hasFlashlight = true; flashlightBattery = 60; } else if (totalCoins >= 5 && flashlightBattery < FLASHLIGHT_MAX) { totalCoins -= 5; flashlightBattery = Math.min(FLASHLIGHT_MAX, flashlightBattery + 10); } updateUI(); resetAutoStartTimer(); }
function buyAmulet() { if (!hasAmulet && totalCoins >= 25) { totalCoins -= 25; hasAmulet = true; coinMultiplier = 3; updateUI(); resetAutoStartTimer(); } }
function buyAutoDevice() { if (!hasAutoDevice && totalCoins >= 200) { totalCoins -= 200; hasAutoDevice = true; updateUI(); resetAutoStartTimer(); } }
function buyDevGlasses() { if (!hasDevGlasses && totalCoins >= 1000) { totalCoins -= 1000; hasDevGlasses = true; updateUI(); resetAutoStartTimer(); } }

function triggerDebugJump() { debugClickCount++; if (debugClickCount === 10) { currentLevel = 11; updateUI(); } else if (debugClickCount === 20) { currentLevel = 16; updateUI(); } }

function generateSimpleMaze() {
    const sizeMap = { 1:[5,7], 10:[15,19], 15:[17,21], 20:[17,21] };
    const s = sizeMap[currentLevel] || (currentLevel < 10 ? [9,11] : [13,15]);
    COLS = s[0]; ROWS = s[1];
    map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
    let sX = 1, sY = 1; player = { x: sX, y: sY }; map[sY][sX] = 0;
    
    const dig = (x, y) => {
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1 && map[ny][nx] === 1) { map[y + dy/2][x + dx/2] = 0; map[ny][nx] = 0; dig(nx, ny); }
        }
    };
    dig(sX, sY);
    
    let dists = Array.from({ length: ROWS }, () => Array(COLS).fill(-1)), q = [{x: sX, y: sY, d: 0, path: []}];
    dists[sY][sX] = 0; let furthest = {x:sX, y:sY, d:0, path:[]};
    while(q.length > 0) {
        let curr = q.shift();
        if(curr.d > furthest.d) furthest = curr;
        for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
            let nx = curr.x+dx, ny = curr.y+dy;
            if(ny>=0 && ny<ROWS && nx>=0 && nx<COLS && map[ny][nx]!==1 && dists[ny][nx]===-1) {
                dists[ny][nx] = curr.d + 1; q.push({x:nx, y:ny, d:curr.d+1, path:[...curr.path, {x:nx, y:ny}]});
            }
        }
    }
    goalPos = { x: furthest.x, y: furthest.y }; map[goalPos.y][goalPos.x] = 2;
    shortestPath = [{x:sX, y:sY}, ...furthest.path];
    
    // コイン配置
    shortestPath.forEach((p, i) => { if (i > 0 && i % 4 === 0 && map[p.y][p.x] === 0) map[p.y][p.x] = 3; });
    
    // 犬配置
    dogs = [];
    let dogCount = Math.min(15, currentLevel);
    for(let i=0; i<dogCount; i++) {
        let rx, ry;
        do { rx = Math.floor(Math.random()*COLS); ry = Math.floor(Math.random()*ROWS); }
        while(map[ry][rx]!==0 || Math.abs(rx-sX)+Math.abs(ry-sY) < 3);
        dogs.push({ x: rx, y: ry, isHunter: (currentLevel >= 16 && i < (currentLevel >= 18 ? 2 : 1)), lastX: rx, lastY: ry });
    }
}

function moveHunters() {
    if (currentLevel < 16) return;
    const walkDistGrid = (function(){
        let dG = Array.from({ length: ROWS }, () => Array(COLS).fill(Infinity));
        let q = [{x: player.x, y: player.y, d: 0}]; dG[player.y][player.x] = 0;
        while(q.length > 0) {
            let c = q.shift();
            for(let [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx=c.x+dx, ny=c.y+dy;
                if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1 && dG[ny][nx]===Infinity) {
                    dG[ny][nx]=c.d+1; q.push({x:nx, y:ny, d:c.d+1});
                }
            }
        }
        return dG;
    })();

    dogs.forEach(d => {
        if (!d.isHunter) return;
        d.lastX = d.x; d.lastY = d.y;
        let best = null, minDist = Infinity;
        for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
            let nx = d.x+dx, ny = d.y+dy;
            if (nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1) {
                if (walkDistGrid[ny][nx] < minDist) { minDist = walkDistGrid[ny][nx]; best = {x:nx, y:ny}; }
            }
        }
        if (best && minDist > 0) { d.x = best.x; d.y = best.y; }
    });
}

function playDefeatSequence(isHunter) {
    // 吠え声をキャンセルしてショットガンを最優先
    hunterWoofSnd.pause(); watchdogWoofSnd.pause();
    playOverlap(shotgunSnd);
    const caneSnd = isHunter ? hunterDefeatSnd : watchdogDefeatSnd;
    setTimeout(() => { if (gameStarted) playOverlap(caneSnd); }, 1300);
}

function movePlayer(dx, dy, isAuto = false) {
    if(!gameStarted) return;
    const oldPX = player.x, oldPY = player.y;
    const nx = player.x + dx, ny = player.y + dy;
    
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || map[ny][nx] === 1) { 
        if(!isAuto) playOscillator(55, 'sine', 0.15, 0.5); return;
    } 

    player.x = nx; player.y = ny;
    if (dx === -1) flipX = false; if (dx === 1) flipX = true;
    lastDir = { dx, dy }; lastMoveTime = Date.now();
    playerMoveCount++;

    if (currentLevel === 20 || (currentLevel >= 16 && playerMoveCount % 2 === 0)) moveHunters();

    // 1. 衝突判定 (重なり or すれ違い)
    let hitIdx = dogs.findIndex(d => 
        (d.x === player.x && d.y === player.y) || 
        (d.x === oldPX && d.y === oldPY && d.lastX === player.x && d.lastY === player.y)
    );

    if (hitIdx !== -1) {
        if (shotgunAmmo > 0) {
            shotgunAmmo--;
            const isH = dogs[hitIdx].isHunter;
            dogs.splice(hitIdx, 1);
            updateUI(); triggerShotgunEffect(); playDefeatSequence(isH);
        } else { triggerGameOver(); return; }
    } else {
        // 2. 隣接吠え判定 (衝突しなかった場合のみ)
        const adj = dogs.filter(d => Math.abs(d.x - player.x) + Math.abs(d.y - player.y) === 1);
        if (adj.length > 0) {
            if (adj.some(d => d.isHunter)) playOverlap(hunterWoofSnd);
            else playOverlap(watchdogWoofSnd);
        }
    }

    // 3. 環境判定
    if (map[ny][nx] === 2) {
        playGoalSound();
        if (currentLevel === 20) { gameStarted = false; stopAllBGM(); alert("Congratulations!"); resetGame(); }
        else { nextLevel(); }
    } else if (map[ny][nx] === 3) {
        playCoinSound(coinsCollectedInLevel); map[ny][nx] = 0;
        totalCoins += (currentLevel >= 11 ? 10 : 1) * coinMultiplier;
        coinsCollectedInLevel++; updateUI();
    }
    draw();
}

function nextLevel() {
    currentLevel++; gameStarted = false; stopAllBGM();
    if (isAutoDeviceUsedInThisLevel) hasAutoDevice = false;
    isAutoDeviceUsedInThisLevel = false;
    document.getElementById('start-container').classList.remove('opaque');
    document.getElementById('start-container').style.display = 'flex';
    setTimeout(() => { if(!gameStarted){ document.getElementById('start-container').classList.add('opaque'); startAutoStartCountdown(); } }, 1000);
    updateUI();
}

function triggerShotgunEffect() { shotgunRevealActive = true; setTimeout(() => { shotgunRevealActive = false; draw(); }, 300); draw(); }

function triggerGameOver() {
    gameStarted = false; playSound(biteSnd); stopAllBGM();
    setTimeout(() => { alert(gameOverMessages[Math.floor(Math.random()*gameOverMessages.length)]); resetGame(); }, 100);
}

function startGame() { 
    unlockAudio(); document.getElementById('start-container').style.display = 'none'; 
    gameStarted = true; generateSimpleMaze();
    if (hasHeadphone && currentBGM) {
        const bgm = document.getElementById(currentBGM === 1 ? 'bgm-koori' : currentBGM === 2 ? 'bgm-hikari' : currentBGM === 3 ? 'bgm-suzumusi' : 'bgm-brown');
        if (bgm) { bgm.currentTime = 0; bgm.play(); }
    }
    updateUI(); draw(); 
}

function resetGame() { currentLevel = 1; totalCoins = 0; hasAmulet = hasAutoDevice = hasFlashlight = hasShotgun = hasHeadphone = false; updateUI(); startGame(); }

async function playOscillator(f, t, d, vol = 0.06) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function playCoinSound(step) { playOscillator(WHITE_KEYS[step % 22], 'sine', 0.1); }
function playGoalSound() { [523, 659, 783].forEach((f, i) => setTimeout(() => playOscillator(f, 'triangle', 0.3), i * 100)); }

function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let px = oX+x*size, py = oY+y*size;
            if (map[y][x] === 1) ctx.drawImage(wallImg, px, py, size, size);
            else if (map[y][x] === 2) { ctx.fillStyle="#fff"; ctx.fillRect(px,py,size,size); ctx.fillStyle="#000"; ctx.fillText("GOAL", px+size/4, py+size/2); }
            else if (map[y][x] === 3) { ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill(); }
        }
    }
    dogs.forEach(d => ctx.drawImage(d.isHunter?hunterImg:dogImg, oX+d.x*size, oY+d.y*size, size, size));
    ctx.drawImage(playerImg, oX+player.x*size, oY+player.y*size, size, size);

    if (isBlind && gameStarted && !shotgunRevealActive) {
        ctx.globalCompositeOperation = 'multiply';
        ctx.fillStyle = "#000";
        // 簡易視界制限（懐中電灯ロジックは既存を継承可能）
        ctx.globalCompositeOperation = 'source-over';
    }
}

let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    if (tsX === null || tsY === null) return;
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
        if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0); else movePlayer(0, dy > 0 ? 1 : -1);
    }
    tsX = tsY = null;
});
window.onresize = draw; updateUI();
</script>
