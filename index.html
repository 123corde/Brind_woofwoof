<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 15px; left: 15px; pointer-events: none; z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6); color: #fff; padding: 10px; border-radius: 6px; font-size: min(14px, 3.5vw); max-width: 80%; }
        .item-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; height: 1.5em; }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 300; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #start-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.35); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; overflow-y: auto; transition: background-color 2.0s ease-in-out; }
        #start-container > * { opacity: 0; transition: opacity 2.0s ease-in-out; pointer-events: none; }
        #start-container.opaque { background: rgba(255,255,255,1.0) !important; }
        #start-container.opaque > * { opacity: 1; pointer-events: auto; }
        .start-action-row { display: flex; align-items: center; gap: 20px; margin: 10px 0; justify-content: center; }
        #start-btn { padding: 15px 40px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; min-width: 240px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--toggle-color, #28a745); }
        input:checked + .slider:before { transform: translateX(24px); }
        .shop-btn { padding: 10px; margin: 3px; background: #ffd54f; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; flex-shrink: 0; }
        .shop-btn:disabled { background: #ccc !important; cursor: not-allowed; color: #777 !important; }
        #auto-status { color: #fff; font-size: 1.1em; font-weight: bold; }
        #level-display { cursor: default; user-select: none; -webkit-user-select: none; line-height: 1.2; font-weight: bold; font-size: 28px; }
        @keyframes extreme-shake { 0% { transform: translate(0,0); } 20% { transform: translate(1px, -1px); } 40% { transform: translate(-1px, 1px); } 60% { transform: translate(1px, 1px); } 80% { transform: translate(-1px, -1px); } 100% { transform: translate(0,0); } }
        .extreme-shake { animation: extreme-shake 0.1s infinite; display: inline-block; }
    </style>
</head>
<body>

    <div id="start-container" class="opaque">
        <div id="level-display" onclick="triggerDebugJump()">Level 1</div>
        <br><br>
        <button id="hp-buy-btn" class="shop-btn" onclick="buyHeadphone()">🎹 キーボード (5コイン)</button>
        <button id="bgm-cycle-btn" class="shop-btn" style="display:none;" onclick="cycleBGM()"></button>        
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()"></button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運アップお守り (25コイン)</button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()" style="display: none;"></button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()" style="display: none;">📍 Google Map (200コイン)</button>
        <button id="dev-glass-btn" class="shop-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (1000コイン)</button>
        <br>
        <div class="start-action-row">
            <button id="start-btn" onclick="startGame()">START</button>
            <div id="toggle-container" style="display: flex; flex-direction: column; align-items: center;">
                <label class="switch">
                    <input type="checkbox" id="mode-toggle" checked onchange="toggleStartMode(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="item-row">
            <div id="amulet-display"></div>
            <div id="headphone-display"></div>
            <div id="ammo-display"></div>
            <div id="auto-status"></div>
            <div id="flashlight-display"></div>
        </div>
        <div id="level-text-ui" style="font-size: 1.1em; color: #fff; margin-bottom: 2px;">Level 1/20</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
        <div id="ver-text" style="font-size: 0.85em; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    <audio id="bgm-suzumusi" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Suzumusi.mp3" loop></audio>
    <audio id="bgm-brown" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Brown_Noise.mp3" loop></audio>
    
    <canvas id="gameCanvas"></canvas>

<script>
const GAME_VERSION = "20.2.0"; 
const wallImg = new Image(); wallImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/blue_wall.png';
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';
const hunterImg = new Image(); hunterImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter.png';
const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogwoof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const dogCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane.wav');

let audioCtx = null, soundReady = false;
let isBlind = true, gameStarted = false;
let autoStartTimeout = null, countdownInterval = null, isManualMode = false; 

let currentLevel = 1, totalCoins = 101000, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false;
let hasHeadphone = false, currentBGM = null; 

let hasShotgun = false, shotgunAmmo = 0, shotgunRevealActive = false; 
let hasFlashlight = false, flashlightBattery = 0;
const FLASHLIGHT_MAX = 200, FLASHLIGHT_BONUS = 180;
let lastDir = { dx: 0, dy: -1 }, flipX = false, debugClickCount = 0;

let ROWS, COLS, map = [], dogs = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let shortestPath = [], shortestPathSet = new Set(), playerStepCounter = 0;
let coinsCollectedInLevel = 0;
let lastMoveTime = Date.now(), autoMoveTimeout = null, autoLoadState = "NONE", loadingDots = 0;
let isAutoDeviceUsedInThisLevel = false;

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 1975.53, 2093.00];

const gameOverMessages = ["一度噛んだら離さない。","ガブッ！","あなたの骨が砕ける音...","愛情(物理)！","🐾ードモードはコイン10倍。","懐中電灯をケチるな。","今日はもう寝なさい。"];

function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const silentPlay = (audio) => { audio.muted = true; audio.play().then(() => { audio.pause(); audio.currentTime = 0; audio.muted = false; }).catch(e => {}); };
    [growlSnd, biteSnd, dogCrySnd].forEach(silentPlay);
    soundReady = true;
}
function playSound(audio) { if (!audio) return; audio.pause(); audio.currentTime = 0; audio.play().catch(e => {}); }
function stopAllBGM() { ['bgm-koori', 'bgm-hikari', 'bgm-suzumusi', 'bgm-brown'].forEach(id => { const el = document.getElementById(id); if (el) el.pause(); }); }
function toggleStartMode(isAuto) {
    isManualMode = !isAuto;
    const startBtn = document.getElementById('start-btn');
    if (isManualMode) { if (autoStartTimeout) clearTimeout(autoStartTimeout); if (countdownInterval) clearInterval(countdownInterval); startBtn.innerText = "START"; }
    else if (currentLevel >= 2) startAutoStartCountdown();
}
function startAutoStartCountdown() {
    if (gameStarted) return;
    const startBtn = document.getElementById('start-btn');
    if (autoStartTimeout) clearTimeout(autoStartTimeout);
    if (countdownInterval) clearInterval(countdownInterval);
    if (isManualMode || currentLevel < 2) { startBtn.innerText = "START"; return; }
    let remaining = 10; startBtn.innerText = `START (${remaining}s)`;
    countdownInterval = setInterval(() => { remaining--; if (remaining <= 0) { clearInterval(countdownInterval); startBtn.innerText = "START"; } else { startBtn.innerText = `START (${remaining}s)`; } }, 1000);
    autoStartTimeout = setTimeout(() => { if (!gameStarted && !isManualMode) startGame(); }, 10000);
}
function resetAutoStartTimer() { if (!gameStarted && currentLevel >= 2 && !isManualMode) startAutoStartCountdown(); }

function updateUI() {
    document.getElementById('ver-text').innerText = `ver.${GAME_VERSION}`;
    const isHard = currentLevel >= 11 && currentLevel <= 15, isExtreme = currentLevel >= 16;
    const startBtn = document.getElementById('start-btn'), startContainer = document.getElementById('start-container');
    const levelDisplay = document.getElementById('level-display'), slider = document.querySelector('.slider');
    startBtn.classList.remove('extreme-shake');
    if (isExtreme) {
        const modeColor = "#dc3545"; startBtn.style.backgroundColor = modeColor; startBtn.classList.add('extreme-shake'); slider.style.setProperty('--toggle-color', modeColor); startContainer.style.border = `10px double ${modeColor}`;
        levelDisplay.innerHTML = `<span class="extreme-shake" style="color:${modeColor};">Level ${currentLevel}</span><br><span class="extreme-shake" style="font-size: 18px; color:${modeColor};">EXTREME MODE</span>`;
    } else if (isHard) {
        const modeColor = "#007bff"; startBtn.style.backgroundColor = modeColor; slider.style.setProperty('--toggle-color', modeColor); startContainer.style.border = `6px solid ${modeColor}`;
        levelDisplay.innerHTML = `<span style="color:${modeColor};">Level ${currentLevel}</span><br><span style="font-size: 18px; color:${modeColor};">HARD MODE</span>`;
    } else {
        const modeColor = "#28a745"; startBtn.style.backgroundColor = modeColor; slider.style.setProperty('--toggle-color', modeColor); startContainer.style.border = "none";
        levelDisplay.innerHTML = `<span style="color:${modeColor};">Level ${currentLevel}</span><br><span style="font-size: 18px; color:${modeColor};">NORMAL MODE</span>`;
    }
    document.getElementById('toggle-container').style.visibility = (currentLevel === 1) ? 'hidden' : 'visible';
    document.getElementById('shotgun-btn').style.display = (currentLevel >= 11) ? 'block' : 'none';
    document.getElementById('auto-device-btn').style.display = (currentLevel >= 11) ? 'block' : 'none';
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";
    document.getElementById('dev-glass-btn').disabled = (hasDevGlasses || totalCoins < 1000);
    
    const hpBuyBtn = document.getElementById('hp-buy-btn'), cycleBtn = document.getElementById('bgm-cycle-btn'), hpDisplay = document.getElementById('headphone-display');
    if (hasHeadphone) {
        let icons = ["🔕", "❄️", "🏝️", "🌌", "🎵"];
        hpDisplay.innerText = `🎹${icons[currentBGM || 0]}`; hpBuyBtn.style.display = 'none'; cycleBtn.style.display = 'block';
        cycleBtn.innerText = `🎹BGM変更 (0コイン)`;
    } else { hpDisplay.innerText = ""; hpBuyBtn.style.display = 'block'; hpBuyBtn.disabled = totalCoins < 5; cycleBtn.style.display = 'none'; }

    const sBtn = document.getElementById('shotgun-btn');
    if (!hasShotgun) { sBtn.innerText = "💥 ショットガン (50コイン)"; sBtn.disabled = totalCoins < 50; } 
    else { sBtn.innerText = `💥 弾 [${shotgunAmmo}/2] (30コイン)`; sBtn.disabled = (shotgunAmmo >= 2 || totalCoins < 30); }
    document.getElementById('ammo-display').innerText = (hasShotgun && shotgunAmmo > 0) ? "💥".repeat(shotgunAmmo) : "";

    const fBtn = document.getElementById('flashlight-btn');
    if (!hasFlashlight) { fBtn.innerText = "🔦 懐中電灯 (15コイン)"; fBtn.disabled = totalCoins < 15; } 
    else { fBtn.innerText = `🔦 充電 [${Math.ceil(flashlightBattery)}/${FLASHLIGHT_MAX}s] (5コイン)`; fBtn.disabled = (flashlightBattery >= FLASHLIGHT_MAX || totalCoins < 5); }
    const fDisplay = document.getElementById('flashlight-display');
    if (hasFlashlight && flashlightBattery > 0) { fDisplay.innerText = `🔦${Math.ceil(flashlightBattery)}s`; fDisplay.style.color = (flashlightBattery < 10) ? "#ff4444" : "#fff"; } else { fDisplay.innerText = ""; }

    document.getElementById('auto-device-btn').disabled = (hasAutoDevice || totalCoins < 200);
    document.getElementById('amulet-btn').disabled = (hasAmulet || totalCoins < 25);
    document.getElementById('controls').style.display = hasDevGlasses ? 'block' : 'none';
    document.getElementById('level-text-ui').innerText = `Level ${currentLevel}/20${isExtreme ? " (EXTREME)" : (isHard ? " (HARD)" : "")}`;
    
    let autoText = hasAutoDevice ? (autoLoadState === "NONE" ? "📍" : (autoLoadState === "LOADING" ? "📡"+".".repeat(loadingDots) : `📍[追跡中](${getDistanceToGoal()}s)`)) : "";
    document.getElementById('auto-status').innerText = autoText;
}

function buyHeadphone() { if (totalCoins >= 5) { totalCoins -= 5; hasHeadphone = true; updateUI(); resetAutoStartTimer(); } }
function cycleBGM() { currentBGM = (currentBGM === null) ? 1 : (currentBGM < 4 ? currentBGM + 1 : null); updateUI(); resetAutoStartTimer(); }
function buyShotgun() { if (!hasShotgun && totalCoins >= 50) { totalCoins -= 50; hasShotgun = true; shotgunAmmo = 2; } else if (totalCoins >= 30 && shotgunAmmo < 2) { totalCoins -= 30; shotgunAmmo++; } updateUI(); resetAutoStartTimer(); }
function buyFlashlight() { if (!hasFlashlight && totalCoins >= 15) { totalCoins -= 15; hasFlashlight = true; flashlightBattery = 60; } else if (totalCoins >= 5 && flashlightBattery < FLASHLIGHT_MAX) { totalCoins -= 5; flashlightBattery = Math.min(FLASHLIGHT_MAX, flashlightBattery + 10); } updateUI(); resetAutoStartTimer(); }
function buyAmulet() { if (!hasAmulet && totalCoins >= 25) { totalCoins -= 25; hasAmulet = true; coinMultiplier = 3; updateUI(); resetAutoStartTimer(); } }
function buyAutoDevice() { if (!hasAutoDevice && totalCoins >= 200) { totalCoins -= 200; hasAutoDevice = true; updateUI(); resetAutoStartTimer(); } }
function buyDevGlasses() { if (!hasDevGlasses && totalCoins >= 1000) { totalCoins -= 1000; hasDevGlasses = true; updateUI(); resetAutoStartTimer(); } }
function triggerDebugJump() { if (gameStarted) return; debugClickCount++; if (debugClickCount === 10) { currentLevel = 11; updateUI(); resetAutoStartTimer(); } else if (debugClickCount === 20) { currentLevel = 16; updateUI(); resetAutoStartTimer(); } }

function generateSimpleMaze() {
    const mazeSizes = { 1:[6,5], 2:[6,7], 3:[6,8], 4:[8,10], 5:[8,10], 6:[10,13], 7:[10,13], 8:[12,15], 9:[12,15], 10:[16,19], 11:[16,20], 12:[16,20], 13:[16,20], 14:[16,20], 15:[18,21], 16:[16,19], 17:[16,19], 18:[16,19], 19:[16,20], 20:[18,21] };
    const size = mazeSizes[currentLevel] || [18, 21]; COLS = size[0]; ROWS = size[1];
    let found = false, attempts = 0;
    while (!found && attempts < 50) {
        attempts++; map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
        let sX = 1 + Math.floor(Math.random() * (Math.floor((COLS - 1) / 2))) * 2;
        let sY = 1 + Math.floor(Math.random() * (Math.floor((ROWS - 1) / 2))) * 2;
        player = { x: sX, y: sY }; map[sY][sX] = 0;
        let walkTarget = Math.floor(ROWS * COLS * 0.35), walked = 1, rx = sX, ry = sY;
        for (let i = 0; i < 2000 && walked < walkTarget; i++) {
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]], [dx, dy] = dirs[Math.floor(Math.random() * 4)];
            let nx = rx + dx, ny = ry + dy; if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1) { if(map[ny][nx] === 1) { map[ny][nx] = 0; walked++; } rx = nx; ry = ny; }
        }
        const dig = (x, y) => {
            let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
            for(let [dx, dy] of dirs) {
                let nx = x + dx, ny = y + dy; if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1 && map[ny][nx] === 1) { map[y + dy/2][x + dx/2] = 0; map[ny][nx] = 0; dig(nx, ny); }
            }
        };
        for(let y = 1; y < ROWS; y += 2) for(let x = 1; x < COLS; x += 2) if(x < COLS-1 && y < ROWS-1 && map[y][x] === 0) dig(x, y);
        
        let dists = Array.from({ length: ROWS }, () => Array(COLS).fill(-1)), q = [{x: sX, y: sY, d: 0, fullPath: [{x:sX,y:sY}]}]; 
        dists[sY][sX] = 0; let allWalkable = [];
        while(q.length > 0) {
            let curr = q.shift(); allWalkable.push(curr);
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = curr.x + dx, ny = curr.y + dy;
                if(ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS && map[ny][nx] !== 1 && dists[ny][nx] === -1) { dists[ny][nx] = curr.d + 1; q.push({x: nx, y: ny, d: curr.d + 1, fullPath: [...curr.fullPath, {x: nx, y: ny}]}); }
            }
        }
        allWalkable.sort((a, b) => dists[b.y][b.x] - dists[a.y][a.x]);
        let target = allWalkable[0];
        if(target && dists[target.y][target.x] > 2) {
            map[target.y][target.x] = 2; goalPos = { x: target.x, y: target.y };
            shortestPath = target.fullPath; shortestPathSet = new Set(shortestPath.map(p => `${p.x},${p.y}`));
            coinsCollectedInLevel = 0;
            if (currentLevel <= 10) {
                let stepSize = { 1:1, 2:1, 3:2, 4:2, 5:3, 6:3, 7:4, 8:4, 9:5, 10:5 }[currentLevel] || 5;
                for (let i = 0; i < shortestPath.length; i += stepSize) { let p = shortestPath[i]; if (!(p.x === goalPos.x && p.y === goalPos.y)) map[p.y][p.x] = 3; }
            } else {
                let walkableTiles = allWalkable.filter(p => map[p.y][p.x] === 0 && !(p.x === player.x && p.y === player.y));
                walkableTiles.sort(() => Math.random() - 0.5);
                for (let i = 0; i < Math.min(currentLevel, walkableTiles.length); i++) map[walkableTiles[i].y][walkableTiles[i].x] = 3;
            }
            dogs = [];
            let nHunters = 0;
            if (currentLevel === 16 || currentLevel === 17) nHunters = 1;
            else if (currentLevel >= 18) nHunters = 2;

            let dogNum = Math.min(15, currentLevel - 1);
            let safetyZone = new Set([`${player.x},${player.y}`]);
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => safetyZone.add(`${player.x + dx},${player.y + dy}`));
            
            let spawnCandidates = allWalkable.filter(p => !safetyZone.has(`${p.x},${p.y}`) && map[p.y][p.x] !== 2);
            spawnCandidates.sort(() => Math.random() - 0.5);

            for(let i = 0; i < dogNum && spawnCandidates.length > 0; i++) {
                let p = spawnCandidates.pop();
                let isHunter = (i < nHunters);
                dogs.push({ x: p.x, y: p.y, isHunter: isHunter });
            }
            found = true;
        }
    }
}

function moveHunters() {
    const trigger = (currentLevel === 20) ? 1 : 2;
    if (playerStepCounter % trigger !== 0) return;

    dogs.forEach(d => {
        if (!d.isHunter) return;
        let q = [{x: d.x, y: d.y, path: []}], visited = new Set([`${d.x},${d.y}`]);
        let foundStep = null;
        while(q.length > 0) {
            let curr = q.shift();
            if (curr.x === player.x && curr.y === player.y) { foundStep = curr.path[0]; break; }
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = curr.x + dx, ny = curr.y + dy, key = `${nx},${ny}`;
                // 壁を避け、最短経路(shortestPath)を踏まない
                if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] !== 1 && !shortestPathSet.has(key) && !visited.has(key)) {
                    visited.add(key); q.push({x: nx, y: ny, path: [...curr.path, {x: nx, y: ny}]});
                }
            }
        }
        if (foundStep) { d.x = foundStep.x; d.y = foundStep.y; }
    });
}

function movePlayer(dx, dy, isAuto = false) {
    if(!gameStarted) return;
    if (!isAuto) { lastMoveTime = Date.now(); stopAutoProcess(); }
    lastDir = { dx, dy }; flipX = dx !== 0 ? dx === 1 : flipX;
    const nx = player.x + dx, ny = player.y + dy;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || map[ny][nx] === 1) { if(!isAuto) playOscillator(55, 'sine', 0.15, 0.5); return; }
    
    player.x = nx; player.y = ny; playerStepCounter++;
    moveHunters();

    let dogHit = dogs.findIndex(d => d.x === player.x && d.y === player.y);
    if (dogHit !== -1) {
        if (shotgunAmmo > 0) { 
            shotgunAmmo--; playSound(dogCrySnd); dogs.splice(dogHit, 1);
            setTimeout(() => { shotgunRevealActive = true; draw(); setTimeout(() => { shotgunRevealActive = false; draw(); }, 250); }, 500);
            updateUI(); 
        } else { gameOver(); return; }
    }
    if (!isAuto && dogs.some(d => Math.abs(d.x-player.x)+Math.abs(d.y-player.y)===1)) playSound(growlSnd);
    if (map[ny][nx] === 2) { 
        if (currentLevel === 20) { gameStarted = false; stopAllBGM(); alert("Congratulations!"); resetGame(); return; }
        nextLevel(); 
    } else if (map[ny][nx] === 3) {
        playCoinSound(coinsCollectedInLevel); map[ny][nx] = 0; totalCoins += (currentLevel >= 11 ? 10 : 1) * coinMultiplier; coinsCollectedInLevel++; updateUI();
    }
    draw();
}

function nextLevel() {
    currentLevel++; playerStepCounter = 0; isBlind = !hasDevGlasses; gameStarted = false; stopAutoProcess(); stopAllBGM();
    document.getElementById('start-container').classList.remove('opaque'); document.getElementById('start-container').style.display = 'flex';
    setTimeout(() => { if(!gameStarted) { document.getElementById('start-container').classList.add('opaque'); startAutoStartCountdown(); } }, 1750);
    updateUI();
}
function gameOver() { gameStarted = false; playSound(biteSnd); stopAllBGM(); alert(gameOverMessages[Math.floor(Math.random()*gameOverMessages.length)]); resetGame(); }
function startGame() { 
    if (autoStartTimeout) clearTimeout(autoStartTimeout); if (countdownInterval) clearInterval(countdownInterval);
    unlockAudio(); document.getElementById('start-container').style.display = 'none'; gameStarted = true; lastMoveTime = Date.now(); debugClickCount = 0;
    if (hasHeadphone && currentBGM !== null) {
        const bgms = [null, 'bgm-koori', 'bgm-hikari', 'bgm-suzumusi', 'bgm-brown'];
        const active = document.getElementById(bgms[currentBGM]); if (active) { active.volume = (currentBGM === 4) ? 0.04 : 0.05; active.currentTime = 0; active.play().catch(e => {}); }
    }
    generateSimpleMaze(); updateUI(); draw(); 
}
function resetGame() { 
    if (autoStartTimeout) clearTimeout(autoStartTimeout); if (countdownInterval) clearInterval(countdownInterval);
    currentLevel = 1; totalCoins = 0; hasAmulet = hasAutoDevice = hasDevGlasses = hasFlashlight = hasShotgun = hasHeadphone = false; shotgunAmmo = flashlightBattery = currentBGM = 0; coinMultiplier = 1; gameStarted = false; isBlind = true; stopAutoProcess(); document.getElementById('start-container').style.display = 'flex'; updateUI(); 
}
function toggleBlind() { isBlind = !isBlind; draw(); }
function playCoinSound(step) {
    const f = WHITE_KEYS[step % WHITE_KEYS.length];
    if (hasAmulet) [1, 1.25, 1.5].forEach((r, i) => setTimeout(() => playOscillator(f * r, 'sine', 0.25), i * 25)); else playOscillator(f, 'sine', 0.15);
}
async function playGoalSound() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playOscillator(f, 'triangle', 0.4), i * 150)); }
async function playOscillator(f, t, d, vol = 0.06) { if (!audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }
function getDistanceToGoal() { let q = [{x: player.x, y: player.y, d: 0}], visited = new Set([`${player.x},${player.y}`]); const dogSet = new Set(dogs.map(d => `${d.x},${d.y}`)); while(q.length > 0) { let curr = q.shift(); if(map[curr.y][curr.x] === 2) return curr.d; for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) { let nx = curr.x+dx, ny = curr.y+dy, key = `${nx},${ny}`; if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1 && !visited.has(key) && !dogSet.has(key)) { visited.add(key); q.push({x: nx, y: ny, d: curr.d + 1}); } } } return 0; }
function stopAutoProcess() { autoLoadState = "NONE"; if (autoMoveTimeout) { clearTimeout(autoMoveTimeout); autoMoveTimeout = null; } updateUI(); }

function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let px = oX + x * size, py = oY + y * size;
            if (map[y][x] === 1) { 
                if (wallImg.complete && wallImg.naturalWidth !== 0) ctx.drawImage(wallImg, px, py, size + 0.5, size + 0.5);
                else { ctx.fillStyle = "#333"; ctx.fillRect(px, py, size, size); }
            } else if (map[y][x] === 2) {
                let cw=size/3, ch=size/4; for(let r=0; r<4; r++) for(let c=0; c<3; c++) { ctx.fillStyle=(r+c)%2===0?"#fff":"#000"; ctx.fillRect(px+c*cw, py+r*ch, cw, ch); }
            } else if (map[y][x] === 3) {
                ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#5d4037"; ctx.font=`bold ${size/2.5}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("$", px+size/2, py+size/2);
            }
        }
    }
    dogs.forEach(d => ctx.drawImage(d.isHunter ? hunterImg : dogImg, oX+d.x*size, oY+d.y*size, size, size));
    ctx.save(); if (flipX) { ctx.translate(oX+player.x*size + size, oY+player.y*size); ctx.scale(-1, 1); ctx.drawImage(playerImg, 0, 0, size, size); } else { ctx.drawImage(playerImg, oX+player.x*size, oY+player.y*size, size, size); } ctx.restore();
    if (isBlind && gameStarted && !shotgunRevealActive) { 
        ctx.save(); const temp = document.createElement('canvas'); temp.width = canvas.width; temp.height = canvas.height; const t = temp.getContext('2d');
        t.fillStyle = "black"; t.fillRect(0, 0, canvas.width, canvas.height);
        if (hasFlashlight && flashlightBattery > 0) {
            const cX = oX+player.x*size+size/2, cY = oY+player.y*size+size/2, ang = Math.atan2(lastDir.dy, lastDir.dx);
            let b = Math.min(1, flashlightBattery < 10 ? flashlightBattery / 10 : 1); if (flashlightBattery < 4 && Math.random() > 0.7) b *= 0.4;
            t.globalCompositeOperation = 'destination-out';
            let ftr=size*0.6, fr=size*1.8, fw=0.3; if(flashlightBattery>=FLASHLIGHT_BONUS) { ftr=size*1.5; fr=size*4.5; fw=0.5; }
            const g1 = t.createRadialGradient(cX, cY, 0, cX, cY, ftr); g1.addColorStop(0, `rgba(0,0,0,${b})`); g1.addColorStop(1, 'rgba(0,0,0,0)');
            t.fillStyle = g1; t.beginPath(); t.arc(cX, cY, ftr, 0, Math.PI*2); t.fill();
            const g2 = t.createRadialGradient(cX, cY, size*0.3, cX, cY, fr); g2.addColorStop(0, `rgba(0,0,0,${b})`); g2.addColorStop(1, 'rgba(0,0,0,0)');
            t.fillStyle = g2; t.beginPath(); t.moveTo(cX, cY); t.arc(cX, cY, fr, ang-fw, ang+fw); t.closePath(); t.fill();
        } ctx.drawImage(temp, 0, 0); ctx.restore();
    }
}
let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => { if (tsX === null || tsY === null) return; const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY; if (Math.abs(dx) > 20 || Math.abs(dy) > 20) { movePlayer(Math.abs(dx)>Math.abs(dy)?(dx>0?1:-1):0, Math.abs(dy)>Math.abs(dx)?(dy>0?1:-1):0); } tsX = tsY = null; });
window.addEventListener('mousedown', resetAutoStartTimer); window.addEventListener('touchstart', resetAutoStartTimer, {passive: true});
window.onresize = draw; updateUI(); draw();
</script>
