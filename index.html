<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スイカ割り迷宮 - 手探り強化Edition</title>
    <style>
        body { margin: 0; background: #fff; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; z-index: 10; 
            font-weight: bold; background: rgba(0,0,0,0.7); color: #fff; padding: 10px; border-radius: 6px;
        }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
        #game-desc {
            margin-top: 10px; font-size: 13px; line-height: 1.5; color: #555;
            max-width: 400px; border-top: 1px solid #ccc; padding-top: 10px;
        }
        #start-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        
        .shop-btn { padding: 10px; margin: 5px; background: #ffc107; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 280px; }
        .shop-btn:disabled { background: #ccc; cursor: not-allowed; }
        .dev-btn { background: #6c757d; color: white; }
        #auto-status { color: #4285F4; font-size: 14px; height: 1.4em; font-weight: bold; text-shadow: 0 0 2px white; }
    </style>
</head>
<body>

    <div id="start-container">
        <div id="level-display" style="font-size: 28px; font-weight: bold;">Level 1</div>
        <div id="coin-status">所持コイン: 0枚</div>

        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運お守り (3コイン)</button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()">📍 Google Map (5コイン)</button>
        <button id="dev-glass-btn" class="shop-btn dev-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (0コイン)</button>
        
        <button id="start-btn" onclick="startGame()">ゲームを開始する</button>

        <div id="game-desc">
            <b>画面を見なくてもOK</b><br>
            😪<b>寝落ちする体勢でのプレイを推奨します</b>😴<br>
            <br>    
            ・上下左右にスワイプで移動<br>
            ・コインはゴールに近いほど高音になるよ<br>
            ・<b>Levelが進むとコインの間隔が広くなります</b><br>
            ・迷宮に潜むイッヌに気を付けて
        </div>
    </div>

    <div id="ui">
        <div id="auto-status"></div>
        <div id="mode-text">ブラインド</div>
        <div id="total-coins">所持コイン: 0</div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">Dev Mode</button></div>
    <canvas id="gameCanvas"></canvas>

<script>
// ==========================================
// 基本設定 & サウンド
// ==========================================
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';
const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogwoof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');

let audioCtx = null, soundReady = false;
let isBlind = true, gameStarted = false;
let currentLevel = 1, totalCoins = 0, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false;

let ROWS, COLS, map = [], dogs = [], player = { x: 0, y: 0 };
let shortestPath = [], coinsCollectedInLevel = 0;
let lastMoveTime = Date.now(), autoMoveTimeout = null, autoLoadState = "NONE";

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 1975.53, 2093.00];

function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    [growlSnd, biteSnd].forEach(s => {
        s.play().then(() => { setTimeout(() => { s.pause(); s.currentTime = 0; }, 1); }).catch(e => {});
    });
    soundReady = true;
}

// ==========================================
// 迷路生成 & コイン配置ロジック
// ==========================================
function generateSimpleMaze() {
    ROWS = COLS = 6 + (currentLevel * 2);
    let found = false;
    while (!found) {
        map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
        let sX = 1 + Math.floor(Math.random()*(COLS-2)), sY = 1 + Math.floor(Math.random()*(ROWS-2));
        player = { x: sX, y: sY }; let x = sX, y = sY; map[y][x] = 0;
        let fill = ROWS * COLS * (0.55 - (currentLevel * 0.01));
        for(let i=0; i < fill; i++) {
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]], [dx, dy] = dirs[Math.floor(Math.random()*4)];
            if(x+dx > 0 && x+dx < COLS-1 && y+dy > 0 && y+dy < ROWS-1) { x += dx; y += dy; map[y][x] = 0; }
        }
        
        // パス探索
        let dists = Array.from({ length: ROWS }, () => Array(COLS).fill(-1)), q = [{x: sX, y: sY, d: 0, fullPath: []}]; dists[sY][sX] = 0;
        let allWalkable = [];
        while(q.length > 0) {
            let curr = q.shift(); allWalkable.push(curr);
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = curr.x+dx, ny = curr.y+dy;
                if(ny>=0 && ny<ROWS && nx>=0 && nx<COLS && map[ny][nx]===0 && dists[ny][nx]===-1) {
                    dists[ny][nx] = curr.d+1; q.push({x: nx, y: ny, d: curr.d+1, fullPath: [...curr.fullPath, {x: nx, y: ny}]});
                }
            }
        }

        let cand = allWalkable.filter(p => dists[p.y][p.x] >= ROWS * 1.2 + currentLevel);
        if(cand.length > 0) {
            let target = cand[Math.floor(Math.random()*cand.length)];
            map[target.y][target.x] = 2; // Goal
            shortestPath = target.fullPath;
            coinsCollectedInLevel = 0;

            // --- コイン配置間隔の設定 ---
            let interval = 0; // デフォルト0（全マス）
            if (currentLevel >= 2 && currentLevel <= 3) interval = 1;
            else if (currentLevel >= 4 && currentLevel <= 5) interval = 2;
            else if (currentLevel >= 6 && currentLevel <= 7) interval = 3;
            else if (currentLevel === 8) interval = 4;
            else if (currentLevel === 9) interval = 5;
            else if (currentLevel >= 10) interval = -1; // コインなし

            // 最短経路にコインを置く
            if (interval !== -1) {
                shortestPath.forEach((p, idx) => {
                    // ゴールではなく、かつ指定間隔(interval+1)ごとの場合に配置
                    if (!(p.x === target.x && p.y === target.y) && (idx % (interval + 1) === 0)) {
                        map[p.y][p.x] = 3;
                    }
                });
            }

            // 犬の配置（安全圏外）
            dogs = [];
            let safetyZone = new Set();
            shortestPath.concat({x: player.x, y: player.y}).forEach(p => {
                for(let dy=-1; dy<=1; dy++) for(let dx=-1; dx<=1; dx++) safetyZone.add(`${p.x+dx},${p.y+dy}`);
            });
            let dCand = allWalkable.filter(p => !safetyZone.has(`${p.x},${p.y}`));
            let dogNum = (currentLevel >= 10) ? Math.floor(currentLevel * 0.8) : Math.max(0, currentLevel - 1);
            for(let i=0; i < dogNum && dCand.length > 0; i++) {
                let idx = Math.floor(Math.random()*dCand.length);
                dogs.push(dCand[idx]); dCand.splice(idx,1);
            }
            found = true;
        }
    }
}

// ==========================================
// ゲーム進行 & 移動
// ==========================================
function movePlayer(dx, dy, isAuto = false) {
    if(!gameStarted) return;
    if (!isAuto) { lastMoveTime = Date.now(); stopAutoProcess(); }
    const nx = player.x + dx, ny = player.y + dy;
    
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || map[ny][nx] === 1) {
        if(!isAuto) playOscillator(150, 'square', 0.1);
    } else {
        player.x = nx; player.y = ny;
        
        if (dogs.some(d => d.x === player.x && d.y === player.y)) {
            gameStarted = false; biteSnd.play().catch(e=>{});
            const messages = [
                "\n\n~~ GAME OVER ~~\n\nイッヌの執念があなたを Level1 まで引き戻しました。",
                "\n\n~~ GAME OVER ~~\n\nガブッ！\nイッヌがあなたを骨付き肉と勘違いしました。",
                "\n\n~~ GAME OVER ~~\n\nあなたの骨が砕ける音だけが迷宮に響きました。",
                "\n\n~~ GAME OVER ~~\n\nイッヌの愛情(物理)を受け、あなたは意識を失いました。"
            ];
            setTimeout(() => { alert(messages[Math.floor(Math.random()*messages.length)]); resetGame(); }, 100);
            return;
        }

        if (dogs.some(d => Math.abs(d.x-player.x)+Math.abs(d.y-player.y)===1)) growlSnd.play().catch(e=>{});
        
        if (map[ny][nx] === 2) {
            playGoalSound(); currentLevel++; gameStarted = false; isBlind = true; stopAutoProcess();
            document.getElementById('start-container').style.display = 'flex'; updateUI();
        } else if (map[ny][nx] === 3) {
            // コイン獲得
            playCoinSound(coinsCollectedInLevel);
            map[ny][nx] = 0; 
            totalCoins += (1 * coinMultiplier);
            coinsCollectedInLevel++; updateUI();
        }
    }
    draw();
}

// --- 以下、既存のショップ・自動移動・描画ロジック ---

function updateUI() {
    document.getElementById('coin-status').innerText = `所持コイン: ${totalCoins}枚`;
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('level-display').innerText = `Level ${currentLevel}`;
    document.getElementById('mode-text').innerText = isBlind ? "ブラインド" : "オープン";
    document.getElementById('amulet-btn').disabled = (hasAmulet || totalCoins < 3);
    document.getElementById('auto-device-btn').disabled = (hasAutoDevice || totalCoins < 5);
    document.getElementById('dev-glass-btn').disabled = hasDevGlasses;
    document.getElementById('controls').style.display = hasDevGlasses ? 'block' : 'none';
    const desc = document.getElementById('game-desc');
    if (desc) desc.style.display = (currentLevel === 1) ? 'block' : 'none';
}

function calculateInterval() { return Math.max(100, 3000 * Math.pow(0.975, Math.pow(totalCoins, 1.15))); }

function getNextStepToGoal() {
    let q = [{x: player.x, y: player.y, path: []}], visited = new Set(); visited.add(`${player.x},${player.y}`);
    const dogSet = new Set(dogs.map(d => `${d.x},${d.y}`));
    while(q.length > 0) {
        let curr = q.shift();
        if(map[curr.y][curr.x] === 2) return curr.path[0];
        for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
            let nx = curr.x+dx, ny = curr.y+dy, key = `${nx},${ny}`;
            if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1 && !visited.has(key) && !dogSet.has(key)) {
                visited.add(key); q.push({x: nx, y: ny, path: [...curr.path, {dx, dy}]});
            }
        }
    }
    return null;
}

function executeAutoStep() {
    if (autoLoadState !== "MOVING" || !gameStarted || !hasAutoDevice) return;
    let step = getNextStepToGoal();
    if (step) { movePlayer(step.dx, step.dy, true); autoMoveTimeout = setTimeout(executeAutoStep, calculateInterval()); } 
    else { stopAutoProcess(); }
}

function stopAutoProcess() { autoLoadState = "NONE"; if (autoMoveTimeout) { clearTimeout(autoMoveTimeout); autoMoveTimeout = null; } updateUI(); }

setInterval(() => {
    if (!gameStarted || !hasAutoDevice) return;
    let idle = Date.now() - lastMoveTime;
    if (autoLoadState === "NONE" && idle > 5000) { autoLoadState = "LOADING"; updateUI(); }
    if (autoLoadState === "LOADING" && idle > 8000) { autoLoadState = "MOVING"; updateUI(); executeAutoStep(); }
}, 500);

async function playOscillator(f, t, d) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function playCoinSound(step) {
    let f = WHITE_KEYS[step % WHITE_KEYS.length];
    if (hasAmulet) [1, 1.25, 1.5].forEach((r, i) => setTimeout(() => playOscillator(f * r, 'sine', 0.25), i * 25));
    else playOscillator(f, 'sine', 0.15);
}
async function playGoalSound() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playOscillator(f, 'triangle', 0.4), i * 150)); }

async function startGame() { unlockAudio(); document.getElementById('start-container').style.display = 'none'; gameStarted = true; lastMoveTime = Date.now(); generateSimpleMaze(); updateUI(); draw(); }
function resetGame() { currentLevel = 1; totalCoins = 0; hasAmulet = false; hasAutoDevice = false; hasDevGlasses = false; coinMultiplier = 1; gameStarted = false; isBlind = true; stopAutoProcess(); document.getElementById('start-container').style.display = 'flex'; updateUI(); }
function toggleBlind() { isBlind = !isBlind; lastMoveTime = Date.now(); stopAutoProcess(); updateUI(); draw(); }
function buyDevGlasses() { hasDevGlasses = true; updateUI(); }
function buyAmulet() { if (totalCoins >= 3 && !hasAmulet) { totalCoins -= 3; hasAmulet = true; coinMultiplier = 10; updateUI(); } }
function buyAutoDevice() { if (totalCoins >= 5 && !hasAutoDevice) { totalCoins -= 5; hasAutoDevice = true; updateUI(); } }

function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (isBlind) { ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height); return; }
    for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) {
        let px = oX+x*size, py = oY+y*size;
        if (map[y][x] === 1) { ctx.fillStyle = "#333"; ctx.fillRect(px, py, size, size); }
        else if (map[y][x] === 2) {
            let cs=3, rs=4, cw=size/cs, ch=size/rs;
            for(let r=0; r<rs; r++) for(let c=0; c<cs; c++) { ctx.fillStyle=(r+c)%2===0?"#fff":"#000"; ctx.fillRect(px+c*cw, py+r*ch, cw, ch); }
            ctx.strokeStyle="#000"; ctx.strokeRect(px, py, size, size);
        } else if (map[y][x] === 3) {
            ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#5d4037"; ctx.font=`bold ${size/2.5}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("$", px+size/2, py+size/2);
        }
        dogs.forEach(d => { if(d.x===x && d.y===y) ctx.drawImage(dogImg, px, py, size, size); });
    }
    ctx.drawImage(playerImg, oX+player.x*size, oY+player.y*size, size, size);
}

let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    if (tsX === null || tsY === null) return;
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
        if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0); else movePlayer(0, dy > 0 ? 1 : -1);
    }
    tsX = null; tsY = null;
});
window.onresize = draw; updateUI();
</script>
</body>
</html>
