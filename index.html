<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スイカ割り迷宮 - Item Shop Edition</title>
    <style>
        body { margin: 0; background: #fff; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        
        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; z-index: 10; 
            font-weight: bold; background: rgba(51, 51, 51, 0.8); 
            color: #fff; padding: 10px; border-radius: 6px; min-width: 160px;
        }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; }
        button { 
            padding: 10px 15px; font-size: 12px; background: #444; color: white; 
            border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; 
        }

        /* スタート＆ショップ画面 */
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; 
        }
        #level-display { font-size: 28px; margin-bottom: 10px; color: #218838; font-weight: bold; }
        #coin-display { font-size: 18px; margin-bottom: 20px; color: #d4af37; }

        .shop-box { 
            background: #f8f9fa; border: 2px solid #ddd; padding: 15px; border-radius: 10px; 
            margin-bottom: 20px; text-align: center; width: 280px;
        }
        .item-btn { 
            width: 100%; margin: 5px 0; padding: 10px; border: none; border-radius: 5px; 
            color: white; font-weight: bold; cursor: pointer;
        }
        .buy-flashlight { background: #6f42c1; }
        .buy-shotgun { background: #dc3545; }
        .buy-amulet { background: #ffc107; color: #333; }
        .item-btn:disabled { background: #ccc; cursor: not-allowed; }

        #start-btn { 
            padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; 
            background-color: #28a745; border: none; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-container">
        <div id="level-display">Level 1</div>
        <div id="coin-display">所持コイン: 0枚</div>

        <div class="shop-box">
            <div style="font-size: 14px; margin-bottom: 10px; color: #666;">--- アイテムショップ ---</div>
            <button class="item-btn buy-flashlight" onclick="buyItem('flashlight')">🔦 懐中電灯 (90c)</button>
            <button class="item-btn buy-shotgun" onclick="buyItem('shotgun')">🔫 ショットガン (30c)</button>
            <button class="item-btn buy-amulet" onclick="buyItem('amulet')">✨ 金運お守り (3c)</button>
        </div>

        <button id="start-btn">探索を開始する</button>
    </div>

    <div id="ui">
        <div id="mode-text">ブラインド</div>
        <div id="total-coins">コイン: 0</div>
        <div id="item-status" style="font-size: 0.8em; color: #ffeb3b; margin-top: 5px;"></div>
    </div>

    <div id="controls">
        <button id="toggleMode">Dev Mode</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// --- 基本設定 ---
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';

let audioCtx = null;
let isBlind = true;
let gameStarted = false;
let currentLevel = 1;
let ROWS, COLS;
let totalCoins = 0;
let player = { x: 0, y: 0, dir: {x: 0, y: 1} };
let map = [], dogs = [], coinPositions = [];

// --- アイテム状態 ---
let hasFlashlight = false;
let shotgunAmmo = 0;
let hasAmulet = false;

function updateUI() {
    document.getElementById('coin-display').innerText = `所持コイン: ${totalCoins}枚`;
    document.getElementById('total-coins').innerText = `コイン: ${totalCoins}`;
    let status = "";
    if(hasFlashlight) status += "🔦ON ";
    if(shotgunAmmo > 0) status += `🔫x${shotgunAmmo} `;
    if(hasAmulet) status += "✨x3 ";
    document.getElementById('item-status').innerText = status;
}

function buyItem(type) {
    if(type === 'flashlight' && totalCoins >= 90 && !hasFlashlight) {
        totalCoins -= 90; hasFlashlight = true;
    } else if(type === 'shotgun' && totalCoins >= 30) {
        totalCoins -= 30; shotgunAmmo += 2;
    } else if(type === 'amulet' && totalCoins >= 3 && !hasAmulet) {
        totalCoins -= 3; hasAmulet = true;
    }
    updateUI();
}

// --- 迷路生成 ---
function generateSimpleMaze() {
    ROWS = COLS = 6 + (currentLevel * 2); 
    let found = false;
    while (!found) {
        map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
        let startX = 1 + Math.floor(Math.random() * (COLS - 2));
        let startY = 1 + Math.floor(Math.random() * (ROWS - 2));
        player.x = startX; player.y = startY;
        let x = startX, y = startY; map[y][x] = 0;
        let fillAmount = ROWS * COLS * (0.55 - (currentLevel * 0.01)); 
        for(let i=0; i < fillAmount; i++) {
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            let [dx, dy] = dirs[Math.floor(Math.random()*4)];
            if(x+dx > 0 && x+dx < COLS-1 && y+dy > 0 && y+dy < ROWS-1) { x += dx; y += dy; map[y][x] = 0; }
        }
        let dists = Array.from({ length: ROWS }, () => Array(COLS).fill(-1));
        let parent = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
        let q = [{x: startX, y: startY, d: 0}]; dists[startY][startX] = 0;
        let allWalkable = [];
        while(q.length > 0) {
            let curr = q.shift(); allWalkable.push(curr);
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = curr.x + dx, ny = curr.y + dy;
                if(ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS && map[ny][nx] === 0 && dists[ny][nx] === -1) {
                    dists[ny][nx] = curr.d + 1; parent[ny][nx] = {x: curr.x, y: curr.y}; q.push({x: nx, y: ny, d: curr.d + 1});
                }
            }
        }
        let minThreshold = ROWS * 1.2 + currentLevel; 
        let candidates = allWalkable.filter(p => dists[p.y][p.x] >= minThreshold);
        if(candidates.length > 0) {
            let goal = candidates[Math.floor(Math.random()*candidates.length)];
            map[goal.y][goal.x] = 2;
            let safetyZone = new Set();
            let tempPath = [];
            let pNode = goal;
            while(pNode) {
                safetyZone.add(`${pNode.x},${pNode.y}`);
                safetyZone.add(`${pNode.x+1},${pNode.y}`); safetyZone.add(`${pNode.x-1},${pNode.y}`);
                safetyZone.add(`${pNode.x},${pNode.y+1}`); safetyZone.add(`${pNode.x},${pNode.y-1}`);
                if(!(pNode.x === player.x && pNode.y === player.y)) tempPath.push({x: pNode.x, y: pNode.y});
                pNode = parent[pNode.y][pNode.x];
            }
            tempPath.reverse();
            dogs = [];
            let dogCount = Math.max(0, currentLevel - 1);
            let dogCandidates = allWalkable.filter(p => !safetyZone.has(`${p.x},${p.y}`) && !(p.x === player.x && p.y === player.y));
            for(let i=0; i < dogCount; i++) {
                if(dogCandidates.length === 0) break;
                let idx = Math.floor(Math.random() * dogCandidates.length);
                dogs.push(dogCandidates[idx]); dogCandidates.splice(idx, 1);
            }
            coinPositions = [];
            let coinInterval = 1 + Math.floor((currentLevel - 1) * 0.5);
            tempPath.forEach((p, index) => {
                if(index % coinInterval === 0) { map[p.y][p.x] = 3; coinPositions.push({x: p.x, y: p.y, order: index}); }
            });
            found = true;
        }
    }
}

function movePlayer(dx, dy) {
    if(!gameStarted) return;
    player.dir = {x: dx, y: dy}; // 向きを保存
    const nx = player.x + dx, ny = player.y + dy;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || map[ny][nx] === 1) {
        playOscillator(150, 'square', 0.1);
    } else {
        player.x = nx; player.y = ny;
        
        // 犬との遭遇
        let dogIdx = dogs.findIndex(d => d.x === player.x && d.y === player.y);
        if (dogIdx !== -1) {
            if (shotgunAmmo > 0) {
                shotgunAmmo--;
                dogs.splice(dogIdx, 1); // 犬を消去
                playOscillator(100, 'sawtooth', 0.4, 0.2); // 発砲音
                alert("🔫 ショットガンで追い払った！ (残り" + shotgunAmmo + "回)");
            } else {
                alert("イッヌに噛まれました！ Level 1に戻ります。");
                currentLevel = 1; hasFlashlight = false; shotgunAmmo = 0; // アイテム没収
                showStartMenu(); return;
            }
        }

        if (map[ny][nx] === 2) {
            playGoalSound();
            currentLevel++; showStartMenu(); return;
        } else if (map[ny][nx] === 3) {
            let hitCoin = coinPositions.find(c => c.x === nx && c.y === ny);
            if (hitCoin) {
                totalCoins += (hasAmulet ? 3 : 1);
                playOscillator(800, 'sine', 0.1);
                map[ny][nx] = 0;
            }
        }
    }
    updateUI();
    draw();
}

function draw() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width / COLS, canvas.height / ROWS);
    const offsetX = (canvas.width - size * COLS) / 2;
    const offsetY = (canvas.height - size * ROWS) / 2;

    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let isVisible = !isBlind;
            // 懐中電灯のロジック: スワイプ方向2マス円錐状
            if (isBlind && hasFlashlight) {
                let dx = x - player.x; let dy = y - player.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist <= 2.2) {
                    let dot = dx * player.dir.x + dy * player.dir.y;
                    if (dot > 0 || dist < 0.8) isVisible = true;
                }
            }

            if (isVisible) {
                let px = offsetX + x*size, py = offsetY + y*size;
                if (map[y][x] === 1) { ctx.fillStyle = "#333"; ctx.fillRect(px, py, size, size); }
                else if (map[y][x] === 2) { ctx.fillStyle = "#fff"; ctx.fillRect(px, py, size, size); }
                else if (map[y][x] === 3) { 
                    ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill(); 
                }
                
                dogs.forEach(d => {
                    if(d.x === x && d.y === y) ctx.drawImage(dogImg, offsetX + d.x*size, offsetY + d.y*size, size, size);
                });
            }
        }
    }
    ctx.drawImage(playerImg, offsetX + player.x*size, offsetY + player.y*size, size, size);
}

// --- 以下共通処理 ---
function showStartMenu() {
    gameStarted = false;
    document.getElementById('level-display').innerText = `Level ${currentLevel}`;
    document.getElementById('start-container').style.display = 'flex';
    updateUI();
}

document.getElementById('start-btn').onclick = () => {
    document.getElementById('start-container').style.display = 'none';
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gameStarted = true; generateSimpleMaze(); draw();
};

document.getElementById('toggleMode').onclick = () => { isBlind = !isBlind; draw(); };

async function playOscillator(f, t, d, v = 0.05) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

async function playGoalSound() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playOscillator(f, 'triangle', 0.4), i * 150)); }

let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    if (tsX === null || tsY === null) return;
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
        if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0); else movePlayer(0, dy > 0 ? 1 : -1);
    }
    tsX = null; tsY = null;
});

window.onresize = draw;
updateUI();
</script>
</body>
</html>
