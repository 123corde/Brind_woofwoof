<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち - Hunter Scent Turn-based</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }

        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; 
            z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6);
            color: #fff; padding: 10px; border-radius: 6px;
            font-size: min(14px, 3.5vw); max-width: 80%;
        }
        
        .item-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; height: 1.5em; }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 300; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.35); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            transition: background-color 2.0s ease-in-out; 
        }
        #start-container > * { opacity: 0; transition: opacity 2.0s ease-in-out; pointer-events: none; }
        #start-container.opaque { background: rgba(255,255,255,1.0) !important; }
        #start-container.opaque > * { opacity: 1; pointer-events: auto; }
        
        .start-action-row { display: flex; align-items: center; gap: 20px; margin: 10px 0; justify-content: center; }
        #start-btn { padding: 15px 40px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; min-width: 240px; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--toggle-color, #28a745); }
        input:checked + .slider:before { transform: translateX(24px); }

        .shop-btn { padding: 10px; margin: 3px; background: #ffd54f; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; flex-shrink: 0; }
        .shop-btn:disabled { background: #ccc !important; cursor: not-allowed; color: #777 !important; }
        
        #ranking-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); color: white; padding: 20px; border-radius: 10px;
            z-index: 1000; text-align: center; width: 90%; max-width: 900px; display: none;
            border: 2px solid #ffd700; overflow-x: auto;
        }
        #ranking-table { width: 100%; margin: 15px 0; border-collapse: collapse; font-size: 11px; }
        #ranking-table th, #ranking-table td { padding: 6px; border-bottom: 1px solid #444; white-space: nowrap; }
        
        .kb-selected { outline: 4px solid #ccc !important; transform: scale(1.05); }
        @keyframes extreme-shake { 0% { transform: translate(0,0); } 20% { transform: translate(1px, -1px); } 100% { transform: translate(0,0); } }
        .extreme-shake { animation: extreme-shake 0.1s infinite; display: inline-block; }
    </style>
</head>
<body>

    <div id="start-container" class="opaque">
        <div id="level-display" onclick="triggerDebugJump()">Level 1</div>
        <br><br>
        <button id="hp-buy-btn" class="shop-btn" onclick="buyHeadphone()">🎹 キーボード (5コイン)</button>
        <button id="bgm-cycle-btn" class="shop-btn" style="display:none;" onclick="cycleBGM()"></button>        
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()"></button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運アップお守り (25コイン)</button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()" style="display: none;"></button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()" style="display: none;">📍 Google Map (200コイン)</button>
        <button id="dev-glass-btn" class="shop-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (1000コイン)</button>
        <br>
        
        <div class="start-action-row">
            <button id="start-btn" onclick="startGame()">START</button>
            <div id="toggle-container" style="display: flex; flex-direction: column; align-items: center;">
                <label class="switch" id="mode-toggle-label">
                    <input type="checkbox" id="mode-toggle" checked onchange="toggleStartMode(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="item-row">
            <div id="amulet-display"></div>
            <div id="headphone-display"></div>
            <div id="ammo-display"></div>
            <div id="auto-status"></div>
            <div id="flashlight-display"></div>
        </div>
        <div id="level-text-ui" style="font-size: 1.1em; color: #fff; margin-bottom: 2px;">Level 1/20</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <div id="ranking-display"></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    <audio id="bgm-suzumusi" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Suzumusi.mp3" loop></audio>
    <audio id="bgm-brown" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Brown_Noise.mp3" loop></audio>
    
    <canvas id="gameCanvas"></canvas>

<script>
const GAME_VERSION = "24.6.1";
const GAS_URL = "https://script.google.com/macros/s/AKfycbwiF1WBJJV_SBjqq9Ii7bNRIA1ic4ji0XJpHkWv00Z91KM7xf_Xd2jZLgdLHQAET5xrdA/exec";

// 画像/音源アセット
const wallImg = new Image(); wallImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/blue_wall.png';
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Watchdog.png';
const hunterImg = new Image(); hunterImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter.png';

const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Watchdog_woof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const dogCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane_watchdog.mp3');
const shotgunSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Shotgun.mp3');
const hunterWoofSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter_woof.mp3');
const hunterBiteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunterbite.mp3');
const hunterCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane_hunter.mp3');

let audioCtx = null, soundReady = false;
let isBlind = true, gameStarted = false, isManualMode = false;
let currentLevel = 1, totalCoins = 0, coinMultiplier = 1;
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false, hasHeadphone = false;
let currentBGM = null, shotgunAmmo = 0, hasShotgun = false, hasFlashlight = false, flashlightBattery = 0;
const FLASHLIGHT_MAX = 200, FLASHLIGHT_BONUS = 180;
let lastDir = { dx: 0, dy: -1 }, flipX = false;

// 統計データ
let gameStartTime = null, totalSteps = 0, totalLightUsed = 0, totalGunUsed = 0, totalMapUsed = 0, neotiCount = 0;
let lastActionTime = Date.now(), bgmPlayCount = { "🔕":0, "❄️":0, "🏝️":0, "🌌":0, "🎵":0 };

let ROWS, COLS, map = [], dogs = [], hunters = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let scentMap = [], playerHistory = [], shortestPath = [], isAutoDeviceUsedInThisLevel = false;
let autoLoadState = "NONE", autoMoveTimeout = null, loadingDots = 0, lastMoveTime = Date.now();
let selectedMenuIndex = 1, debugClickCount = 0;

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];

// --- 初期化 & UI ---
function unlockAudio() {
    if (soundReady) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [growlSnd, biteSnd, dogCrySnd, shotgunSnd, hunterWoofSnd, hunterBiteSnd, hunterCrySnd].forEach(s => {
        s.muted = true; s.play().then(()=>{ s.pause(); s.currentTime=0; s.muted=false; }).catch(()=>{});
    });
    soundReady = true;
}

function updateUI() {
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('level-text-ui').innerText = `Level ${currentLevel}/20`;
    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";
    document.getElementById('headphone-display').innerText = hasHeadphone ? "🎹" : "";
    document.getElementById('ammo-display').innerText = shotgunAmmo > 0 ? "💥".repeat(shotgunAmmo) : "";
    document.getElementById('flashlight-display').innerText = flashlightBattery > 0 ? `🔦${Math.ceil(flashlightBattery)}s` : "";
    
    const isHard = currentLevel >= 11 && currentLevel <= 15;
    const isExtreme = currentLevel >= 16;
    const ld = document.getElementById('level-display');
    ld.className = isExtreme ? "extreme-shake" : "";
    ld.style.color = isExtreme ? "red" : (isHard ? "blue" : "green");
    ld.innerText = `Level ${currentLevel}` + (isExtreme ? " EXTREME" : (isHard ? " HARD" : ""));

    // ボタン表示制御
    document.getElementById('hp-buy-btn').style.display = hasHeadphone ? 'none' : 'block';
    document.getElementById('bgm-cycle-btn').style.display = hasHeadphone ? 'block' : 'none';
    document.getElementById('shotgun-btn').style.display = currentLevel >= 11 ? 'block' : 'none';
    document.getElementById('auto-device-btn').style.display = currentLevel >= 11 ? 'block' : 'none';
    
    let statusText = "";
    if (hasAutoDevice) {
        if (autoLoadState === "NONE") statusText = "📍";
        else if (autoLoadState === "LOADING") statusText = "📡" + ".".repeat(loadingDots);
        else if (autoLoadState === "MOVING") statusText = "📍[案内中]";
    }
    document.getElementById('auto-status').innerText = statusText;

    if (!gameStarted) updateMenuSelection();
}

// --- 迷宮生成 & AI ---
function generateSimpleMaze() {
    const sizeMap = { 1:[5,7], 10:[15,19], 11:[13,15], 16:[15,19], 20:[17,21] };
    const s = sizeMap[currentLevel] || [13,15];
    COLS = s[0]; ROWS = s[1];

    map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
    player = { x: 1, y: 1 }; map[1][1] = 0;
    goalPos = { x: COLS-2, y: ROWS-2 }; map[goalPos.y][goalPos.x] = 2;

    // 通路掘削 (簡易穴掘り)
    for(let i=0; i<ROWS*COLS; i++){
        let rx = Math.floor(Math.random()*(COLS-2))+1;
        let ry = Math.floor(Math.random()*(ROWS-2))+1;
        if(Math.random() > 0.5) map[ry][rx] = 0;
    }
    map[1][1] = 0; map[goalPos.y][goalPos.x] = 2;

    // 犬・ハンター・コイン
    dogs = []; hunters = [];
    for(let i=0; i<currentLevel; i++){
        let x = Math.floor(Math.random()*COLS), y = Math.floor(Math.random()*ROWS);
        if(map[y][x] === 0 && (x!=1 || y!=1)) dogs.push({x, y});
    }
    if(currentLevel >= 16) hunters.push({x: goalPos.x, y: goalPos.y-1, alerted: false, lastDir: {dx:0,dy:0}});
    for(let i=0; i<10; i++){
        let x = Math.floor(Math.random()*COLS), y = Math.floor(Math.random()*ROWS);
        if(map[y][x] === 0) map[y][x] = 3;
    }
    initScentMap();
}

function initScentMap() {
    scentMap = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    playerHistory = [{x: player.x, y: player.y}];
}

function updateScentMap() {
    for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) scentMap[y][x] = 0;
    playerHistory.slice(-50).forEach((pos, i) => scentMap[pos.y][pos.x] = i + 1);
}

function moveHunters() {
    hunters.forEach(h => {
        let best = {x:h.x, y:h.y, val:-1};
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy])=>{
            let nx=h.x+dx, ny=h.y+dy;
            if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&map[ny][nx]!=1){
                if(scentMap[ny][nx] > best.val){ best = {x:nx, y:ny, val:scentMap[ny][nx]}; }
            }
        });
        h.x = best.x; h.y = best.y;
    });
}

// --- ゲーム進行 ---
function startGame() {
    unlockAudio();
    if(currentLevel === 1) { gameStartTime = Date.now(); totalSteps=0; totalLightUsed=0; totalGunUsed=0; totalMapUsed=0; neotiCount=0; }
    gameStarted = true; lastActionTime = Date.now();
    stopAllBGM();
    if(hasHeadphone && currentBGM){
        const ids = [null, 'bgm-koori', 'bgm-hikari', 'bgm-suzumusi', 'bgm-brown'];
        document.getElementById(ids[currentBGM]).play();
        const icons = ["🔕", "❄️", "🏝️", "🌌", "🎵"]; bgmPlayCount[icons[currentBGM]]++;
    } else { bgmPlayCount["🔕"]++; }
    
    generateSimpleMaze();
    document.getElementById('start-container').style.display = 'none';
    updateUI(); draw();
}

function movePlayer(dx, dy, isAuto=false) {
    if(!gameStarted) return;
    if(!isAuto){
        if(Date.now() - lastActionTime > 300000) neotiCount++;
        lastActionTime = Date.now(); stopAutoProcess();
    }
    const nx = player.x + dx, ny = player.y + dy;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS||map[ny][nx]===1) return;

    player.x = nx; player.y = ny; totalSteps++;
    flipX = dx===1?true:(dx===-1?false:flipX);
    playerHistory.push({x:nx, y:ny});
    updateScentMap();
    moveHunters();
    
    // 衝突判定
    if(checkCollisions()) return;

    if(map[ny][nx]===3){ 
        totalCoins += (currentLevel>=11?10:1)*coinMultiplier; map[ny][nx]=0; 
        playOscillator(WHITE_KEYS[totalSteps%8], 'sine', 0.1);
    }
    if(map[ny][nx]===2){ if(currentLevel===20) finishGame(); else nextLevel(); }
    
    updateUI(); draw();
}

function checkCollisions() {
    let enemies = [...dogs, ...hunters];
    let eIdx = enemies.findIndex(e => e.x === player.x && e.y === player.y);
    if(eIdx !== -1){
        if(shotgunAmmo > 0){
            shotgunAmmo--; totalGunUsed++; playSound(shotgunSnd);
            if(eIdx < dogs.length) dogs.splice(eIdx,1); else hunters.splice(eIdx-dogs.length,1);
            return false;
        } else { gameOver(); return true; }
    }
    return false;
}

function nextLevel() {
    gameStarted = false; currentLevel++; 
    if(isAutoDeviceUsedInThisLevel) hasAutoDevice = false;
    stopAllBGM(); document.getElementById('start-container').style.display = 'flex';
    document.getElementById('start-container').classList.add('opaque');
    updateUI();
}

async function finishGame() {
    gameStarted = false; stopAllBGM();
    const clearTimeMin = ((Date.now() - gameStartTime)/60000).toFixed(2);
    const name = prompt("全クリア！名前を入力:", "イッヌ") || "ななし";
    let maxBgm = "🔕"; let maxVal = -1;
    for(let k in bgmPlayCount) if(bgmPlayCount[k]>maxVal){ maxVal=bgmPlayCount[k]; maxBgm=k; }

    const rankDiv = document.getElementById('ranking-display');
    rankDiv.style.display = 'block'; rankDiv.innerHTML = "<h3>送信中...</h3>";

    try {
        const query = `name=${encodeURIComponent(name)}&cleartime=${clearTimeMin}&coin=${totalCoins}&hosuu=${totalSteps}&light=${totalLightUsed.toFixed(0)}&gun=${totalGunUsed}&map=${totalMapUsed}&bgm=${encodeURIComponent(maxBgm)}&neoti=${neotiCount}`;
        const res = await fetch(`${GAS_URL}?${query}`);
        const data = await res.json();
        let html = `<h2>🏆 殿堂入り 🏆</h2><table id='ranking-table'><tr><th>順位</th><th>名前</th><th>スコア</th><th>分</th><th>寝</th><th>C</th><th>歩</th><th>灯</th><th>銃</th><th>Map</th></tr>`;
        data.forEach((r, i) => {
            html += `<tr><td>${i+1}</td><td>${r.name}</td><td>${Math.floor(r.score)}</td><td>${r.cleartime}</td><td>${r.neoti}</td><td>${r.coin}</td><td>${r.hosuu}</td><td>${r.light}</td><td>${r.gun}</td><td>${r.map}</td></tr>`;
        });
        html += "</table><button class='retry-btn' onclick='location.reload()'>タイトルへ</button>";
        rankDiv.innerHTML = html;
    } catch(e) { rankDiv.innerHTML = "<h3>通信エラー</h3><button onclick='location.reload()'>戻る</button>"; }
}

function gameOver(){ alert("ガブッ！Level 1からやり直し！"); location.reload(); }

// --- 自動移動 (Google Map) ---
function getNextStepToGoal() {
    let q = [{x: player.x, y: player.y, path: []}], visited = new Set();
    while(q.length > 0){
        let curr = q.shift(); if(map[curr.y][curr.x] === 2) return curr.path[0];
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy])=>{
            let nx=curr.x+dx, ny=curr.y+dy;
            if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&map[ny][nx]!=1 && !visited.has(`${nx},${ny}`)){
                visited.add(`${nx},${ny}`); q.push({x:nx, y:ny, path:[...curr.path, {dx,dy}]});
            }
        });
    }
    return null;
}
function executeAutoStep() {
    if(autoLoadState !== "MOVING" || !gameStarted) return;
    isAutoDeviceUsedInThisLevel = true; let step = getNextStepToGoal();
    if(step){ movePlayer(step.dx, step.dy, true); autoMoveTimeout = setTimeout(executeAutoStep, 600); }
    else stopAutoProcess();
}
function stopAutoProcess() { autoLoadState = "NONE"; clearTimeout(autoMoveTimeout); updateUI(); }

// --- ショップ機能 ---
function buyHeadphone() { if(totalCoins >= 5) { totalCoins -= 5; hasHeadphone = true; currentBGM = 1; updateUI(); } }
function cycleBGM() { currentBGM = (currentBGM % 4) + 1; updateUI(); }
function buyFlashlight() { 
    if(!hasFlashlight && totalCoins >= 15){ totalCoins-=15; hasFlashlight=true; flashlightBattery=60; }
    else if(totalCoins >= 5){ totalCoins-=5; flashlightBattery=Math.min(FLASHLIGHT_MAX, flashlightBattery+20); }
    updateUI();
}
function buyAmulet() { if(!hasAmulet && totalCoins >= 25){ totalCoins-=25; hasAmulet=true; coinMultiplier=3; updateUI(); } }
function buyShotgun() {
    if(!hasShotgun && totalCoins >= 50){ totalCoins-=50; hasShotgun=true; shotgunAmmo=2; }
    else if(shotgunAmmo < 2 && totalCoins >= 30){ totalCoins-=30; shotgunAmmo++; }
    updateUI();
}
function buyAutoDevice() { if(!hasAutoDevice && totalCoins >= 200){ totalCoins-=200; hasAutoDevice=true; totalMapUsed++; updateUI(); } }
function buyDevGlasses() { if(totalCoins>=1000){ totalCoins-=1000; hasDevGlasses=true; isBlind=false; updateUI(); } }

// --- 描画 ---
function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#222"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++){
        let px=oX+x*size, py=oY+y*size;
        if(map[y][x]===1) ctx.drawImage(wallImg, px, py, size, size);
        else if(map[y][x]===2) { ctx.fillStyle="#fff"; ctx.fillRect(px,py,size,size); }
        else if(map[y][x]===3) { ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill(); }
    }
    dogs.forEach(d => ctx.drawImage(dogImg, oX+d.x*size, oY+d.y*size, size, size));
    hunters.forEach(h => ctx.drawImage(hunterImg, oX+h.x*size, oY+h.y*size, size, size));
    ctx.save();
    if(flipX){ ctx.translate(oX+player.x*size+size, oY+player.y*size); ctx.scale(-1,1); ctx.drawImage(playerImg, 0,0,size,size); }
    else ctx.drawImage(playerImg, oX+player.x*size, oY+player.y*size, size, size);
    ctx.restore();

    if(isBlind && gameStarted){
        ctx.fillStyle = "black";
        const r = (hasFlashlight && flashlightBattery>0) ? size*3 : size*1.2;
        ctx.save(); ctx.beginPath(); ctx.rect(0,0,canvas.width,canvas.height);
        ctx.arc(oX+player.x*size+size/2, oY+player.y*size+size/2, r, 0, Math.PI*2, true);
        ctx.clip(); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore();
        ctx.globalCompositeOperation = "destination-over"; ctx.fillRect(0,0,canvas.width,canvas.height);
    }
}

// --- 入力 & タイマー ---
function updateMenuSelection() {
    const ids = ['hp-buy-btn','bgm-cycle-btn','flashlight-btn','amulet-btn','shotgun-btn','auto-device-btn','dev-glass-btn','start-btn'];
    const items = ids.map(id => document.getElementById(id)).filter(el => el && el.style.display !== 'none');
    items.forEach((el, i) => el.classList.toggle('kb-selected', i === selectedMenuIndex));
}

window.addEventListener('keydown', e => {
    if(!gameStarted){
        if(e.key === 'w' || e.key === 'ArrowUp') selectedMenuIndex = Math.max(0, selectedMenuIndex-1);
        if(e.key === 's' || e.key === 'ArrowDown') selectedMenuIndex++;
        if(e.key === 'Enter') {
            const items = document.querySelectorAll('.shop-btn, #start-btn');
            const visible = Array.from(items).filter(el => el.style.display !== 'none');
            if(visible[selectedMenuIndex]) visible[selectedMenuIndex].click();
        }
        updateMenuSelection();
    } else {
        if(e.key === 'w' || e.key === 'ArrowUp') movePlayer(0,-1);
        if(e.key === 's' || e.key === 'ArrowDown') movePlayer(0,1);
        if(e.key === 'a' || e.key === 'ArrowLeft') movePlayer(-1,0);
        if(e.key === 'd' || e.key === 'ArrowRight') movePlayer(1,0);
    }
});

setInterval(() => {
    if(gameStarted && hasFlashlight && flashlightBattery > 0){
        flashlightBattery -= 0.1; totalLightUsed += 0.1;
        if(flashlightBattery <= 0) { flashlightBattery=0; updateUI(); draw(); }
    }
    if(gameStarted && hasAutoDevice && autoLoadState === "NONE" && Date.now() - lastActionTime > 3000){
        autoLoadState = "LOADING"; loadingDots = 0;
    }
    if(autoLoadState === "LOADING"){
        loadingDots = (loadingDots + 1) % 4; if(Date.now() - lastActionTime > 8000){ autoLoadState="MOVING"; executeAutoStep(); }
        updateUI();
    }
}, 100);

function playSound(a){ a.currentTime=0; a.play(); }
function stopAllBGM(){ ['bgm-koori','bgm-hikari','bgm-suzumusi','bgm-brown'].forEach(id=>document.getElementById(id).pause()); }
async function playOscillator(f,t,d){ if(!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.setValueAtTime(0.05,audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }

window.onresize = draw; updateUI();
</script>
</body>
