<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スイカ割り迷宮 - 最短経路コイン限定版</title>
    <style>
        body { margin: 0; background: #fff; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 15px; left: 15px; pointer-events: none; z-index: 10; font-weight: bold; }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
        }
        #start-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .shop-btn { padding: 10px; margin: 5px; background: #ffc107; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; min-width: 320px; }
        .shop-btn:disabled { background: #ccc; cursor: not-allowed; }
        #auto-status { color: #4285F4; font-size: 14px; height: 1.4em; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-container">
        <div id="level-display" style="font-size: 24px; margin-bottom: 10px;">Level 1</div>
        <div id="coin-status">所持コイン: 0枚</div>
        <button id="dev-glass-btn" class="shop-btn" style="background:#6c757d; color:white;" onclick="buyDevGlasses()">👁️ 購入してはいけない (0コイン)</button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運お守り (3コイン)</button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()">📍 Google Map (5コイン)</button>
        <button id="start-btn" onclick="startGame()">探索を開始する</button>
    </div>

    <div id="ui">
        <div id="auto-status"></div>
        <div id="mode-text">ブラインド</div>
        <div id="total-coins">コイン: 0</div>
    </div>

    <div id="controls">
        <button id="toggleMode" onclick="toggleBlind()">Dev Mode</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
let audioCtx = null;
let isBlind = true, gameStarted = false;
let currentLevel = 1, totalCoins = 0, coinMultiplier = 1;
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false;

let ROWS, COLS, map = [], player = {x:0,y:0}, goalPos = {x:0,y:0};
let shortestPath = []; 
let lastMoveTime = Date.now(), autoMoveTimeout = null;

const WHITE_KEYS = [
    261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 
    523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 
    1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 1975.53, 
    2093.00
];

function updateUI() {
    document.getElementById('coin-status').innerText = `所持コイン: ${totalCoins}枚`;
    document.getElementById('total-coins').innerText = `コイン: ${totalCoins}`;
    document.getElementById('level-display').innerText = `Level ${currentLevel}`;
    document.getElementById('mode-text').innerText = isBlind ? "ブラインド" : "デバッグ（視界確保）";
    document.getElementById('amulet-btn').disabled = (hasAmulet || totalCoins < 3);
    document.getElementById('auto-device-btn').disabled = (hasAutoDevice || totalCoins < 5);
    document.getElementById('dev-glass-btn').disabled = hasDevGlasses;
    document.getElementById('controls').style.display = hasDevGlasses ? 'block' : 'none';
}

function generateSimpleMaze() {
    ROWS = COLS = 6 + (currentLevel * 2);
    let found = false;
    while (!found) {
        map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
        let startX = 1 + Math.floor(Math.random() * (COLS - 2));
        let startY = 1 + Math.floor(Math.random() * (ROWS - 2));
        player = { x: startX, y: startY };
        let x = startX, y = startY; map[y][x] = 0;
        let fillAmount = ROWS * COLS * 0.55;
        for(let i=0; i < fillAmount; i++) {
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            let [dx, dy] = dirs[Math.floor(Math.random()*4)];
            if(x+dx > 0 && x+dx < COLS-1 && y+dy > 0 && y+dy < ROWS-1) { x += dx; y += dy; map[y][x] = 0; }
        }

        // BFSで最短経路（正解ルート）のみ抽出
        let q = [{x: player.x, y: player.y, path: []}];
        let visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
        visited[player.y][player.x] = true;
        
        let goalNode = null;
        while(q.length > 0) {
            let curr = q.shift();
            if (curr.path.length > ROWS) goalNode = curr; // 一定以上の長さ
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = curr.x + dx, ny = curr.y + dy;
                if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]===0 && !visited[ny][nx]) {
                    visited[ny][nx] = true;
                    q.push({x: nx, y: ny, path: [...curr.path, {x: nx, y: ny}]});
                }
            }
        }

        if(goalNode) {
            shortestPath = goalNode.path;
            goalPos = shortestPath[shortestPath.length - 1];
            map[goalPos.y][goalPos.x] = 2; // ゴール
            
            // コイン(3)を最短経路上にのみ配置（一定間隔に調整可、現在は全マス）
            shortestPath.forEach((p, idx) => {
                if (idx < shortestPath.length - 1) map[p.y][p.x] = 3;
            });
            found = true;
        }
    }
}

function playCoinSound(pathIndex) {
    if (!audioCtx) return;
    let idx = pathIndex % WHITE_KEYS.length;
    const baseFreq = WHITE_KEYS[idx];
    if (hasAmulet) {
        [1, 1.25, 1.5].forEach((r, i) => setTimeout(() => playOscillator(baseFreq * r, 'sine', 0.25), i * 30));
    } else {
        playOscillator(baseFreq, 'sine', 0.15);
    }
}

function movePlayer(dx, dy, isAuto = false) {
    if(!gameStarted) return;
    if (!isAuto) { lastMoveTime = Date.now(); stopAutoProcess(); }
    const nx = player.x + dx, ny = player.y + dy;

    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] !== 1) {
        player.x = nx; player.y = ny;
        
        if (map[ny][nx] === 2) { // ゴール
            playGoalSound(); currentLevel++; gameStarted = false; isBlind = true; stopAutoProcess();
            document.getElementById('start-container').style.display = 'flex'; updateUI();
        } else if (map[ny][nx] === 3) { // コイン
            let pIdx = shortestPath.findIndex(p => p.x === nx && p.y === ny);
            if (pIdx !== -1) {
                playCoinSound(pIdx);
                // 今回のインデックス以下の経路上のコインをすべて消す
                for(let i = 0; i <= pIdx; i++) {
                    let p = shortestPath[i];
                    if (map[p.y][p.x] === 3) {
                        map[p.y][p.x] = 0;
                        totalCoins += (1 * coinMultiplier);
                    }
                }
                updateUI();
            }
        }
    } else if (!isAuto) {
        playOscillator(150, 'square', 0.1);
    }
    draw();
}

// 共通機能
function buyDevGlasses() { hasDevGlasses = true; updateUI(); }
function buyAmulet() { if (totalCoins >= 3) { totalCoins -= 3; hasAmulet = true; coinMultiplier = 10; updateUI(); } }
function buyAutoDevice() { if (totalCoins >= 5) { totalCoins -= 5; hasAutoDevice = true; updateUI(); } }
function toggleBlind() { isBlind = !isBlind; stopAutoProcess(); draw(); updateUI(); }
function stopAutoProcess() { if (autoMoveTimeout) clearTimeout(autoMoveTimeout); document.getElementById('auto-status').innerText = ""; }

function executeAutoStep() {
    if (!gameStarted || !hasAutoDevice) return;
    let pIdx = shortestPath.findIndex(p => p.x === player.x && p.y === player.y);
    let next = (pIdx === -1) ? shortestPath[0] : shortestPath[pIdx + 1];
    if (!next) {
        for(let [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
            if(player.x+dx === goalPos.x && player.y+dy === goalPos.y) { movePlayer(dx, dy, true); return; }
        }
    } else {
        movePlayer(next.x - player.x, next.y - player.y, true);
        document.getElementById('auto-status').innerText = "📍 自動案内中...";
        autoMoveTimeout = setTimeout(executeAutoStep, 350);
    }
}

setInterval(() => {
    if (gameStarted && hasAutoDevice && (Date.now() - lastMoveTime > 5000) && !autoMoveTimeout) executeAutoStep();
}, 1000);

function draw() {
    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width / COLS, canvas.height / ROWS);
    const offsetX = (canvas.width - size * COLS) / 2, offsetY = (canvas.height - size * ROWS) / 2;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (isBlind) { ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height); return; }
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let px = offsetX + x*size, py = offsetY + y*size;
            if (map[y][x] === 1) { ctx.fillStyle = "#333"; ctx.fillRect(px, py, size, size); }
            else if (map[y][x] === 2) { ctx.fillStyle = "#f00"; ctx.fillRect(px, py, size, size); }
            else if (map[y][x] === 3) { 
                ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill(); 
            }
        }
    }
    ctx.drawImage(playerImg, offsetX + player.x*size, offsetY + player.y*size, size, size);
}

function startGame() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('start-container').style.display = 'none';
    gameStarted = true; lastMoveTime = Date.now(); generateSimpleMaze(); updateUI(); draw();
}

async function playOscillator(f, t, d) {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

async function playGoalSound() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playOscillator(f, 'triangle', 0.4), i * 150)); }

let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    if (tsX === null || tsY === null) return;
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
        if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0); else movePlayer(0, dy > 0 ? 1 : -1);
    }
    tsX = null; tsY = null;
});
window.onresize = draw;
updateUI();
</script>
</body>
</html>
