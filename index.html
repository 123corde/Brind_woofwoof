<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち - Hunter Scent Turn-based</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }

        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; 
            z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6);
            color: #fff; padding: 10px; border-radius: 6px;
            font-size: min(14px, 3.5vw); max-width: 80%;
        }
        
        .item-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; height: 1.5em; }
        
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 300; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.35); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            transition: background-color 2.0s ease-in-out; 
        }
        #start-container > * { opacity: 0; transition: opacity 2.0s ease-in-out; pointer-events: none; }
        #start-container.opaque { background: rgba(255,255,255,1.0) !important; }
        #start-container.opaque > * { opacity: 1; pointer-events: auto; }
        
        .start-action-row { display: flex; align-items: center; gap: 20px; margin: 10px 0; justify-content: center; }
        #start-btn { padding: 15px 40px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; min-width: 240px; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--toggle-color, #28a745); }
        input:checked + .slider:before { transform: translateX(24px); }

        .shop-btn { padding: 10px; margin: 3px; background: #ffd54f; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; flex-shrink: 0; }
        .shop-btn:disabled { background: #ccc !important; cursor: not-allowed; color: #777 !important; }
        #auto-status { color: #fff; font-size: 1.1em; font-weight: bold; }
        #level-display { cursor: pointer; user-select: none; -webkit-user-select: none; line-height: 1.2; font-weight: bold; font-size: 28px; padding: 5px; border-radius: 5px; }
        #ranking-display {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.9); color: white; padding: 20px; border-radius: 10px;
    z-index: 1000; text-align: center; min-width: 280px; display: none;
    border: 2px solid #ffd700;
}
#ranking-table { width: 100%; margin: 15px 0; border-collapse: collapse; }
#ranking-table th, #ranking-table td { padding: 8px; border-bottom: 1px solid #444; }
.retry-btn { padding: 10px 20px; background: #ffd700; color: #000; border: none; cursor: pointer; font-weight: bold; }
        
        .kb-selected {
            outline: 4px solid #ccc !important;
            box-shadow: 0 0 15px rgba(0,0,0,0.2) !important;
            transform: scale(1.1);
            transition: transform 0.1s;
        }

        @keyframes extreme-shake {
            0% { transform: translate(0,0); }
            20% { transform: translate(1px, -1px); }
            40% { transform: translate(-1px, 1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }
        .extreme-shake { animation: extreme-shake 0.1s infinite; display: inline-block; }
    </style>
</head>
<body>

    <div id="start-container" class="opaque">
        <div id="level-display" onclick="triggerDebugJump()">Level 1</div>
        <br><br>
        <button id="hp-buy-btn" class="shop-btn" onclick="buyHeadphone()">🎹 キーボード (5コイン)</button>
        <button id="bgm-cycle-btn" class="shop-btn" style="display:none;" onclick="cycleBGM()"></button>        
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()"></button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運アップお守り (25コイン)</button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()" style="display: none;"></button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()" style="display: none;">📍 Google Map (200コイン)</button>
        <button id="dev-glass-btn" class="shop-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (1000コイン)</button>
        <br>
        
        <div class="start-action-row">
            <button id="start-btn" onclick="startGame()">START</button>
            <div id="toggle-container" style="display: flex; flex-direction: column; align-items: center;">
                <label class="switch" id="mode-toggle-label">
                    <input type="checkbox" id="mode-toggle" checked onchange="toggleStartMode(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="ui">
        <div class="item-row">
            <div id="amulet-display"></div>
            <div id="headphone-display"></div>
            <div id="ammo-display"></div>
            <div id="auto-status"></div>
            <div id="flashlight-display"></div>
        </div>
        <div id="level-text-ui" style="font-size: 1.1em; color: #fff; margin-bottom: 2px;">Level 1/20</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
        <div id="ver-text" style="font-size: 0.85em; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    <audio id="bgm-suzumusi" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Suzumusi.mp3" loop></audio>
    <audio id="bgm-brown" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Brown_Noise.mp3" loop></audio>
    
    <div id="ranking-display"></div>
    
    <canvas id="gameCanvas"></canvas>

<script>
const GAME_VERSION = "25.1.3";
const wallImg = new Image(); wallImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/blue_wall.png';
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Watchdog.png';
const hunterImg = new Image(); hunterImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter.png';

const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Watchdog_woof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const dogCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane_watchdog.mp3');
const shotgunSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Shotgun.mp3');

const hunterWoofSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunter_woof.mp3');
const hunterBiteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Hunterbite.mp3');
const hunterCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane_hunter.mp3');

let audioCtx = null, soundReady = false;
let isBlind = true, gameStarted = false;
let autoStartTimeout = null;
let countdownInterval = null;
let isManualMode = false; 

let currentLevel = 1, totalCoins = 101000, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false;
let hasHeadphone = false;
let currentBGM = null; 

let hasShotgun = false, shotgunAmmo = 0; 
let shotgunRevealActive = false; 
let hasFlashlight = false, flashlightBattery = 0;
const FLASHLIGHT_MAX = 200; 
const FLASHLIGHT_BONUS = 180;
let lastDir = { dx: 0, dy: -1 }; 
let flipX = false; 
let debugClickCount = 0;

let ROWS, COLS, map = [], dogs = [], hunters = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let scentMap = []; 
let playerHistory = []; 
let shortestPath = [], coinsCollectedInLevel = 0;
let lastMoveTime = Date.now(), autoMoveTimeout = null, autoLoadState = "NONE";
let loadingDots = 0;
let isAutoDeviceUsedInThisLevel = false;

let selectedMenuIndex = 1;

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 1975.53, 2093.00];

const gameOverMessages = [
    "一度噛んだら離さない。\nイッヌの執念があなたの魂を Level1 まで引きずり戻しました。",
    "ガブッ！\nイッヌがあなたを「巨大な骨付き肉」と勘違いしました。",
    "あなたの骨が砕ける音だけが迷宮に響き渡りました。",
    "イッヌの愛情(物理)を受け、あなたは可愛さのあまり意識を失いました。"
];

function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const silentPlay = (audio) => { 
        audio.muted = true;
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; audio.muted = false; }).catch(e => {}); 
    };
    [growlSnd, biteSnd, dogCrySnd, shotgunSnd, hunterWoofSnd, hunterBiteSnd, hunterCrySnd].forEach(silentPlay);
    soundReady = true;
}

function playSound(audio) {
    if (!audio) return;
    audio.pause(); audio.currentTime = 0;
    audio.play().catch(e => {});
}

function stopAllBGM() {
    ['bgm-koori', 'bgm-hikari', 'bgm-suzumusi', 'bgm-brown'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.pause();
    });
}

function toggleStartMode(isAuto) {
    isManualMode = !isAuto;
    const startBtn = document.getElementById('start-btn');
    const checkbox = document.getElementById('mode-toggle');
    checkbox.checked = isAuto;
    if (isManualMode) {
        if (autoStartTimeout) clearTimeout(autoStartTimeout);
        if (countdownInterval) clearInterval(countdownInterval);
        startBtn.innerText = "START";
    } else {
        if (currentLevel >= 2) startAutoStartCountdown();
    }
}

function startAutoStartCountdown() {
    if (gameStarted) return;
    const startBtn = document.getElementById('start-btn');
    if (autoStartTimeout) clearTimeout(autoStartTimeout);
    if (countdownInterval) clearInterval(countdownInterval);
    if (isManualMode || currentLevel < 2) { startBtn.innerText = "START"; return; }
    let remaining = 10;
    startBtn.innerText = `START (${remaining}s)`;
    countdownInterval = setInterval(() => {
        remaining--;
        if (remaining <= 0) { clearInterval(countdownInterval); startBtn.innerText = "START"; }
        else { startBtn.innerText = `START (${remaining}s)`; }
    }, 1000);
    autoStartTimeout = setTimeout(() => { if (!gameStarted && !isManualMode) startGame(); }, 10000);
}

function resetAutoStartTimer() {
    if (gameStarted || currentLevel < 2 || isManualMode) return;
    startAutoStartCountdown();
}

function getSelectableElements() {
    const ids = ['level-display', 'hp-buy-btn', 'bgm-cycle-btn', 'flashlight-btn', 'amulet-btn', 'shotgun-btn', 'auto-device-btn', 'dev-glass-btn', 'start-btn', 'mode-toggle-label', 'toggleMode'];
    return ids.map(id => document.getElementById(id)).filter(el => {
        if (!el) return false;
        const style = window.getComputedStyle(el);
        return style.display !== 'none' && style.visibility !== 'hidden';
    });
}

function updateMenuSelection() {
    const elements = getSelectableElements();
    elements.forEach((el, idx) => {
        if (idx === selectedMenuIndex) el.classList.add('kb-selected');
        else el.classList.remove('kb-selected');
    });
}

function updateUI() {
    const verDisplay = document.getElementById('ver-text');
    if (verDisplay) verDisplay.innerText = `ver.${GAME_VERSION}`;
    const levelDisplay = document.getElementById('level-display');
    const startContainer = document.getElementById('start-container');
    const startBtn = document.getElementById('start-btn');
    const toggleContainer = document.getElementById('toggle-container');
    const slider = document.querySelector('.slider');
    const devBtn = document.getElementById('dev-glass-btn');
    toggleContainer.style.visibility = (currentLevel === 1) ? 'hidden' : 'visible';
    const isHard = currentLevel >= 11 && currentLevel <= 15;
    const isExtreme = currentLevel >= 16;
    startContainer.style.boxShadow = "none";
    startBtn.style.boxShadow = "none";
    startBtn.classList.remove('extreme-shake');
    slider.style.setProperty('--toggle-color', "#28a745");
    if (isExtreme) {
        const modeColor = "#dc3545"; 
        startBtn.style.backgroundColor = modeColor;
        startBtn.classList.add('extreme-shake');
        slider.style.setProperty('--toggle-color', modeColor);
        startContainer.style.border = `10px double ${modeColor}`;
        levelDisplay.innerHTML = `<span class="extreme-shake" style="color:${modeColor};">Level ${currentLevel}</span><br><span class="extreme-shake" style="font-size: 18px; color:${modeColor};">EXTREME MODE</span>`;
    } else if (isHard) {
        const modeColor = "#007bff"; 
        startBtn.style.backgroundColor = modeColor;
        slider.style.setProperty('--toggle-color', modeColor);
        startContainer.style.border = `6px solid ${modeColor}`;
        levelDisplay.innerHTML = `<span style="color:${modeColor};">Level ${currentLevel}</span><br><span style="font-size: 18px; color:${modeColor};">HARD MODE</span>`;
    } else {
        const modeColor = "#28a745"; 
        startBtn.style.backgroundColor = modeColor;
        slider.style.setProperty('--toggle-color', modeColor);
        startContainer.style.border = "none";
        levelDisplay.innerHTML = `<span style="color:${modeColor};">Level ${currentLevel}</span><br><span style="font-size: 18px; color:${modeColor};">NORMAL MODE</span>`;
    }
    if (currentLevel >= 11) {
        document.getElementById('shotgun-btn').style.display = 'block';
        document.getElementById('auto-device-btn').style.display = 'block';
    } else {
        document.getElementById('shotgun-btn').style.display = 'none';
        document.getElementById('auto-device-btn').style.display = 'none';
    }
    if (isManualMode || currentLevel === 1) startBtn.innerText = "START";
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";
    devBtn.disabled = (hasDevGlasses || totalCoins < 1000);
    const hpBuyBtn = document.getElementById('hp-buy-btn');
    const cycleBtn = document.getElementById('bgm-cycle-btn');
    const hpDisplay = document.getElementById('headphone-display');
    if (hasHeadphone) {
        let bgmStatusIcon = "🔕";
        let nextSongName = "❄️ 氷の華";
        if (currentBGM === 1) { bgmStatusIcon = "❄️"; nextSongName = "🏝️ 最果ての島"; }
        else if (currentBGM === 2) { bgmStatusIcon = "🏝️"; nextSongName = "🌌 夜の音"; }
        else if (currentBGM === 3) { bgmStatusIcon = "🌌"; nextSongName = "🎵 ブラウンノイズ"; }
        else if (currentBGM === 4) { bgmStatusIcon = "🎵"; nextSongName = "🔕 BGMなし"; }
        else { bgmStatusIcon = "🔕"; nextSongName = "❄️ 氷の華"; }
        hpDisplay.innerText = `🎹${bgmStatusIcon}`;
        hpBuyBtn.style.display = 'none';
        cycleBtn.style.display = 'block';
        cycleBtn.innerText = `🎹${nextSongName} に変更 (0コイン)`;
    } else {
        hpDisplay.innerText = "";
        hpBuyBtn.style.display = 'block';
        hpBuyBtn.disabled = totalCoins < 5;
        cycleBtn.style.display = 'none';
    }
    const sBtn = document.getElementById('shotgun-btn');
    if (!hasShotgun) { sBtn.innerText = "💥 ショットガン (50コイン)"; sBtn.disabled = totalCoins < 50; } 
    else { sBtn.innerText = `💥 ショットガンの弾 [${shotgunAmmo}/2] (30コイン)`; sBtn.disabled = (shotgunAmmo >= 2 || totalCoins < 30); }
    document.getElementById('ammo-display').innerText = (hasShotgun && shotgunAmmo > 0) ? "💥".repeat(shotgunAmmo) : "";
    const fBtn = document.getElementById('flashlight-btn');
    if (!hasFlashlight) { fBtn.innerText = "🔦 懐中電灯 (15コイン)"; fBtn.disabled = totalCoins < 15; } 
    else { fBtn.innerText = `🔦 電池10s追加 [${Math.ceil(flashlightBattery)}/${FLASHLIGHT_MAX}s] (5コイン)`; fBtn.disabled = (flashlightBattery >= FLASHLIGHT_MAX || totalCoins < 5); }
    const fDisplay = document.getElementById('flashlight-display');
    if (hasFlashlight && flashlightBattery > 0) {
        fDisplay.innerText = `🔦${Math.ceil(flashlightBattery)}s`;
        fDisplay.style.color = (flashlightBattery < 10) ? "#ff4444" : "#fff";
    } else { fDisplay.innerText = ""; }
    const aBtn = document.getElementById('auto-device-btn');
    aBtn.innerText = "📍 Google Map (200コイン)"; aBtn.disabled = (hasAutoDevice || totalCoins < 200);
    const amuletBtn = document.getElementById('amulet-btn');
    amuletBtn.innerText = `⛩️ 金運アップお守り (25コイン)`; amuletBtn.disabled = (hasAmulet || totalCoins < 25);
    document.getElementById('controls').style.display = hasDevGlasses ? 'block' : 'none';
    let diffTag = isExtreme ? " (EXTREME)" : (isHard ? " (HARD)" : "");
    document.getElementById('level-text-ui').innerText = `Level ${currentLevel}/20${diffTag}`;
    let statusText = "";
    if (hasAutoDevice) {
        if (autoLoadState === "NONE") statusText = "📍";
        else if (autoLoadState === "LOADING") statusText = "📡" + ".".repeat(loadingDots);
        else if (autoLoadState === "MOVING") statusText = `📍[案内中](${getDistanceToGoal()}s)`;
    }
    document.getElementById('auto-status').innerText = statusText;
    if (!gameStarted) updateMenuSelection();
}

function buyHeadphone() { if (totalCoins >= 5) { totalCoins -= 5; hasHeadphone = true; currentBGM = null; updateUI(); resetAutoStartTimer(); } }
function cycleBGM() {
    if (currentBGM === null) currentBGM = 1;
    else if (currentBGM === 1) currentBGM = 2;
    else if (currentBGM === 2) currentBGM = 3;
    else if (currentBGM === 3) currentBGM = 4;
    else currentBGM = null;
    updateUI(); resetAutoStartTimer();
}
function buyShotgun() {
    if (!hasShotgun) { if (totalCoins >= 50) { totalCoins -= 50; hasShotgun = true; shotgunAmmo = 2; } } 
    else { if (totalCoins >= 30 && shotgunAmmo < 2) { totalCoins -= 30; shotgunAmmo += 1; } }
    updateUI(); resetAutoStartTimer();
}
function buyFlashlight() {
    if (!hasFlashlight) { if (totalCoins >= 15) { totalCoins -= 15; hasFlashlight = true; flashlightBattery = 60; } } 
    else { if (totalCoins >= 5 && flashlightBattery < FLASHLIGHT_MAX) { totalCoins -= 5; flashlightBattery = Math.min(FLASHLIGHT_MAX, flashlightBattery + 10); } }
    updateUI(); resetAutoStartTimer();
}
function buyAmulet() { if (!hasAmulet && totalCoins >= 25) { totalCoins -= 25; hasAmulet = true; coinMultiplier = 3; updateUI(); resetAutoStartTimer(); } }
function buyAutoDevice() { if (!hasAutoDevice && totalCoins >= 200) { totalCoins -= 200; hasAutoDevice = true; updateUI(); resetAutoStartTimer(); } }
function buyDevGlasses() { if (!hasDevGlasses && totalCoins >= 1000) { totalCoins -= 1000; hasDevGlasses = true; updateUI(); resetAutoStartTimer(); } }

function triggerDebugJump() {
    if (gameStarted) return;
    debugClickCount++;
    if (debugClickCount === 10) { currentLevel = 11; updateUI(); resetAutoStartTimer(); } 
    else if (debugClickCount === 20) { currentLevel = 16; updateUI(); resetAutoStartTimer(); }
    else if (debugClickCount === 30) { currentLevel = 20; updateUI(); resetAutoStartTimer(); }
}

function initScentMap() {
    scentMap = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    playerHistory = [{x: player.x, y: player.y}];
    updateScentMap();
}

function updateScentMap() {
    for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) scentMap[y][x] = 0;
    for (let i = 0; i < playerHistory.length; i++) {
        let pos = playerHistory[i];
        let n = (playerHistory.length - 1) - i;
        let power = (n <= 1000) ? (1000 - n) + 1 : 1;
        scentMap[pos.y][pos.x] = power;
    }
}

// 1マス幅を基本とした、うねうねした細い道を作る関数
function generateSimpleMaze() {
    const sizeMap = {
        1: [7, 9],    2: [9, 11],   3: [11, 13],  4: [13, 15],  5: [15, 19],
        6: [13, 15],  7: [15, 19],  8: [15, 19],  9: [17, 21],  10: [17, 21],
        11: [15, 19], 12: [15, 19], 13: [17, 21], 14: [17, 21], 15: [17, 21],
        16: [17, 23], 17: [19, 23], 18: [19, 25], 19: [21, 25], 20: [23, 27]
    };
    const s = sizeMap[currentLevel] || [23, 27];
    COLS = s[0]; ROWS = s[1];

    if (currentLevel <= 2) {
        // --- Level 1-2 専用：シンプルアルゴリズム ---
        generateTutorialMaze();
    } else {
        // --- Level 3以上：複雑なアリの巣セミオートマトン ---
        generateComplexMaze();
    }
    initScentMap();
}

// Level 1-2用：確実な道を1本作り、周囲を少し広げるだけ
function generateTutorialMaze() {
    map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
    player = { x: 1, y: 1 };
    goalPos = { x: COLS - 2, y: ROWS - 2 };

    // プレイヤーからゴールまでL字に掘る（確実に道を保証）
    for (let x = player.x; x <= goalPos.x; x++) map[player.y][x] = 0;
    for (let y = player.y; y <= goalPos.y; y++) map[y][goalPos.x] = 0;

    // ランダムに少しだけ床を増やして「洞窟感」を出す
    for (let i = 0; i < (COLS * ROWS) * 0.3; i++) {
        let rx = 1 + Math.floor(Math.random() * (COLS - 2));
        let ry = 1 + Math.floor(Math.random() * (ROWS - 2));
        map[ry][rx] = 0;
    }

    map[player.y][player.x] = 0;
    map[goalPos.y][goalPos.x] = 2;

    // 最短経路を計算（UI表示用など）
    shortestPath = []; 
    for(let x=player.x; x<=goalPos.x; x++) shortestPath.push({x: x, y: player.y});
    for(let y=player.y+1; y<=goalPos.y; y++) shortestPath.push({x: goalPos.x, y: y});

    // アイテム配置
    let walkable = [];
    for(let y=1; y<ROWS-1; y++) for(let x=1; x<COLS-1; x++) if(map[y][x] === 0) walkable.push({x, y});
    placeEntities(walkable);
}

// Level 3以上用：複雑なうねうね迷路
function generateComplexMaze() {
    let found = false;
    let attempts = 0;
    while (!found && attempts < 50) {
        attempts++;
        let wallDensity = Math.min(0.52, 0.40 + (currentLevel * 0.01));
        let tempMap = Array.from({ length: ROWS }, (_, y) =>
            Array.from({ length: COLS }, (_, x) => {
                if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) return 1;
                return Math.random() < wallDensity ? 1 : 0;
            })
        );

        // セルオートマトン(1回)
        let nextGen = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
        for (let y = 1; y < ROWS - 1; y++) {
            for (let x = 1; x < COLS - 1; x++) {
                let walls = 0;
                for (let yy = -1; yy <= 1; yy++) {
                    for (let xx = -1; xx <= 1; xx++) {
                        if (tempMap[y + yy][x + xx] === 1) walls++;
                    }
                }
                nextGen[y][x] = (walls >= 4) ? 1 : 0;
            }
        }
        map = nextGen;

        let regions = getRegions(map);
        if (regions.length < 1) continue;
        for (let i = 0; i < regions.length - 1; i++) connectRegionsHighlyWinding(regions[i], regions[i + 1]);

        let allWalkable = [];
        for(let y=1; y<ROWS-1; y++) for(let x=1; x<COLS-1; x++) if(map[y][x] === 0) allWalkable.push({x, y});
        if (allWalkable.length < (COLS * ROWS) * 0.22) continue;

        let startPos = allWalkable[Math.floor(Math.random() * allWalkable.length)];
        player = { x: startPos.x, y: startPos.y };

        let dists = Array.from({ length: ROWS }, () => Array(COLS).fill(-1));
        let q = [{ x: player.x, y: player.y, d: 0, path: [] }];
        dists[player.y][player.x] = 0;
        let furthest = q[0], reachableData = [];

        while (q.length > 0) {
            let curr = q.shift(); reachableData.push(curr);
            if (curr.d > furthest.d) furthest = curr;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                let nx = curr.x + dx, ny = curr.y + dy;
                if (nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && map[ny][nx] === 0 && dists[ny][nx] === -1) {
                    dists[ny][nx] = curr.d + 1;
                    q.push({ x: nx, y: ny, d: curr.d + 1, path: [...curr.path, {x: nx, y: ny}] });
                }
            });
        }

        if (furthest.d >= Math.floor(Math.max(COLS, ROWS) * 0.85)) {
            goalPos = { x: furthest.x, y: furthest.y };
            map[goalPos.y][goalPos.x] = 2;
            shortestPath = furthest.path;
            placeEntities(reachableData);
            found = true;
        }
    }
}

function getRegions(m) {
    let regions = [];
    let visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    for (let y = 1; y < ROWS - 1; y++) {
        for (let x = 1; x < COLS - 1; x++) {
            if (m[y][x] === 0 && !visited[y][x]) {
                let region = [];
                let q = [{x, y}];
                visited[y][x] = true;
                while (q.length > 0) {
                    let p = q.shift(); region.push(p);
                    [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                        let nx = p.x + dx, ny = p.y + dy;
                        if (nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1 && m[ny][nx] === 0 && !visited[ny][nx]) {
                            visited[ny][nx] = true; q.push({x: nx, y: ny});
                        }
                    });
                }
                regions.push(region);
            }
        }
    }
    return regions;
}

function connectRegionsHighlyWinding(regA, regB) {
    let p1 = regA[Math.floor(Math.random() * regA.length)];
    let p2 = regB[Math.floor(Math.random() * regB.length)];
    let cx = p1.x, cy = p1.y;
    while (cx !== p2.x || cy !== p2.y) {
        if (Math.random() > 0.5) {
            if (cx !== p2.x && (cy === p2.y || Math.random() < 0.5)) cx += (p2.x > cx ? 1 : -1);
            else cy += (p2.y > cy ? 1 : -1);
        } else {
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            let d = dirs[Math.floor(Math.random() * 4)];
            if (cx+d[0] > 0 && cx+d[0] < COLS-1 && cy+d[1] > 0 && cy+d[1] < ROWS-1) { cx += d[0]; cy += d[1]; }
        }
        map[cy][cx] = 0;
    }
}

function placeEntities(walkableData) {
    let candidates = walkableData.filter(p => (p.x !== goalPos.x || p.y !== goalPos.y) && (p.x !== player.x || p.y !== player.y));
    candidates.sort(() => Math.random() - 0.5);
    let coinCount = (currentLevel <= 10) ? Math.max(1, Math.floor(shortestPath.length / 4)) : currentLevel;
    for(let i=0; i<Math.min(coinCount, candidates.length); i++) {
        map[candidates[i].y][candidates[i].x] = 3;
    }
    dogs = []; hunters = [];
    let safetyZone = new Set();
    for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) safetyZone.add(`${player.x+j},${player.y+i}`);
    let enemyCandidates = candidates.filter(p => !safetyZone.has(`${p.x},${p.y}`));
    if (currentLevel >= 16 && enemyCandidates.length > 0) {
        let h = enemyCandidates.pop();
        hunters.push({ x: h.x, y: h.y, alerted: false, lastDir: { dx: 0, dy: 0 } });
    }
    let dogLimit = currentLevel === 2 ? 1 : 0; // Level 2は1匹、Level 1は0匹
    if (currentLevel >= 3) dogLimit = Math.min(3, Math.floor(currentLevel / 5) + 1);
    for(let i=0; i<dogLimit && enemyCandidates.length > 0; i++) {
        let d = enemyCandidates.pop();
        dogs.push({ x: d.x, y: d.y });
    }
}

function getManhattanDist(p1, p2) {
    return Math.abs(p1.x - p2.x) + Math.abs(p1.y - p2.y);
}

function triggerHunterSound() {
    if (hunters.length === 0) return;
    let minDist = 999;
    hunters.forEach(h => minDist = Math.min(minDist, getManhattanDist(player, h)));
    const volMap = { 1: 1.0, 2: 0.4, 3: 0.2, 4: 0.1, 5: 0.05 };
    let vol = volMap[minDist] || 0;
    if (vol > 0) {
        hunterWoofSnd.volume = vol;
        playSound(hunterWoofSnd);
    }
}

function moveHunters() {
    if (!gameStarted) return;
    hunters.forEach(h => {
        if (!h.alerted) {
            for(let[dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = h.x + dx, ny = h.y + dy;
                if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && scentMap[ny][nx] > 0) {
                    h.alerted = true; break;
                }
            }
        }
        let nextMove = null;
        if (h.alerted) {
            let scents =[];
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = h.x + dx, ny = h.y + dy;
                if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1) {
                    scents.push({ dx, dy, val: scentMap[ny][nx] });
                }
            }
            if (scents.length > 0) {
                scents.sort((a, b) => b.val - a.val);
                let roll = Math.random();
                if (roll < 0.77 || scents.length < 2) nextMove = scents[0];
                else nextMove = scents[1];            
            }
        } else {
            let possible =[];
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = h.x + dx, ny = h.y + dy;
                if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1) {
                    possible.push({ dx, dy });
                }
            }
            if (possible.length > 0) {
                let sameDir = possible.find(p => p.dx === h.lastDir.dx && p.dy === h.lastDir.dy);
                let roll = Math.random();
                if (sameDir && roll < 0.60) nextMove = sameDir;
                else nextMove = possible[Math.floor(Math.random() * possible.length)];
            }
        }
        if (nextMove) {
            let nx = h.x + nextMove.dx, ny = h.y + nextMove.dy;
            if (nx === player.x && ny === player.y) return; 
            h.x = nx; h.y = ny; h.lastDir = { dx: nextMove.dx, dy: nextMove.dy };
        }
    });
    checkHunterCollision();
    triggerHunterSound();
    draw();
}

function checkHunterCollision() {
    let hIdx = hunters.findIndex(h => h.x === player.x && h.y === player.y);
    if (hIdx !== -1) {
        if (shotgunAmmo > 0) {
            shotgunAmmo--; playSound(shotgunSnd); hunters.splice(hIdx, 1);
            setTimeout(() => playSound(hunterCrySnd), 1300);
            setTimeout(() => { shotgunRevealActive = true; draw(); setTimeout(() => { shotgunRevealActive = false; draw(); }, 250); }, 500);
            updateUI();
        } else { triggerGameOver(hunterBiteSnd); }
        return true;
    }
    return false;
}

function triggerGameOver(snd) {
    gameStarted = false; playSound(snd); stopAllBGM();
    if (hunterWoofSnd) hunterWoofSnd.pause();
    let msg = gameOverMessages[Math.floor(Math.random()*gameOverMessages.length)];
    setTimeout(() => { alert(`\n\n~~ GAME OVER ~~\n\n${msg}`); resetGame(); }, 100);
}

function getDistanceToGoal() {
    let q = [{x: player.x, y: player.y, d: 0}], visited = new Set(); visited.add(`${player.x},${player.y}`);
    const enemySet = new Set([...dogs, ...hunters].map(d => `${d.x},${d.y}`));
    while(q.length > 0) {
        let curr = q.shift(); if(map[curr.y][curr.x] === 2) return curr.d;
        for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
            let nx = curr.x+dx, ny = curr.y+dy, key = `${nx},${ny}`;
            if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1 && !visited.has(key) && !enemySet.has(key)) { visited.add(key); q.push({x: nx, y: ny, d: curr.d + 1}); }
        }
    }
    return 0;
}

function getNextStepToGoal() {
    let q = [{x: player.x, y: player.y, path: []}], visited = new Set(); visited.add(`${player.x},${player.y}`);
    const enemySet = new Set([...dogs, ...hunters].map(d => `${d.x},${d.y}`));
    while(q.length > 0) {
        let curr = q.shift(); if(map[curr.y][curr.x] === 2) return curr.path[0];
        for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
            let nx = curr.x+dx, ny = curr.y+dy, key = `${nx},${ny}`;
            if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1 && !visited.has(key) && !enemySet.has(key)) { visited.add(key); q.push({x: nx, y: ny, path: [...curr.path, {dx, dy}]}); }
        }
    }
    return null;
}

function executeAutoStep() {
    if (autoLoadState !== "MOVING" || !gameStarted || !hasAutoDevice) return;
    isAutoDeviceUsedInThisLevel = true; let step = getNextStepToGoal();
    if (step) { movePlayer(step.dx, step.dy, true); autoMoveTimeout = setTimeout(executeAutoStep, 1000); } 
    else { stopAutoProcess(); }
}
function stopAutoProcess() { autoLoadState = "NONE"; if (autoMoveTimeout) { clearTimeout(autoMoveTimeout); autoMoveTimeout = null; } updateUI(); }

setInterval(() => {
    if (!gameStarted) return;
    if (hasFlashlight && flashlightBattery > 0) { 
        flashlightBattery = Math.max(0, flashlightBattery - 0.1); 
        if (Math.ceil(flashlightBattery * 10) % 10 === 0) updateUI(); draw(); 
    }
    if (!hasAutoDevice) return;
    let idle = Date.now() - lastMoveTime;
    if (autoLoadState === "NONE" && idle > 3000) autoLoadState = "LOADING"; 
    if (autoLoadState === "LOADING") {
        loadingDots = Math.floor((idle - 3000) / 500) % 4; updateUI();
        if (idle > 9000) { autoLoadState = "MOVING"; executeAutoStep(); }
    }
}, 100);

async function playOscillator(f, t, d, vol = 0.06) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function movePlayer(dx, dy, isAuto = false) {
    if(!gameStarted) return;
    if (!isAuto) { lastMoveTime = Date.now(); stopAutoProcess(); }
    if (dx === -1) flipX = false; if (dx === 1) flipX = true;
    lastDir = { dx, dy };
    const nx = player.x + dx, ny = player.y + dy;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || map[ny][nx] === 1) { 
        if(!isAuto) playOscillator(55, 'sine', 0.15, 0.5); return;
    } 
    let hunterHere = hunters.find(h => h.x === nx && h.y === ny);
    if (hunterHere) { player.x = nx; player.y = ny; checkHunterCollision(); return; }
    player.x = nx; player.y = ny;
    playerHistory.push({x: player.x, y: player.y});
    updateScentMap();
    let dogIndex = dogs.findIndex(d => d.x === player.x && d.y === player.y);
    if (dogIndex !== -1) {
        if (shotgunAmmo > 0) { 
            shotgunAmmo--; playSound(shotgunSnd); dogs.splice(dogIndex, 1); 
            setTimeout(() => playSound(dogCrySnd), 1300);
            setTimeout(() => { shotgunRevealActive = true; draw(); setTimeout(() => { shotgunRevealActive = false; draw(); }, 250); }, 500);
            updateUI(); 
        } else { triggerGameOver(biteSnd); return; }
    }
    if (!isAuto && dogs.some(d => Math.abs(d.x-player.x)+Math.abs(d.y-player.y)===1)) playSound(growlSnd);
    moveHunters();
    if (map[ny][nx] === 2) {
        playGoalSound();
        if (currentLevel === 20) { 
            gameStarted = false; stopAllBGM(); if (hunterWoofSnd) hunterWoofSnd.pause();
            setTimeout(async () => {
                const playerName = prompt("全ステージクリア！\n名前を入力してください:", "スーパーネコ") || "イッヌ";
                const rankingDiv = document.getElementById('ranking-display');
                rankingDiv.style.display = 'block';
                rankingDiv.innerHTML = "<h3>スコア送信中...</h3>";
                try {
                    const gasBaseUrl = "https://script.google.com/macros/s/AKfycbyQ4skGmB7LdTklwfVMYegsYlK3y-DwkxILgbyBlEElbjKq_neJkzcNOJEDQPmX6Wfbpg/exec"; 
                    const finalUrl = `${gasBaseUrl}?name=${encodeURIComponent(playerName)}&score=${totalCoins}`;
                    const response = await fetch(finalUrl);
                    if (!response.ok) throw new Error("通信エラーが発生しました");
                    const rankingData = await response.json();
                    let html = "<h2>🏆 殿堂入り 🏆</h2><table id='ranking-table'><tr><th>順位</th><th>名前</th><th>スコア</th></tr>";
                    rankingData.forEach((row, index) => { html += `<tr><td>${index + 1}位</td><td>${row.name}</td><td>${row.score}</td></tr>`; });
                    html += "</table><button class='retry-btn' onclick='location.reload()'>タイトルへ戻る</button>";
                    rankingDiv.innerHTML = html;
                } catch (e) {
                    rankingDiv.innerHTML = `<h3>スコア保存完了</h3><button class='retry-btn' onclick='location.reload()'>タイトルへ戻る</button>`;
                }
            }, 100);
            return; 
        }
        currentLevel++; 
        if (isAutoDeviceUsedInThisLevel) hasAutoDevice = false;
        isAutoDeviceUsedInThisLevel = false;
        gameStarted = false; 
        if (!hasDevGlasses) isBlind = true; 
        stopAutoProcess(); stopAllBGM(); if (hunterWoofSnd) hunterWoofSnd.pause();
        const container = document.getElementById('start-container');
        container.classList.remove('opaque'); container.style.display = 'flex'; 
        selectedMenuIndex = 1;
        setTimeout(() => { if (!gameStarted) { container.classList.add('opaque'); startAutoStartCountdown(); } }, 1750); 
        updateUI();
    } else if (map[ny][nx] === 3) {
        playCoinSound(coinsCollectedInLevel); map[ny][nx] = 0; 
        totalCoins += ((currentLevel >= 11 ? 10 : 1) * coinMultiplier);
        coinsCollectedInLevel++; updateUI();
    }
    if (isAuto) updateUI();
    draw();
}

async function startGame() { 
    if (autoStartTimeout) clearTimeout(autoStartTimeout);
    if (countdownInterval) clearInterval(countdownInterval);
    document.getElementById('start-btn').innerText = "START";

function toggleBlind() { isBlind = !isBlind; draw(); }
function playCoinSound(step) {
    const triggerTone = () => {
        let f = WHITE_KEYS[step % WHITE_KEYS.length];
        if (hasAmulet) { [1, 1.25, 1.5].forEach((r, i) => setTimeout(() => playOscillator(f * r, 'sine', 0.25), i * 25)); } 
        else { playOscillator(f, 'sine', 0.15); }
    };
    if (currentLevel >= 11) { for (let i = 0; i < 5; i++) setTimeout(triggerTone, i * 100); } else { triggerTone(); }
}
async function playGoalSound() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playOscillator(f, 'triangle', 0.4), i * 150)); }

function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let px = oX + x * size, py = oY + y * size;
            if (map[y][x] === 1) { 
                if (wallImg.complete && wallImg.naturalWidth !== 0) ctx.drawImage(wallImg, px, py, size + 0.5, size + 0.5);
                else { ctx.fillStyle = "#333"; ctx.fillRect(px, py, size, size); }
            } else if (map[y][x] === 2) {
                let cs=3, rs=4, cw=size/cs, ch=size/rs;
                for(let r=0; r<rs; r++) for(let c=0; c<cs; c++) { ctx.fillStyle=(r+c)%2===0?"#fff":"#000"; ctx.fillRect(px+c*cw, py+r*ch, cw, ch); }
            } else if (map[y][x] === 3) {
                ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#5d4037"; ctx.font=`bold ${size/2.5}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("$", px+size/2, py+size/2);
            }
        }
    }
    dogs.forEach(d => ctx.drawImage(dogImg, oX+d.x*size, oY+d.y*size, size, size));
    hunters.forEach(h => ctx.drawImage(hunterImg, oX+h.x*size, oY+h.y*size, size, size));
    const pX = oX + player.x * size, pY = oY + player.y * size;
    ctx.save();
    if (flipX) { ctx.translate(pX + size, pY); ctx.scale(-1, 1); ctx.drawImage(playerImg, 0, 0, size, size); } 
    else { ctx.drawImage(playerImg, pX, pY, size, size); }
    ctx.restore();
    if (isBlind && gameStarted && !shotgunRevealActive) { 
        ctx.save();
        const tempCanvas = document.createElement('canvas'); tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.fillStyle = "black"; tCtx.fillRect(0, 0, canvas.width, canvas.height);
        if (hasFlashlight && flashlightBattery > 0) {
            const cX = pX + size / 2, cY = pY + size / 2, angle = Math.atan2(lastDir.dy, lastDir.dx);
            let b = Math.min(1, flashlightBattery < 10 ? flashlightBattery / 10 : 1);
            if (flashlightBattery < 4 && Math.random() > 0.7) b *= (Math.random() * 0.4);
            tCtx.globalCompositeOperation = 'destination-out';
            let fr, ftr, fw;
            if (flashlightBattery >= FLASHLIGHT_BONUS) { ftr=size*1.5; fr=size*4.5; fw=0.5; }
            else if (flashlightBattery >= FLASHLIGHT_BONUS - 10) {
                let r = (flashlightBattery - (FLASHLIGHT_BONUS - 10)) / 10;
                ftr = (size*1.5)*r+(size*0.6)*(1-r); fr = (size*4.5)*r+(size*1.8)*(1-r); fw = 0.5*r+0.3*(1-r);
            } else { ftr=size*0.6; fr=size*1.8; fw=0.3; }
            const footG = tCtx.createRadialGradient(cX, cY, 0, cX, cY, ftr);
            footG.addColorStop(0, `rgba(0,0,0,${b})`); footG.addColorStop(0.75, `rgba(0,0,0,${b})`); footG.addColorStop(1, 'rgba(0,0,0,0)');
            tCtx.fillStyle = footG; tCtx.beginPath(); tCtx.arc(cX, cY, ftr, 0, Math.PI * 2); tCtx.fill();
            const fanG = tCtx.createRadialGradient(cX, cY, size * 0.3, cX, cY, fr);
            fanG.addColorStop(0, `rgba(0,0,0,${b})`); fanG.addColorStop(0.65, `rgba(0,0,0,${b * 0.3})`); fanG.addColorStop(1, 'rgba(0,0,0,0)');
            tCtx.fillStyle = fanG; tCtx.beginPath(); tCtx.moveTo(cX, cY); tCtx.arc(cX, cY, fr, angle - fw, angle + fw); tCtx.closePath(); tCtx.fill();
        }
        ctx.drawImage(tempCanvas, 0, 0); ctx.restore();
    }
}

window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    const items = getSelectableElements();
    const isRestricted = (el) => el.id === 'level-display' || el.id === 'toggleMode';
    if (e.key === 'W' && !gameStarted) {
        const idx = items.findIndex(el => el.id === 'level-display');
        if (idx !== -1) { selectedMenuIndex = idx; updateMenuSelection(); }
        e.preventDefault(); return;
    }
    if (e.key === 'D') {
        const idx = items.findIndex(el => el.id === 'toggleMode');
        if (idx !== -1) { selectedMenuIndex = idx; updateMenuSelection(); }
        e.preventDefault(); return;
    }
    if (!gameStarted) {
        if (key === 'w' || key === 'a' || e.key === 'ArrowUp') {
            selectedMenuIndex = (selectedMenuIndex - 1 + items.length) % items.length;
            while (items[selectedMenuIndex] && isRestricted(items[selectedMenuIndex])) { selectedMenuIndex = (selectedMenuIndex - 1 + items.length) % items.length; }
            updateMenuSelection(); e.preventDefault();
        } else if (key === 's' || key === 'd' || e.key === 'ArrowDown') {
            selectedMenuIndex = (selectedMenuIndex + 1) % items.length;
            while (items[selectedMenuIndex] && isRestricted(items[selectedMenuIndex])) { selectedMenuIndex = (selectedMenuIndex + 1) % items.length; }
            updateMenuSelection(); e.preventDefault();
        } else if (e.key === ' ' || e.key === 'Enter') {
            const target = items[selectedMenuIndex];
            if (target) { if (target.id === 'mode-toggle-label') { toggleStartMode(!document.getElementById('mode-toggle').checked); } else target.click(); }
            e.preventDefault();
        }
    } else {
        if ((e.key === ' ' || e.key === 'Enter') && items[selectedMenuIndex]?.id === 'toggleMode') { items[selectedMenuIndex].click(); e.preventDefault(); return; }
        if (key === 'w' || e.key === 'ArrowUp') movePlayer(0, -1);
        else if (key === 's' || e.key === 'ArrowDown') movePlayer(0, 1);
        else if (key === 'a' || e.key === 'ArrowLeft') movePlayer(-1, 0);
        else if (key === 'd' || e.key === 'ArrowRight') movePlayer(1, 0);
    }
});

let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    if (tsX === null || tsY === null) return;
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > 20 || Math.abs(dy) > 20) { if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0); else movePlayer(0, dy > 0 ? 1 : -1); }
    tsX = null; tsY = null;
});
const startContainer = document.getElementById('start-container');
startContainer.addEventListener('mousedown', (e) => resetAutoStartTimer(e));
startContainer.addEventListener('touchstart', (e) => resetAutoStartTimer(e), {passive: true});
window.onresize = draw; updateUI(); draw();</script>
