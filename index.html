<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }

        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; 
            z-index: 200; 
            font-weight: bold; 
            background: rgba(0,0,0,0.6);
            color: #fff; 
            padding: 10px; border-radius: 6px;
            font-size: min(14px, 3.5vw);
            max-width: 40%;
        }
        
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
        
        #start-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        .shop-btn { padding: 10px; margin: 5px; background: #ffc107; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; }
        .shop-btn:disabled { background: #ccc; cursor: not-allowed; }
        .dev-btn { color: white; background-color: #d9534f; }
        #auto-status { color: #fff; font-size: 1.1em; height: 1.4em; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-container">
        <div id="level-display" style="font-size: 28px; font-weight: bold;">Level 1</div>
        <br>
        <button id="music-upgrade-btn" class="shop-btn" onclick="upgradeMusic()">🎧 ヘッドフォン (0コイン)</button>
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()">🔦 懐中電灯 (0コイン)</button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()">💥 ショットガン (0コイン)</button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運お守り (0コイン)</button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()">📍 Google Map (0コイン)</button>
        <button id="dev-glass-btn" class="shop-btn dev-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (0コイン)</button>
        <br>
        <button id="start-btn" onclick="startGame()">START</button>
    </div>

    <div id="ui">
        <div id="auto-status"></div>
        <div id="ammo-display"></div>
        <div id="amulet-display"></div>
        <div id="flashlight-display"></div>
        <div id="mode-text">BLIND MODE</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
        <div style="font-size: 0.85em; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    
    <canvas id="gameCanvas"></canvas>

<script>
const GAME_VERSION = "3.10";
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';
const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogwoof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const dogCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane.wav');

let audioCtx = null, soundReady = false;
let isBlind = true, gameStarted = false;
let currentLevel = 1, totalCoins = 0, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false, hasFlashlight = false;
let hasHeadphone = false, currentBGM = null; 
let shotgunAmmo = 0; 
let lastDir = { dx: 0, dy: -1 }; 
let flipX = false; 

let ROWS, COLS, map = [], dogs = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let shortestPath = [], coinsCollectedInLevel = 0;
let lastMoveTime = Date.now(), autoMoveTimeout = null, autoLoadState = "NONE";

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 1975.53, 2093.00];

const gameOverMessages = [
        "一度噛んだら離さない。\nイッヌの執念があなたの魂を Level1 まで引きずり戻しました。",
        "ガブッ！\nイッヌがあなたを「巨大な骨付き肉」と勘違いしました。",
        "あなたの骨が砕ける音だけが迷宮に響き渡りました。",
        "イッヌの愛情(物理)を受け、あなたは可愛さのあまり意識を失いました。" 
];

function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const silentPlay = (audio) => { 
        audio.muted = true;
        audio.play().then(() => { 
            audio.pause(); 
            audio.currentTime = 0; 
            audio.muted = false;
        }).catch(e => {
            console.log("Audio unlock failed:", e);
        }); 
    };
    [growlSnd, biteSnd, dogCrySnd].forEach(silentPlay);
    soundReady = true;
}

function playSound(audio) {
    if (!audio) return;
    audio.pause(); audio.currentTime = 0;
    audio.play().catch(e => {});
}

function updateUI() {
    const verDisplay = document.querySelector('#ui div:last-child');
    if (verDisplay) verDisplay.innerText = `ver.${GAME_VERSION}${hasDevGlasses ? " (Debug Mode)" : ""}`;
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('level-display').innerText = `Level ${currentLevel}`;
    document.getElementById('ammo-display').innerText = shotgunAmmo > 0 ? "💥".repeat(shotgunAmmo) : "";
    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";
    document.getElementById('flashlight-display').innerText = hasFlashlight ? "🔦" : "";
    document.getElementById('mode-text').innerText = isBlind ? "BLIND MODE" : "DEBUG MODE";

    let statusText = "";
    if (autoLoadState === "LOADING") statusText = "  📡";
    else if (autoLoadState === "MOVING") statusText = `  📍(${(calculateInterval()/1000).toFixed(2)}s)`;
    document.getElementById('auto-status').innerText = statusText;

    document.getElementById('amulet-btn').disabled = hasAmulet;
    document.getElementById('shotgun-btn').disabled = shotgunAmmo > 0;
    document.getElementById('auto-device-btn').disabled = hasAutoDevice;
    document.getElementById('flashlight-btn').disabled = hasFlashlight;
    document.getElementById('dev-glass-btn').disabled = hasDevGlasses;    
    document.getElementById('controls').style.display = hasDevGlasses ? 'block' : 'none';

    const mBtn = document.getElementById('music-upgrade-btn');
    if (!hasHeadphone) {
        mBtn.innerText = "🎧 ヘッドフォン (0コイン)";
        mBtn.disabled = false;
    } else if (currentBGM === null) {
        mBtn.innerText = "🎶 氷の華 (0コイン)";
        mBtn.disabled = false;
    } else if (currentBGM === 1) {
        mBtn.innerText = "🎵 忘れじの光 (0コイン)";
        mBtn.disabled = false;
    } else {
        mBtn.innerText = "🎧 音楽環境・完備";
        mBtn.disabled = true;
    }
}

function upgradeMusic() {
    if (!hasHeadphone) hasHeadphone = true;
    else if (currentBGM === null) currentBGM = 1;
    else if (currentBGM === 1) currentBGM = 2;
    updateUI();
}

function calculateInterval() { return Math.max(100, 3000 * Math.pow(0.975, Math.pow(totalCoins, 1.15))); }









function generateSimpleMaze() {
    // 1. サイズ決定 (奇数固定)
    COLS = Math.min(17, 5 + Math.floor((currentLevel - 1) * 1.34));
    ROWS = Math.min(21, Math.floor(COLS * 1.2));
    if (COLS % 2 === 0) COLS++;
    if (ROWS % 2 === 0) ROWS++;

    let found = false;
    let attempts = 0;

    while (!found && attempts < 50) {
        attempts++;
        map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
        
        // スタート地点
        let sX = 1 + Math.floor(Math.random() * ((COLS - 1) / 2)) * 2;
        let sY = 1 + Math.floor(Math.random() * ((ROWS - 1) / 2)) * 2;
        player = { x: sX, y: sY }; 
        map[sY][sX] = 0;

        // --- 2. メインルート作成 (全体に広場を散らす) ---
        let walkTarget = Math.floor(ROWS * COLS * 0.35);
        let walked = 1;
        let rx = sX, ry = sY;

        for (let i = 0; i < 2000 && walked < walkTarget; i++) {
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]], [dx, dy] = dirs[Math.floor(Math.random() * 4)];
            let nx = rx + dx, ny = ry + dy;
            
            if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1) {
                if(map[ny][nx] === 1) { map[ny][nx] = 0; walked++; }
                if (Math.random() > 0.6) {
                    for(let ey = -1; ey <= 1; ey++) {
                        for(let ex = -1; ex <= 1; ex++) {
                            let bx = nx + ex, by = ny + ey;
                            if(bx > 0 && bx < COLS - 1 && by > 0 && by < ROWS - 1) {
                                if(map[by][bx] === 1) { map[by][bx] = 0; walked++; }
                            }
                        }
                    }
                }
                rx = nx; ry = ny;
            } else {
                let walkablePoints = [];
                for(let y=1; y<ROWS-1; y++) for(let x=1; x<COLS-1; x++) if(map[y][x] === 0) walkablePoints.push({x, y});
                let nextStart = walkablePoints[Math.floor(Math.random() * walkablePoints.length)];
                rx = nextStart.x; ry = nextStart.y;
            }
        }

        // --- 3. 穴掘り法 ---
        const dig = (x, y) => {
            let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
            for(let [dx, dy] of dirs) {
                let nx = x + dx, ny = y + dy;
                if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1 && map[ny][nx] === 1) {
                    map[y + dy/2][x + dx/2] = 0;
                    map[ny][nx] = 0;
                    dig(nx, ny);
                }
            }
        };
        for(let y = 1; y < ROWS; y += 2) for(let x = 1; x < COLS; x += 2) if(map[y][x] === 0) dig(x, y);

        // --- 4. 距離計算 (BFS) ---
        let dists = Array.from({ length: ROWS }, () => Array(COLS).fill(-1)), q = [{x: sX, y: sY, d: 0, fullPath: []}]; 
        dists[sY][sX] = 0;
        let allWalkable = [];
        while(q.length > 0) {
            let curr = q.shift(); 
            allWalkable.push(curr);
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = curr.x + dx, ny = curr.y + dy;
                if(ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS && map[ny][nx] !== 1 && dists[ny][nx] === -1) {
                    dists[ny][nx] = curr.d + 1; 
                    q.push({x: nx, y: ny, d: curr.d + 1, fullPath: [...curr.fullPath, {x: nx, y: ny}]});
                }
            }
        }

        // --- 5. 配置 ---
        allWalkable.sort((a, b) => dists[b.y][b.x] - dists[a.y][a.x]);
        let target = allWalkable[0];

        if(target && dists[target.y][target.x] > 2) {
            map[target.y][target.x] = 2; // ゴール
            goalPos = { x: target.x, y: target.y };
            shortestPath = target.fullPath; 
            coinsCollectedInLevel = 0;

            // コイン配置
            let stepSize = currentLevel <= 9 ? (currentLevel === 1 ? 1 : Math.floor((currentLevel + 1) / 2)) : 5;
            for(let i = stepSize - 1; i < shortestPath.length; i += stepSize) {
                let p = shortestPath[i]; 
                if(!(p.x === goalPos.x && p.y === goalPos.y)) map[p.y][p.x] = 3;
            }

            // --- イッヌの配置 (安全圏の計算) ---
            dogs = [];
            let safetyZone = new Set();
            
            // ★追加: スタート地点の周囲3x3を強制的に安全圏にする
            for(let dy = -1; dy <= 1; dy++) {
                for(let dx = -1; dx <= 1; dx++) {
                    safetyZone.add(`${player.x + dx},${player.y + dy}`);
                }
            }

            // 最短経路上（Level 5までは最短経路の隣接も安全）
            if (currentLevel <= 5) {
                shortestPath.forEach(p => {
                    for(let dy = -1; dy <= 1; dy++) for(let dx = -1; dx <= 1; dx++) safetyZone.add(`${p.x + dx},${p.y + dy}`);
                });
            } else {
                shortestPath.forEach(p => safetyZone.add(`${p.x},${p.y}`));
            }
            
            let sidePaths = allWalkable.filter(p => !safetyZone.has(`${p.x},${p.y}`));
            let dogNum = Math.min(15, currentLevel - 1);
            for(let i = 0; i < dogNum && sidePaths.length > 0; i++) {
                let idx = Math.floor(Math.random() * sidePaths.length);
                dogs.push(sidePaths[idx]);
                sidePaths.splice(idx, 1);
            }
            found = true;
        }
    }
}


    


    
    
    
function getNextStepToGoal() {
    let q = [{x: player.x, y: player.y, path: []}], visited = new Set(); visited.add(`${player.x},${player.y}`);
    const dogSet = new Set(dogs.map(d => `${d.x},${d.y}`));
    while(q.length > 0) {
        let curr = q.shift();
        if(map[curr.y][curr.x] === 2) return curr.path[0];
        for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
            let nx = curr.x+dx, ny = curr.y+dy, key = `${nx},${ny}`;
            if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && map[ny][nx]!==1 && !visited.has(key) && !dogSet.has(key)) {
                visited.add(key); q.push({x: nx, y: ny, path: [...curr.path, {dx, dy}]});
            }
        }
    }
    return null;
}

function executeAutoStep() {
    if (autoLoadState !== "MOVING" || !gameStarted || !hasAutoDevice) return;
    let step = getNextStepToGoal();
    if (step) { movePlayer(step.dx, step.dy, true); autoMoveTimeout = setTimeout(executeAutoStep, calculateInterval()); } 
    else { stopAutoProcess(); }
}

function stopAutoProcess() { autoLoadState = "NONE"; if (autoMoveTimeout) { clearTimeout(autoMoveTimeout); autoMoveTimeout = null; } updateUI(); }

setInterval(() => {
    if (!gameStarted || !hasAutoDevice) return;
    let idle = Date.now() - lastMoveTime;
    if (autoLoadState === "NONE" && idle > 2500) { autoLoadState = "LOADING"; updateUI(); }
    if (autoLoadState === "LOADING" && idle > 6000) { autoLoadState = "MOVING"; updateUI(); executeAutoStep(); }
}, 200);

async function playOscillator(f, t, d) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function movePlayer(dx, dy, isAuto = false) {
    if(!gameStarted) return;
    if (!isAuto) { lastMoveTime = Date.now(); stopAutoProcess(); }
    if (dx === -1) flipX = false; if (dx === 1) flipX = true;
    lastDir = { dx, dy };
    const nx = player.x + dx, ny = player.y + dy;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || map[ny][nx] === 1) {
        if(!isAuto) playOscillator(150, 'square', 0.1);
    } else {
        player.x = nx; player.y = ny;
        let dogIndex = dogs.findIndex(d => d.x === player.x && d.y === player.y);
        if (dogIndex !== -1) {
            if (shotgunAmmo > 0) {
                shotgunAmmo--; playSound(dogCrySnd); dogs.splice(dogIndex, 1); updateUI();
            } else {
                gameStarted = false; playSound(biteSnd);
                document.getElementById('bgm-koori').pause(); document.getElementById('bgm-hikari').pause();
                let msg = gameOverMessages[Math.floor(Math.random()*gameOverMessages.length)];
                setTimeout(() => { alert(`\n\n~~ GAME OVER ~~\n\n${msg}`); resetGame(); }, 100);
                return;
            }
        }
        if (dogs.some(d => Math.abs(d.x-player.x)+Math.abs(d.y-player.y)===1)) playSound(growlSnd);
        if (map[ny][nx] === 2) {
            playGoalSound(); currentLevel++; gameStarted = false; isBlind = true; stopAutoProcess();
            document.getElementById('bgm-koori').pause(); document.getElementById('bgm-hikari').pause();
            document.getElementById('start-container').style.display = 'flex'; updateUI();
        } else if (map[ny][nx] === 3) {
            playCoinSound(coinsCollectedInLevel); map[ny][nx] = 0; totalCoins += (1 * coinMultiplier);
            coinsCollectedInLevel++; updateUI();
        }
    }
    draw();
}

async function startGame() { 
    unlockAudio(); 
    document.getElementById('start-container').style.display = 'none'; 
    gameStarted = true; lastMoveTime = Date.now(); 
    if (hasHeadphone && currentBGM !== null) {
        const m1 = document.getElementById('bgm-koori'), m2 = document.getElementById('bgm-hikari');
        m1.pause(); m2.pause();
        const active = (currentBGM === 1) ? m1 : m2;
        active.volume = 0.3;
        active.currentTime = 0; active.play().catch(e => {});
    }
    generateSimpleMaze(); updateUI(); draw(); 
}

function resetGame() { 
    currentLevel = 1; totalCoins = 0; hasAmulet = false; hasAutoDevice = false; 
    hasDevGlasses = false; hasFlashlight = false; shotgunAmmo = 0; 
    hasHeadphone = false; currentBGM = null;
    document.getElementById('bgm-koori').pause(); document.getElementById('bgm-hikari').pause();
    coinMultiplier = 1; flipX = false; gameStarted = false; isBlind = true; 
    stopAutoProcess(); document.getElementById('start-container').style.display = 'flex'; updateUI(); 
}

function toggleBlind() { isBlind = !isBlind; lastMoveTime = Date.now(); stopAutoProcess(); updateUI(); draw(); }
function buyDevGlasses() { if (!hasDevGlasses) { hasDevGlasses = true; updateUI(); } }
function buyAmulet() { if (!hasAmulet) { hasAmulet = true; coinMultiplier = 3; updateUI(); } }
function buyAutoDevice() { if (!hasAutoDevice) { hasAutoDevice = true; updateUI(); } }
function buyFlashlight() { if (!hasFlashlight) { hasFlashlight = true; updateUI(); } }
function buyShotgun() { if (shotgunAmmo === 0) { shotgunAmmo = 2; updateUI(); } }

function playCoinSound(step) {
    let f = WHITE_KEYS[step % WHITE_KEYS.length];
    if (hasAmulet) [1, 1.25, 1.5].forEach((r, i) => setTimeout(() => playOscillator(f * r, 'sine', 0.25), i * 25));
    else playOscillator(f, 'sine', 0.15);
}
async function playGoalSound() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playOscillator(f, 'triangle', 0.4), i * 150)); }

function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) {
        let px = oX+x*size, py = oY+y*size;
        if (map[y][x] === 1) { ctx.fillStyle = "#333"; ctx.fillRect(px, py, size, size); }
        else if (map[y][x] === 2) {
            let cs=3, rs=4, cw=size/cs, ch=size/rs;
            for(let r=0; r<rs; r++) for(let c=0; c<cs; c++) { ctx.fillStyle=(r+c)%2===0?"#fff":"#000"; ctx.fillRect(px+c*cw, py+r*ch, cw, ch); }
        } else if (map[y][x] === 3) {
            ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#5d4037"; ctx.font=`bold ${size/2.5}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("$", px+size/2, py+size/2);
        }
        dogs.forEach(d => { if(d.x===x && d.y===y) ctx.drawImage(dogImg, px, py, size, size); });
    }
    const pX = oX + player.x * size, pY = oY + player.y * size;
    ctx.save();
    if (flipX) { ctx.translate(pX + size, pY); ctx.scale(-1, 1); ctx.drawImage(playerImg, 0, 0, size, size); }
    else { ctx.drawImage(playerImg, pX, pY, size, size); }
    ctx.restore();
    if (isBlind) {
        ctx.save();
        if (hasFlashlight) {
            const cX = pX + size / 2, cY = pY + size / 2;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = "black"; tCtx.fillRect(0, 0, canvas.width, canvas.height);
            tCtx.globalCompositeOperation = 'destination-out';
            const angle = Math.atan2(lastDir.dy, lastDir.dx);
            for (let i = 0; i < 20; i++) {
                const opacity = 0.08; tCtx.fillStyle = `rgba(0, 0, 0, ${opacity})`;
                const fanRadius = size * (0.7 + i * 0.02), footRadius = size * (0.3 + i * 0.015);
                tCtx.beginPath(); tCtx.moveTo(cX, cY); tCtx.arc(cX, cY, fanRadius, angle - 0.35, angle + 0.35); tCtx.closePath(); tCtx.fill();
                tCtx.beginPath(); tCtx.arc(cX, cY, footRadius, 0, Math.PI * 2); tCtx.fill();
            }
            ctx.drawImage(tempCanvas, 0, 0);
        } else { ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        ctx.restore();
    }
}

let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    if (tsX === null || tsY === null) return;
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
        if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0); else movePlayer(0, dy > 0 ? 1 : -1);
    }
    tsX = null; tsY = null;
});
window.onresize = draw; updateUI();
</script>
</body>
