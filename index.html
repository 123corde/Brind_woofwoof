<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スイカ割り迷宮 - Recursive Division</title>
    <style>
        body { margin: 0; background: #fff; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; z-index: 10; 
            font-weight: bold; background: #333; color: #fff; padding: 10px; border-radius: 6px;
            min-width: 160px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; }
        button { padding: 12px 20px; font-size: 14px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #start-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #level-display { font-size: 28px; margin-bottom: 20px; color: #218838; font-weight: bold; }
        #start-btn { padding: 20px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="start-container">
        <div id="level-display">Level 1</div>
        <button id="start-btn">迷宮に入る</button>
    </div>
    <div id="ui">
        <div id="mode-text">ブラインド</div>
        <div id="total-steps">総歩数: 0</div>
        <div id="total-coins">総獲得コイン: 0</div>
    </div>
    <div id="controls"><button id="toggleMode">Dev Mode</button></div>
    <canvas id="gameCanvas"></canvas>

<script>
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';

let isBlind = true, gameStarted = false, currentLevel = 1;
let ROWS, COLS, map, player, dogs, coinPositions, audioCtx;
let totalSteps = 0, totalCoins = 0;

// 音声関連
let dogWarnSound = new Audio();
let gameOverSound = new Audio();

function initGame() {
    // 領域分割法のためサイズを奇数に調整
    const size = 11 + (Math.floor(currentLevel / 2) * 2);
    ROWS = COLS = size;
    generateMazeRecursive();
    draw();
}

// --- 領域分割法 (Recursive Division) ---
function generateMazeRecursive() {
    map = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    // 外壁
    for(let i=0; i<COLS; i++) { map[0][i] = 1; map[ROWS-1][i] = 1; }
    for(let i=0; i<ROWS; i++) { map[i][0] = 1; map[i][COLS-1] = 1; }

    divide(1, 1, COLS - 2, ROWS - 2);

    // スタート地点を左上付近の道に固定
    player = { x: 1, y: 1 };
    
    // 距離計算 (BFS)
    let { dists, parent, maxNode } = bfs(player.x, player.y);
    let goal = maxNode;
    map[goal.y][goal.x] = 2;

    // 最短ルートの特定
    let shortestPath = new Set();
    let curr = goal;
    while(curr) { shortestPath.add(`${curr.x},${curr.y}`); curr = parent[curr.y][curr.x]; }

    // 犬の配置（袋小路 or 十字路）
    dogs = [];
    let candidates = [];
    for(let y=1; y<ROWS-1; y++) {
        for(let x=1; x<COLS-1; x++) {
            if(map[y][x] !== 0 || shortestPath.has(`${x},${y}`)) continue;
            let walls = 0, paths = 0;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
                if(map[y+dy][x+dx] === 1) walls++; else paths++;
            });
            if(walls === 3 || paths === 4) candidates.push({x, y, walls});
        }
    }
    // 袋小路優先
    candidates.sort((a,b) => b.walls - a.walls);
    let dogCount = Math.max(0, currentLevel - 1);
    for(let i=0; i<Math.min(dogCount, candidates.length); i++) {
        dogs.push({x: candidates[i].x, y: candidates[i].y});
    }

    // コイン配置
    coinPositions = [];
    let p = parent[goal.y][goal.x];
    let step = 0;
    while(p && (p.x !== player.x || p.y !== player.y)) {
        if(++step % 4 === 0) { map[p.y][p.x] = 3; coinPositions.push({x:p.x, y:p.y, order:step}); }
        p = parent[p.y][p.x];
    }
}

function divide(x, y, w, h) {
    if (w < 2 || h < 2) return;
    let horizontal = (w < h);
    if (w === h) horizontal = Math.random() < 0.5;

    if (horizontal) {
        let py = y + 1 + Math.floor(Math.random() * (h - 2) / 2) * 2;
        for (let i = x; i < x + w; i++) map[py][i] = 1;
        let px = x + Math.floor(Math.random() * w / 2) * 2;
        map[py][px] = 0;
        divide(x, y, w, py - y);
        divide(x, py + 1, w, h - (py - y) - 1);
    } else {
        let px = x + 1 + Math.floor(Math.random() * (w - 2) / 2) * 2;
        for (let i = y; i < y + h; i++) map[i][px] = 1;
        let py = y + Math.floor(Math.random() * h / 2) * 2;
        map[py][px] = 0;
        divide(x, y, px - x, h);
        divide(px + 1, y, w - (px - x) - 1, h);
    }
}

function bfs(sx, sy) {
    let dists = Array.from({length:ROWS},()=>Array(COLS).fill(-1));
    let parent = Array.from({length:ROWS},()=>Array(COLS).fill(null));
    let q = [{x:sx, y:sy, d:0}]; dists[sy][sx] = 0;
    let maxDist = -1, maxNode = null;
    while(q.length > 0) {
        let c = q.shift();
        if(c.d > maxDist) { maxDist = c.d; maxNode = c; }
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
            let nx = c.x+dx, ny = c.y+dy;
            if(map[ny][nx] !== 1 && dists[ny][nx] === -1) {
                dists[ny][nx] = c.d + 1;
                parent[ny][nx] = {x:c.x, y:c.y};
                q.push({x:nx, y:ny, d:c.d+1});
            }
        });
    }
    return { dists, parent, maxNode };
}

// 描画・移動ロジック（以下共通）
function draw() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS);
    const ox = (canvas.width - size*COLS)/2, oy = (canvas.height - size*ROWS)/2;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(!isBlind) {
        for(let y=0; y<ROWS; y++) {
            for(let x=0; x<COLS; x++) {
                if(map[y][x] === 1) { ctx.fillStyle="#333"; ctx.fillRect(ox+x*size, oy+y*size, size, size); }
                else if(map[y][x] === 2) { ctx.fillStyle="#f00"; ctx.fillRect(ox+x*size, oy+y*size, size, size); }
                else if(map[y][x] === 3) { ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(ox+x*size+size/2, oy+y*size+size/2, size/5, 0, Math.PI*2); ctx.fill(); }
            }
        }
        dogs.forEach(d => ctx.drawImage(dogImg, ox+d.x*size, oy+d.y*size, size, size));
        ctx.drawImage(playerImg, ox+player.x*size, oy+player.y*size, size, size);
    } else { ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height); }
}

function movePlayer(dx, dy) {
    if(!gameStarted) return;
    let nx = player.x+dx, ny = player.y+dy;
    if(map[ny][nx] === 1) return;
    player.x = nx; player.y = ny; totalSteps++;
    if(dogs.some(d => d.x === player.x && d.y === player.y)) { alert("吠えられた！"); currentLevel=1; showMenu(); return; }
    if(map[ny][nx] === 2) { currentLevel++; showMenu(); return; }
    if(map[ny][nx] === 3) { totalCoins++; map[ny][nx]=0; }
    if(dogs.some(d => Math.abs(d.x-nx)+Math.abs(d.y-ny)===1)) { /* 警告音処理 */ }
    updateUI(); draw();
}

function updateUI() {
    document.getElementById('total-steps').innerText = `総歩数: ${totalSteps}`;
    document.getElementById('total-coins').innerText = `総獲得コイン: ${totalCoins}`;
}
function showMenu() { gameStarted = false; document.getElementById('level-display').innerText = `Level ${currentLevel}`; document.getElementById('start-container').style.display='flex'; }

startBtn.onclick = () => { document.getElementById('start-container').style.display='none'; gameStarted=true; isBlind=true; initGame(); };
document.getElementById('toggleMode').onclick = () => { isBlind = !isBlind; draw(); };

// スワイプ処理
let tsX, tsY;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if(Math.abs(dx) > 20 || Math.abs(dy) > 20) {
        if(Math.abs(dx) > Math.abs(dy)) movePlayer(dx>0?1:-1, 0); else movePlayer(0, dy>0?1:-1);
    }
});
</script>
</body>
</html>
