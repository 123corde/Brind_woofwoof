<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち (Music Loop Logic Restored)</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; 
            z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6);
            color: #fff; padding: 10px; border-radius: 6px; min-width: 150px;
        }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
        #start-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        .shop-btn { padding: 10px; margin: 5px; background: #ffc107; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 300px; }
        .shop-btn:disabled { background: #ccc; color: #777; cursor: not-allowed; }
        
        .item-container { 
            display: flex; flex-direction: row-reverse; justify-content: flex-end;
            gap: 10px; font-size: 24px; margin-bottom: 5px; min-height: 32px; align-items: center;
        }
    </style>
</head>
<body>

    <div id="start-container">
        <div id="level-display" style="font-size: 28px; font-weight: bold;">Level 1</div>
        <br>
        <button id="music-upgrade-btn" class="shop-btn" onclick="upgradeMusic()">🎧 ヘッドフォン (0コイン)</button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()">💥 ショットガン (0コイン)</button>
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()">🔦 懐中電灯 (0コイン)</button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()">⛩️ 金運お守り (0コイン)</button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()">📍 Google Map (0コイン)</button>
        <button id="dev-glass-btn" class="shop-btn" onclick="buyDevGlasses()">👁️ 購入してはいけない (0コイン)</button>
        <br><br>
        <button id="start-btn" onclick="startGame()">ゲームを開始する</button>
    </div>

    <div id="ui">
        <div class="item-container">
            <div id="ammo-display"></div>        
            <div id="bgm-display"></div>         
            <div id="headphone-display"></div>    
            <div id="auto-status-icon"></div>    
            <div id="flashlight-display"></div>
            <div id="amulet-display"></div>
        </div>
        <div id="mode-text" style="font-size: 12px; opacity: 0.8;">BLIND MODE</div>
        <div id="total-coins" style="color: #ffd700; font-size: 18px;">所持コイン: 0</div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    
    <canvas id="gameCanvas"></canvas>

<script>
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';
const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogwoof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const dogCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane.wav');

let audioCtx = null, soundReady = false, isBlind = true, gameStarted = false;
let currentLevel = 1, totalCoins = 0, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false, hasFlashlight = false;
let hasHeadphone = false, currentBGM = null; // null:なし, 1:氷の華, 2:忘れじ
let shotgunAmmo = 0, lastDir = { dx: 0, dy: -1 }, flipX = false; 

let ROWS, COLS, map = [], dogs = [], player = { x: 0, y: 0 };

function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const silentPlay = (audio) => { audio.play().then(() => { setTimeout(() => { audio.pause(); audio.currentTime = 0; }, 1); }).catch(e => {}); };
    [growlSnd, biteSnd, dogCrySnd].forEach(silentPlay);
    soundReady = true;
}

function playSound(audio) { if (!audio) return; audio.pause(); audio.currentTime = 0; audio.play().catch(e => {}); }

function updateUI() {
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    document.getElementById('level-display').innerText = `Level ${currentLevel}`;
    document.getElementById('ammo-display').innerText = shotgunAmmo > 0 ? "💥".repeat(shotgunAmmo) : ""; 
    document.getElementById('mode-text').innerText = isBlind ? "BLIND MODE" : "DEBUG MODE";

    // 左下UI表示制御
    document.getElementById('headphone-display').innerText = hasHeadphone ? "🎧" : "";
    let bgmIcon = "";
    if (currentBGM === 1) bgmIcon = "🎶"; else if (currentBGM === 2) bgmIcon = "🎵";
    document.getElementById('bgm-display').innerText = bgmIcon;
    
    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";
    document.getElementById('flashlight-display').innerText = hasFlashlight ? "🔦" : "";
    document.getElementById('auto-status-icon').innerText = hasAutoDevice ? "📍" : "";

    // 音楽ボタン説明文（指定のループ）
    const mBtn = document.getElementById('music-upgrade-btn');
    if (!hasHeadphone) {
        mBtn.innerText = "🎧 ヘッドフォン (0コイン)";
    } else if (currentBGM === null) {
        mBtn.innerText = "🎶 氷の華 に変更 (0コイン)";
    } else if (currentBGM === 1) {
        mBtn.innerText = "🎵 忘れじの光 に変更 (0コイン)";
    } else if (currentBGM === 2) {
        mBtn.innerText = "🎧 BGMなし に変更 (0コイン)";
    }

    // アイテムボタン状態
    const sBtn = document.getElementById('shotgun-btn');
    sBtn.disabled = shotgunAmmo >= 2;
    sBtn.innerText = "💥 ショットガン (0コイン) [${shotgunAmmo}/2]";
    
    document.getElementById('flashlight-btn').disabled = hasFlashlight;
    document.getElementById('amulet-btn').disabled = hasAmulet;
    document.getElementById('auto-device-btn').disabled = hasAutoDevice;
    document.getElementById('dev-glass-btn').disabled = hasDevGlasses;
    document.getElementById('controls').style.display = hasDevGlasses ? 'block' : 'none';
}

function upgradeMusic() {
    if (!hasHeadphone) {
        hasHeadphone = true;
    } else if (currentBGM === null) {
        currentBGM = 1;
    } else if (currentBGM === 1) {
        currentBGM = 2;
    } else if (currentBGM === 2) {
        currentBGM = null;
    }
    updateUI();
}

function buyShotgun() { if (shotgunAmmo < 2) { shotgunAmmo++; updateUI(); } }
function buyAmulet() { hasAmulet = true; coinMultiplier = 2; updateUI(); }
function buyAutoDevice() { hasAutoDevice = true; updateUI(); }
function buyFlashlight() { hasFlashlight = true; updateUI(); }
function buyDevGlasses() { hasDevGlasses = true; updateUI(); }

function generateSimpleMaze() {
    ROWS = COLS = 6 + (currentLevel * 2);
    let found = false;
    while (!found) {
        map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
        let sX = 1 + Math.floor(Math.random()*(COLS-2)), sY = 1 + Math.floor(Math.random()*(ROWS-2));
        player = { x: sX, y: sY }; let x = sX, y = sY; map[y][x] = 0;
        let fill = ROWS * COLS * 0.5;
        for(let i=0; i < fill; i++) {
            let dirs = [[0,1],[0,-1],[1,0],[-1,0]], [dx, dy] = dirs[Math.floor(Math.random()*4)];
            if(x+dx > 0 && x+dx < COLS-1 && y+dy > 0 && y+dy < ROWS-1) { x += dx; y += dy; map[y][x] = 0; }
        }
        let dists = Array.from({ length: ROWS }, () => Array(COLS).fill(-1)), q = [{x: sX, y: sY, d: 0}]; dists[sY][sX] = 0;
        let allWalkable = [];
        while(q.length > 0) {
            let curr = q.shift(); allWalkable.push(curr);
            for(let [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                let nx = curr.x+dx, ny = curr.y+dy;
                if(ny>=0 && ny<ROWS && nx>=0 && nx<COLS && map[ny][nx]===0 && dists[ny][nx]===-1) {
                    dists[ny][nx] = curr.d+1; q.push({x: nx, y: ny, d: curr.d+1});
                }
            }
        }
        if(allWalkable.length > 10) {
            let target = allWalkable[allWalkable.length-1];
            map[target.y][target.x] = 2;
            dogs = [];
            for(let i=0; i<currentLevel; i++) {
                let d = allWalkable[Math.floor(Math.random()*allWalkable.length)];
                if(d.x !== player.x && d.y !== player.y) dogs.push({x: d.x, y: d.y});
            }
            found = true;
        }
    }
}

function movePlayer(dx, dy) {
    if(!gameStarted) return;
    if (dx === -1) flipX = false; if (dx === 1) flipX = true;
    lastDir = { dx, dy };
    const nx = player.x + dx, ny = player.y + dy;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] !== 1) {
        player.x = nx; player.y = ny;
        let dogIdx = dogs.findIndex(d => d.x === player.x && d.y === player.y);
        if (dogIdx !== -1) {
            if (shotgunAmmo > 0) { shotgunAmmo--; playSound(dogCrySnd); dogs.splice(dogIdx, 1); updateUI(); } 
            else { gameStarted = false; playSound(biteSnd); resetGame(); return; }
        }
        if (map[ny][nx] === 2) { currentLevel++; gameStarted = false; document.getElementById('start-container').style.display = 'flex'; updateUI(); }
    }
    draw();
}

async function startGame() { 
    unlockAudio(); document.getElementById('start-container').style.display = 'none'; gameStarted = true; 
    const m1 = document.getElementById('bgm-koori'), m2 = document.getElementById('bgm-hikari');
    m1.pause(); m2.pause();
    if (hasHeadphone && currentBGM !== null) { const active = (currentBGM === 1) ? m1 : m2; active.volume = 0.3; active.currentTime = 0; active.play().catch(e => {}); }
    generateSimpleMaze(); updateUI(); draw(); 
}

function resetGame() { 
    currentLevel = 1; totalCoins = 0; hasAmulet = false; hasAutoDevice = false; hasDevGlasses = false; hasFlashlight = false; shotgunAmmo = 0; hasHeadphone = false; currentBGM = null;
    document.getElementById('start-container').style.display = 'flex'; updateUI(); 
}

function toggleBlind() { isBlind = !isBlind; updateUI(); draw(); }

function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) {
        let px = oX+x*size, py = oY+y*size;
        if (map[y][x] === 1) { ctx.fillStyle = "#333"; ctx.fillRect(px, py, size, size); }
        else if (map[y][x] === 2) { ctx.fillStyle="#000"; ctx.fillRect(px, py, size, size); }
        dogs.forEach(d => { if(d.x===x && d.y===y) ctx.drawImage(dogImg, px, py, size, size); });
    }
    const pX = oX + player.x * size, pY = oY + player.y * size;
    ctx.save(); if (flipX) { ctx.translate(pX + size, pY); ctx.scale(-1, 1); ctx.drawImage(playerImg, 0, 0, size, size); } else { ctx.drawImage(playerImg, pX, pY, size, size); } ctx.restore();
    if (isBlind) { ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
}

let tsX = null, tsY = null;
window.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
window.addEventListener('touchend', e => {
    if (tsX === null || tsY === null) return;
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > 20 || Math.abs(dy) > 20) { if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0); else movePlayer(0, dy > 0 ? 1 : -1); }
    tsX = null; tsY = null;
});
window.onresize = draw; updateUI();
</script>
</body>
</html>
