<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>イッヌと寝落ち - Ver 8.16 (Economy Update)</title>
    <style>
        body { margin: 0; background: #000; color: #333; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { 
            position: absolute; bottom: 15px; left: 15px; pointer-events: none; 
            z-index: 200; font-weight: bold; background: rgba(0,0,0,0.6);
            color: #fff; padding: 10px; border-radius: 6px;
            font-size: min(14px, 3.5vw); max-width: 80%;
        }
        .item-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; height: 1.5em; }
        #controls { position: absolute; bottom: 15px; right: 15px; z-index: 20; display: none; }
        button { padding: 10px 15px; font-size: 12px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #start-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.35); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        #start-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; flex-shrink: 0; }
        .shop-btn { padding: 10px; margin: 3px; background: #ffc107; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; flex-shrink: 0; }
        .shop-btn:disabled { background: #ccc; cursor: not-allowed; color: #777; }
        .dev-btn { color: white; background-color: #d9534f; }
        #auto-status { color: #fff; font-size: 1.1em; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-container">
        <div id="level-display" style="font-size: 28px; font-weight: bold;" onclick="triggerDebugJump()">Level 1</div>
        <br>
        <button id="hp-buy-btn" class="shop-btn" onclick="buyHeadphone()"></button>
        <button id="bgm-cycle-btn" class="shop-btn" style="display:none;" onclick="cycleBGM()"></button>
        <button id="flashlight-btn" class="shop-btn" onclick="buyFlashlight()"></button>
        <button id="shotgun-btn" class="shop-btn" onclick="buyShotgun()" style="display: none;"></button>
        <button id="auto-device-btn" class="shop-btn" onclick="buyAutoDevice()" style="display: none;"></button>
        <button id="amulet-btn" class="shop-btn" onclick="buyAmulet()"></button>
        <button id="dev-glass-btn" class="shop-btn dev-btn" onclick="buyDevGlasses()">👁️購入👁️しては👁️いけない👁️ (0コイン)</button>
        <br>
        <button id="start-btn" onclick="startGame()">START</button>
    </div>

    <div id="ui">
        <div class="item-row">
            <div id="amulet-display"></div>
            <div id="headphone-display"></div>
            <div id="ammo-display"></div>
            <div id="auto-status"></div>
            <div id="flashlight-display"></div>
        </div>
        <div id="mode-text">BLIND MODE</div>
        <div id="total-coins" style="color: #ffd700;">所持コイン: 0</div>
        <div id="ver-text" style="font-size: 0.85em; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="controls"><button id="toggleMode" onclick="toggleBlind()">👁️ Dev Options</button></div>
    
    <audio id="bgm-koori" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/koorinohana.mp3" loop></audio>
    <audio id="bgm-hikari" src="https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/wasurezinohikari.mp3" loop></audio>
    
    <canvas id="gameCanvas"></canvas>

<script>
const GAME_VERSION = "8.16.1"; 
const wallImg = new Image(); wallImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/blue_wall.png';
const playerImg = new Image(); playerImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/20fde8abcea576876580874124524fe52102d019/Me.png';
const dogImg = new Image(); dogImg.src = 'https://raw.githubusercontent.com/123corde/Brind_woofwoof/f1f834b0da2f6c4fa3399e7536b86e8b8a43c98d/Watchdog.png';
const growlSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogwoof.wav');
const biteSnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Dogbite.wav');
const dogCrySnd = new Audio('https://raw.githubusercontent.com/123corde/Brind_woofwoof/main/Cane.wav');

// --- 価格設定 ---
const PRICE_KEYBOARD = 40;
const PRICE_BGM_ICE = 10;
const PRICE_BGM_ISLAND = 50;
const PRICE_SHOTGUN = 100;
const PRICE_SHOTGUN_AMMO = 1;
const PRICE_FLASHLIGHT = 80;
const PRICE_BATTERY = 5;
const PRICE_AMULET = 120;
const PRICE_MAP = 200;

let audioCtx = null, soundReady = false;
let isBlind = true, gameStarted = false;
let totalCoins = 100000;
let currentLevel = 1, coinMultiplier = 1; 
let hasAmulet = false, hasAutoDevice = false, hasDevGlasses = false;
let hasHeadphone = false, currentBGM = null, purchasedBGM = { 1: false, 2: false };
let hasShotgun = false, shotgunAmmo = 0; 
let hasFlashlight = false, flashlightBattery = 0;
const FLASHLIGHT_MAX = 200, FLASHLIGHT_BONUS = 180;

let lastDir = { dx: 0, dy: -1 }, flipX = false, debugClickCount = 0;
let ROWS, COLS, map = [], dogs = [], player = { x: 0, y: 0 }, goalPos = { x: 0, y: 0 };
let shortestPath = [], coinsCollectedInLevel = 0;
let lastMoveTime = Date.now(), autoMoveTimeout = null, autoLoadState = "NONE", loadingDots = 0, isAutoDeviceUsedInThisLevel = false;

const WHITE_KEYS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
const gameOverMessages = ["ガブッ！イッヌの餌食になりました。","Level 1 からやり直しです..."];

function unlockAudio() {
    if (soundReady) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const silentPlay = (audio) => { audio.muted = true; audio.play().then(() => { audio.pause(); audio.currentTime = 0; audio.muted = false; }).catch(e => {}); };
    [growlSnd, biteSnd, dogCrySnd].forEach(silentPlay);
    soundReady = true;
}

function playSound(audio) { if (audio) { audio.pause(); audio.currentTime = 0; audio.play().catch(e => {}); } }

function updateUI() {
    const verDisplay = document.getElementById('ver-text');
    if (verDisplay) verDisplay.innerText = `ver.${GAME_VERSION}${hasDevGlasses ? " (Debug Mode)" : ""}`;
    document.getElementById('total-coins').innerText = `所持コイン: ${totalCoins}`;
    
    // Level
    const levelDisplay = document.getElementById('level-display');
    const isHardMode = currentLevel >= 11;
    levelDisplay.innerText = `Level ${currentLevel}${isHardMode ? " (HARD)" : ""}`;
    levelDisplay.style.color = isHardMode ? "#ff4444" : "#333";

    // Shop: Keyboard & BGM
    const hpBuyBtn = document.getElementById('hp-buy-btn');
    const cycleBtn = document.getElementById('bgm-cycle-btn');
    if (!hasHeadphone) {
        hpBuyBtn.innerText = `🎹 キーボード (${PRICE_KEYBOARD}コイン)`;
        hpBuyBtn.disabled = totalCoins < PRICE_KEYBOARD;
        hpBuyBtn.style.display = 'block';
        cycleBtn.style.display = 'none';
    } else {
        hpBuyBtn.style.display = 'none';
        cycleBtn.style.display = 'block';
        if (!purchasedBGM[1]) {
            cycleBtn.innerText = `🎹❄️ 氷の華 (${PRICE_BGM_ICE}コイン)`;
            cycleBtn.disabled = totalCoins < PRICE_BGM_ICE;
        } else if (!purchasedBGM[2]) {
            cycleBtn.innerText = currentBGM === 1 ? `🎹🏝️ 最果ての島 (${PRICE_BGM_ISLAND}コイン)` : `🎹❄️ 氷の華 (0コイン)`;
            cycleBtn.disabled = (currentBGM === 1 && totalCoins < PRICE_BGM_ISLAND) ? true : false;
        } else {
            let next = currentBGM === null ? "❄️ 氷の華" : (currentBGM === 1 ? "🏝️ 最果ての島" : "🔕 BGMなし");
            cycleBtn.innerText = `🎹${next} (0コイン)`;
            cycleBtn.disabled = false;
        }
    }

    // Shop: Shotgun
    const sBtn = document.getElementById('shotgun-btn');
    sBtn.style.display = isHardMode ? 'block' : 'none';
    if (!hasShotgun) {
        sBtn.innerText = `💥 ショットガン (${PRICE_SHOTGUN}コイン)`;
        sBtn.disabled = totalCoins < PRICE_SHOTGUN;
    } else {
        sBtn.innerText = `💥 弾追加 [${shotgunAmmo}/2] (${PRICE_SHOTGUN_AMMO}コイン)`;
        sBtn.disabled = (shotgunAmmo >= 2 || totalCoins < PRICE_SHOTGUN_AMMO);
    }

    // Shop: Flashlight
    const fBtn = document.getElementById('flashlight-btn');
    if (!hasFlashlight) {
        fBtn.innerText = `🔦 懐中電灯 (${PRICE_FLASHLIGHT}コイン)`;
        fBtn.disabled = totalCoins < PRICE_FLASHLIGHT;
    } else {
        fBtn.innerText = `🔦 電池10s追加 [${Math.ceil(flashlightBattery)}s] (${PRICE_BATTERY}コイン)`;
        fBtn.disabled = (flashlightBattery >= FLASHLIGHT_MAX || totalCoins < PRICE_BATTERY);
    }

    // Shop: Amulet & Map
    const amuBtn = document.getElementById('amulet-btn');
    amuBtn.innerText = `⛩️ 金運アップお守り (${PRICE_AMULET}コイン)`;
    amuBtn.disabled = (hasAmulet || totalCoins < PRICE_AMULET);

    const aBtn = document.getElementById('auto-device-btn');
    aBtn.style.display = isHardMode ? 'block' : 'none';
    aBtn.innerText = `📍 Google Map (${PRICE_MAP}コイン)`;
    aBtn.disabled = (hasAutoDevice || totalCoins < PRICE_MAP);

    document.getElementById('amulet-display').innerText = hasAmulet ? "⛩️" : "";
    document.getElementById('headphone-display').innerText = hasHeadphone ? (currentBGM ? "🎹🎶" : "🎹") : "";
    document.getElementById('ammo-display').innerText = "💥".repeat(shotgunAmmo);
}

function buyHeadphone() { if (totalCoins >= PRICE_KEYBOARD) { totalCoins -= PRICE_KEYBOARD; hasHeadphone = true; updateUI(); } }
function buyFlashlight() {
    if (!hasFlashlight) { if (totalCoins >= PRICE_FLASHLIGHT) { totalCoins -= PRICE_FLASHLIGHT; hasFlashlight = true; flashlightBattery = 60; } }
    else { if (totalCoins >= PRICE_BATTERY && flashlightBattery < FLASHLIGHT_MAX) { totalCoins -= PRICE_BATTERY; flashlightBattery = Math.min(FLASHLIGHT_MAX, flashlightBattery + 10); } }
    updateUI();
}
function buyShotgun() {
    if (!hasShotgun) { if (totalCoins >= PRICE_SHOTGUN) { totalCoins -= PRICE_SHOTGUN; hasShotgun = true; shotgunAmmo = 2; } }
    else { if (totalCoins >= PRICE_SHOTGUN_AMMO && shotgunAmmo < 2) { totalCoins -= PRICE_SHOTGUN_AMMO; shotgunAmmo++; } }
    updateUI();
}
function buyAmulet() { if (totalCoins >= PRICE_AMULET && !hasAmulet) { totalCoins -= PRICE_AMULET; hasAmulet = true; coinMultiplier = 3; updateUI(); } }
function buyAutoDevice() { if (totalCoins >= PRICE_MAP && !hasAutoDevice) { totalCoins -= PRICE_MAP; hasAutoDevice = true; updateUI(); } }

function cycleBGM() {
    if (!purchasedBGM[1]) { if (totalCoins >= PRICE_BGM_ICE) { totalCoins -= PRICE_BGM_ICE; purchasedBGM[1] = true; currentBGM = 1; } }
    else if (!purchasedBGM[2]) {
        if (currentBGM === 1) { if (totalCoins >= PRICE_BGM_ISLAND) { totalCoins -= PRICE_BGM_ISLAND; purchasedBGM[2] = true; currentBGM = 2; } }
        else currentBGM = 1;
    } else {
        if (currentBGM === null) currentBGM = 1; else if (currentBGM === 1) currentBGM = 2; else currentBGM = null;
    }
    updateUI();
}

// --- 以下、ゲームエンジン・描画ロジック (Ver 8.16ベース) ---
function generateSimpleMaze() {
    COLS = Math.min(17, 5 + Math.floor((currentLevel - 1) * 1.34));
    ROWS = Math.min(21, Math.floor(COLS * 1.2));
    if (COLS % 2 === 0) COLS++; if (ROWS % 2 === 0) ROWS++;
    map = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
    let sX = 1, sY = 1; player = { x: sX, y: sY }; map[sY][sX] = 0;
    // 簡易迷路生成 (穴掘り)
    function dig(x, y) {
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1 && map[ny][nx] === 1) {
                map[y + dy/2][x + dx/2] = 0; map[ny][nx] = 0; dig(nx, ny);
            }
        }
    }
    dig(sX, sY);
    // ゴール設定
    let gx = COLS - 2, gy = ROWS - 2; map[gy][gx] = 2; goalPos = { x: gx, y: gy };
    // コイン配置
    for(let i=0; i<COLS*ROWS/10; i++) {
        let rx = Math.floor(Math.random()*COLS), ry = Math.floor(Math.random()*ROWS);
        if(map[ry][rx] === 0 && (rx !== sX || ry !== sY)) map[ry][rx] = 3;
    }
    // イッヌ配置
    dogs = [];
    if(currentLevel > 1) {
        for(let i=0; i<Math.min(5, currentLevel-1); i++) {
            let rx = Math.floor(Math.random()*COLS), ry = Math.floor(Math.random()*ROWS);
            if(map[ry][rx] === 0 && Math.abs(rx-sX)+Math.abs(ry-sY) > 3) dogs.push({x:rx, y:ry});
        }
    }
}

function movePlayer(dx, dy) {
    if(!gameStarted) return;
    const nx = player.x + dx, ny = player.y + dy;
    if (dx !== 0) flipX = dx > 0;
    lastDir = { dx, dy };
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] !== 1) {
        player.x = nx; player.y = ny;
        let dogIdx = dogs.findIndex(d => d.x === player.x && d.y === player.y);
        if (dogIdx !== -1) {
            if (shotgunAmmo > 0) { shotgunAmmo--; playSound(dogCrySnd); dogs.splice(dogIdx, 1); }
            else { playSound(biteSnd); alert("GAME OVER"); resetGame(); return; }
        }
        if (map[ny][nx] === 3) { totalCoins += (1 * coinMultiplier); map[ny][nx] = 0; playOscillator(440, 'sine', 0.1); }
        if (map[ny][nx] === 2) { currentLevel++; gameStarted = false; document.getElementById('start-container').style.display = 'flex'; }
        updateUI(); draw();
    }
}

async function playOscillator(f, t, d) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function startGame() { unlockAudio(); document.getElementById('start-container').style.display = 'none'; gameStarted = true; generateSimpleMaze(); updateUI(); draw(); }
function resetGame() { currentLevel = 1; totalCoins = 0; hasAmulet = false; hasFlashlight = false; hasShotgun = false; hasHeadphone = false; gameStarted = false; document.getElementById('start-container').style.display = 'flex'; updateUI(); }

function draw() {
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const size = Math.min(canvas.width/COLS, canvas.height/ROWS), oX = (canvas.width-size*COLS)/2, oY = (canvas.height-size*ROWS)/2;
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            let px = oX + x * size, py = oY + y * size;
            if (map[y][x] === 1) ctx.drawImage(wallImg, px, py, size, size);
            else if (map[y][x] === 2) { ctx.fillStyle="#fff"; ctx.fillRect(px, py, size, size); }
            else if (map[y][x] === 3) { ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(px+size/2, py+size/2, size/4, 0, Math.PI*2); ctx.fill(); }
        }
    }
    dogs.forEach(d => ctx.drawImage(dogImg, oX+d.x*size, oY+d.y*size, size, size));
    ctx.save();
    if (flipX) { ctx.translate(oX+player.x*size+size, oY+player.y*size); ctx.scale(-1, 1); ctx.drawImage(playerImg, 0, 0, size, size); }
    else ctx.drawImage(playerImg, oX+player.x*size, oY+player.y*size, size, size);
    ctx.restore();

    if (isBlind && gameStarted) {
        ctx.fillStyle = "rgba(0,0,0,0.95)";
        // 懐中電灯などの視界制限ロジック（簡易版）
        if (!hasFlashlight || flashlightBattery <= 0) {
            ctx.globalCompositeOperation = 'source-over';
            // プレイヤーの周囲以外を暗く
        }
    }
}

window.addEventListener('keydown', e => {
    if(e.key === "ArrowUp") movePlayer(0, -1);
    if(e.key === "ArrowDown") movePlayer(0, 1);
    if(e.key === "ArrowLeft") movePlayer(-1, 0);
    if(e.key === "ArrowRight") movePlayer(1, 0);
});
updateUI();
</script>
</body>
</html>
